<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎡 Рулетка Сфер · Колесо Життя з AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #0a1f1a 0%, #030a07 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', 'Times New Roman', serif;
            padding: 1rem;
        }
        .roulette-layout {
            max-width: 1500px;
            width: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            padding: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #d4af37;
        }
        .wheel-area {
            flex: 1.2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        canvas {
            width: 100%;
            max-width: 500px;
            height: auto;
            background: #1a3a2a;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #b8860b, 0 0 0 12px #d4af37, 0 15px 35px black;
        }
        .betting-area {
            flex: 0.9;
            min-width: 300px;
            background: #0f281f;
            border-radius: 2rem;
            padding: 1rem;
            border: 2px solid #d4af37;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 10px 20px black;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .lang-switch {
            display: flex;
            gap: 0.5rem;
        }
        .lang-btn {
            background: #2a4a3a;
            border: none;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            color: #f5e6b0;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .lang-btn.active {
            background: #d4af37;
            color: #0a1a12;
        }
        .api-input {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            background: #0a1f18;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            border: 1px solid #d4af37;
        }
        .api-input input {
            background: #1a3a2a;
            border: none;
            color: #f9e2a1;
            padding: 0.2rem 0.4rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            width: 160px;
        }
        .api-input button {
            background: #d4af37;
            border: none;
            padding: 0.1rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.6rem;
            cursor: pointer;
        }
        .betting-title {
            text-align: center;
            font-size: 1.2rem;
            color: #f7d97a;
            letter-spacing: 2px;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 0.3rem;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 0.3rem;
        }
        .sphere-card {
            border-radius: 0.8rem;
            padding: 0.5rem 0.3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 1px solid #b8860b;
            color: #e9d6a3;
            font-size: 0.7rem;
            font-weight: bold;
            word-break: break-word;
        }
        /* червоно-чорне тло для карток */
        .sphere-card:nth-child(odd) {
            background: linear-gradient(145deg, #8b1a1a, #5a0f0f);
        }
        .sphere-card:nth-child(even) {
            background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
        }
        .sphere-card:hover {
            transform: scale(1.01);
            filter: brightness(1.2);
            border-color: #f5b042;
        }
        .sphere-card.selected-card {
            background: radial-gradient(circle, #f5b042, #b45f1b);
            color: #0f1a0e;
            border-color: #ffdf80;
            box-shadow: 0 0 12px #f5b042;
        }
        .sphere-emoji { font-size: 1.3rem; display: block; }
        .sphere-name-full { font-size: 0.65rem; font-weight: normal; line-height: 1.2; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 0.5rem 0;
        }
        button {
            background: radial-gradient(circle at 30% 20%, #f5b042, #b45f1b);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 0.85rem;
            color: #0f1a0e;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 3px 0 #5a2e0a;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #5a2e0a;
        }
        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .result-area {
            background: #0a1f18;
            border-radius: 1.5rem;
            padding: 0.5rem;
            border: 1px solid #d4af37;
            text-align: center;
        }
        .result-text { color: #f9e2a1; font-size: 0.8rem; word-break: break-word; }
        .history {
            margin-top: 0.4rem;
            font-size: 0.65rem;
            color: #c9b27c;
            overflow-x: auto;
            white-space: nowrap;
        }
        .timer-hint {
            font-size: 0.6rem;
            color: #e9b84a;
            text-align: center;
            margin-top: 0.2rem;
        }
        @media (max-width: 900px) {
            .roulette-layout { flex-direction: column; align-items: center; }
            .betting-area { width: 100%; }
            .cards-grid { max-height: 40vh; }
        }
    </style>
</head>
<body>
<div class="roulette-layout">
    <div class="wheel-area">
        <canvas id="rouletteCanvas" width="600" height="600" style="width:100%; height:auto; max-width:600px; aspect-ratio:1/1"></canvas>
        <div class="top-bar" style="width:100%; justify-content:center; gap:1rem;">
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="ua">🇺🇦 UA</button>
                <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
            </div>
            <div class="api-input">
                <input type="text" id="groqKeyInput" placeholder="Groq API key (gsk_...)" autocomplete="off">
                <button id="saveKeyBtn">💾</button>
            </div>
        </div>
    </div>
    <div class="betting-area">
        <div class="betting-title" id="titleField">✨ поле сфер ✨</div>
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="controls">
            <button id="spinBtn">🎲 SPIN THE BALL</button>
            <button id="copyBtn">📋 COPY</button>
        </div>
        <div class="result-area">
            <div class="result-text" id="resultMessage">🌀 натисніть SPIN</div>
            <div class="history" id="historyLog"></div>
        </div>
        <div class="timer-hint" id="timerHint"></div>
    </div>
</div>

<script>
    (function() {
        // ========== ДАНІ СФЕР ==========
        const SPHERES = {
            ua: [
                { emoji: "🚀", name: "Творчість або Самовираження", short: "Творчість" },
                { emoji: "🧑‍🔬", name: "Особистий розвиток або Турбота про себе", short: "Саморозвиток" },
                { emoji: "🏘", name: "Домашнє життя або Ведення господарства", short: "Дім" },
                { emoji: "💴", name: "Фінанси", short: "Фінанси" },
                { emoji: "🤝", name: "Батьківство або Сім'я", short: "Сім'я" },
                { emoji: "📚", name: "Відпочинок і Хобі", short: "Хобі" },
                { emoji: "🗣️", name: "Спільнота або Соціальні зв'язки", short: "Спільнота" },
                { emoji: "🌳", name: "Фізичне здоров'я", short: "Здоров'я" },
                { emoji: "🔎", name: "Кар'єра або Освіта", short: "Кар'єра" },
                { emoji: "🌿", name: "Екологія або Благодійність", short: "Екологія" },
                { emoji: "👥", name: "Особисті стосунки", short: "Стосунки" },
                { emoji: "🧘", name: "Духовність", short: "Духовність" }
            ],
            en: [
                { emoji: "🚀", name: "Creativity or Self-Expression", short: "Creativity" },
                { emoji: "🧑‍🔬", name: "Personal Development or Self-Care", short: "Self-Development" },
                { emoji: "🏘", name: "Domestic Life or Household Management", short: "Home" },
                { emoji: "💴", name: "Finance", short: "Finance" },
                { emoji: "🤝", name: "Parenting or Family", short: "Family" },
                { emoji: "📚", name: "Recreation and Hobbies", short: "Hobbies" },
                { emoji: "🗣️", name: "Community Involvement or Social Connection", short: "Community" },
                { emoji: "🌳", name: "Physical Health", short: "Health" },
                { emoji: "🔎", name: "Career or Education", short: "Career" },
                { emoji: "🌿", name: "Environmental or Charitable Causes", short: "Ecology" },
                { emoji: "👥", name: "Personal Relationship", short: "Relationships" },
                { emoji: "🧘", name: "Spirituality", short: "Spirituality" }
            ]
        };

        // Локальний fallback (красиві фрази)
        const FALLBACK_PHRASES = {
            ua: "✨ Віднайди свою глибину в цій сфері",
            en: "✨ Discover your depth within this sphere"
        };

        let currentLang = "ua";
        let currentSpheres = SPHERES.ua;
        let groqApiKey = localStorage.getItem("groq_api_key") || "";

        // Wheel state
        const canvas = document.getElementById("rouletteCanvas");
        const ctx = canvas.getContext("2d");
        let size = 600, center = 300, radius = 280;
        let wheelAngle = 0;
        let ballAngle = 0;
        let spinning = false;
        let spinStart = 0;
        let spinDuration = 2500;
        let targetSegment = -1;       // selected sphere index (via card)
        let wheelStartAngle = 0, ballStartAngle = 0;
        let wheelDelta = 0, ballDelta = 0;
        let lastMessage = "";
        let history = [];
        let lastSpinTime = 0;
        const SPIN_COOLDOWN = 2000;   // 2 секунди

        // DOM
        const cardsGrid = document.getElementById("cardsGrid");
        const resultDiv = document.getElementById("resultMessage");
        const historyDiv = document.getElementById("historyLog");
        const spinBtn = document.getElementById("spinBtn");
        const copyBtn = document.getElementById("copyBtn");
        const titleField = document.getElementById("titleField");
        const timerHint = document.getElementById("timerHint");
        const groqKeyInput = document.getElementById("groqKeyInput");
        const saveKeyBtn = document.getElementById("saveKeyBtn");

        // Load saved key
        if (groqApiKey) groqKeyInput.value = groqApiKey;

        // ========== ПОБУДОВА КАРТОК (без кліку-спіну) ==========
        function buildCards() {
            cardsGrid.innerHTML = "";
            currentSpheres.forEach((s, idx) => {
                const card = document.createElement("div");
                card.className = "sphere-card";
                if (idx === targetSegment) card.classList.add("selected-card");
                card.dataset.idx = idx;
                card.innerHTML = `
                    <span class="sphere-emoji">${s.emoji}</span>
                    <div class="sphere-name-full">${s.name}</div>
                `;
                card.addEventListener("click", () => {
                    if (spinning) return;
                    // тільки вибір, без спіну
                    document.querySelectorAll(".sphere-card").forEach(c => c.classList.remove("selected-card"));
                    card.classList.add("selected-card");
                    targetSegment = idx;
                    resultDiv.innerHTML = currentLang === "ua" 
                        ? `✅ обрано: ${s.short} · натисніть SPIN` 
                        : `✅ selected: ${s.short} · press SPIN`;
                });
                cardsGrid.appendChild(card);
            });
        }

        function highlightCard(index) {
            const cards = document.querySelectorAll(".sphere-card");
            cards.forEach((card, i) => {
                if (i === index) card.classList.add("selected-card");
                else card.classList.remove("selected-card");
            });
        }

        // ========== МАЛЮВАННЯ КОЛЕСА (червоно-чорне) ==========
        function drawWheel() {
            if (!ctx) return;
            ctx.clearRect(0, 0, size, size);
            ctx.fillStyle = "#1e3a2a";
            ctx.fillRect(0, 0, size, size);
            const step = (Math.PI * 2) / 12;
            for (let i = 0; i < 12; i++) {
                const start = i * step + wheelAngle;
                const end = (i+1) * step + wheelAngle;
                const isRed = (i % 2 === 0);
                const color1 = isRed ? "#b22222" : "#2c2c2c";
                const color2 = isRed ? "#8b0000" : "#1a1a1a";
                const grad = ctx.createRadialGradient(center, center, radius*0.2, center, center, radius);
                grad.addColorStop(0, color1);
                grad.addColorStop(1, color2);
                ctx.beginPath();
                ctx.arc(center, center, radius, start, end);
                ctx.lineTo(center, center);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = "#f7d97a";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // number
                const mid = start + step/2;
                const txtR = radius * 0.7;
                const x = center + Math.cos(mid) * txtR;
                const y = center + Math.sin(mid) * txtR;
                ctx.font = `bold ${Math.max(18, radius*0.08)}px "Segoe UI"`;
                ctx.fillStyle = "#fff8e7";
                ctx.shadowBlur = 3;
                ctx.fillText(i+1, x-11, y+7);
                ctx.shadowBlur = 0;
            }
            // center
            ctx.beginPath();
            ctx.arc(center, center, radius*0.18, 0, Math.PI*2);
            ctx.fillStyle = "#d4af37";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(center, center, radius*0.1, 0, Math.PI*2);
            ctx.fillStyle = "#b8860b";
            ctx.fill();
            // ball
            const ballRad = radius * 0.045;
            const ballX = center + Math.cos(ballAngle) * (radius - ballRad - 5);
            const ballY = center + Math.sin(ballAngle) * (radius - ballRad - 5);
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRad, 0, Math.PI*2);
            ctx.fillStyle = "#f0f0f0";
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(ballX-2, ballY-2, ballRad*0.3, 0, Math.PI*2);
            ctx.fill();
        }

        function getSegmentAtTop() {
            const pointerAngle = -Math.PI/2;
            let raw = pointerAngle - wheelAngle;
            raw = ((raw % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
            return Math.floor(raw / (Math.PI*2/12));
        }

        // ========== GENERATE AI PHRASE VIA GROQ ==========
        async function generateAIPhrase(sphereName, sphereIndex) {
            if (!groqApiKey || !groqApiKey.startsWith("gsk_")) {
                // fallback
                const fallback = FALLBACK_PHRASES[currentLang];
                return fallback;
            }
            const prompt = currentLang === "ua" 
                ? `Ти — мудрий оракул. Напиши одне глибоке, натхненне речення (максимум 20 слів) для сфери життя "${sphereName}". Речення має спонукати до роздумів або дії. Не використовуй лапки, тільки текст.`
                : `You are a wise oracle. Write one deep, inspiring sentence (max 20 words) for the life sphere "${sphereName}". The sentence should encourage reflection or action. No quotes, just text.`;
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${groqApiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.9,
                        max_tokens: 60
                    })
                });
                if (!response.ok) {
                    console.warn("Groq API error", response.status);
                    return FALLBACK_PHRASES[currentLang];
                }
                const data = await response.json();
                let text = data.choices?.[0]?.message?.content?.trim() || "";
                text = text.replace(/^["']|["']$/g, '');
                if (text.length === 0) text = FALLBACK_PHRASES[currentLang];
                return text;
            } catch (err) {
                console.error("Groq fetch failed", err);
                return FALLBACK_PHRASES[currentLang];
            }
        }

        // ========== АНІМАЦІЯ СПІНУ ==========
        function startSpin() {
            if (spinning) return;
            const now = Date.now();
            if (now - lastSpinTime < SPIN_COOLDOWN) {
                const waitSec = ((SPIN_COOLDOWN - (now - lastSpinTime)) / 1000).toFixed(1);
                timerHint.innerText = currentLang === "ua" ? `⏳ зачекайте ${waitSec}с` : `⏳ wait ${waitSec}s`;
                return;
            }
            timerHint.innerText = "";
            spinning = true;
            spinBtn.disabled = true;

            let finalTarget;
            if (targetSegment !== -1 && targetSegment >= 0 && targetSegment < 12) {
                finalTarget = targetSegment;
            } else {
                finalTarget = Math.floor(Math.random() * 12);
                targetSegment = finalTarget;
                highlightCard(finalTarget);
            }
            const currentIdx = getSegmentAtTop();
            let deltaIndices = (finalTarget - currentIdx + 12) % 12;
            let deltaAngle = deltaIndices * (Math.PI*2/12);
            const extraFull = (Math.floor(Math.random() * 8) + 8) * 2 * Math.PI;
            wheelDelta = deltaAngle + extraFull;

            const finalBallPos = -Math.PI/2;
            let ballDeltaVal = (finalBallPos - ballAngle + 2*Math.PI) % (2*Math.PI);
            ballDeltaVal += (Math.floor(Math.random() * 10) + 12) * 2 * Math.PI;
            ballDelta = ballDeltaVal;

            wheelStartAngle = wheelAngle;
            ballStartAngle = ballAngle;
            spinStart = performance.now();
            requestAnimationFrame(animateSpin);
        }

        async function animateSpin(now) {
            const elapsed = now - spinStart;
            let t = Math.min(1, elapsed / spinDuration);
            const ease = 1 - Math.pow(1-t, 3);
            wheelAngle = wheelStartAngle + wheelDelta * ease;
            ballAngle = ballStartAngle + ballDelta * ease;
            drawWheel();
            if (t < 1) {
                requestAnimationFrame(animateSpin);
            } else {
                wheelAngle = (wheelStartAngle + wheelDelta) % (2*Math.PI);
                ballAngle = (ballStartAngle + ballDelta) % (2*Math.PI);
                drawWheel();
                const finalIdx = getSegmentAtTop();
                const sphere = currentSpheres[finalIdx];
                // генеруємо фразу через Groq (або fallback)
                const aiPhrase = await generateAIPhrase(sphere.name, finalIdx);
                lastMessage = `${sphere.emoji} ${sphere.name} · ${aiPhrase}`;
                resultDiv.innerHTML = `✨ ${lastMessage}`;
                history.unshift(`${sphere.emoji} ${sphere.short}`);
                if (history.length > 6) history.pop();
                historyDiv.innerHTML = `📜 ${currentLang === "ua" ? "історія" : "history"}: ${history.join(' · ')}`;
                spinning = false;
                spinBtn.disabled = false;
                lastSpinTime = Date.now();
                // оновлюємо таймер хіба що через 2 секунди дозволить знову
                setTimeout(() => {
                    if (!spinning) timerHint.innerText = "";
                }, SPIN_COOLDOWN);
                flashEffect();
            }
        }

        function flashEffect() {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.background = 'radial-gradient(circle, rgba(255,215,0,0.3), transparent)';
            overlay.style.pointerEvents = 'none';
            overlay.style.zIndex = '999';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 400);
        }

        function copyResult() {
            if (lastMessage) {
                navigator.clipboard.writeText(lastMessage);
                const original = resultDiv.innerText;
                resultDiv.innerHTML = "✅ copied!";
                setTimeout(() => resultDiv.innerHTML = original, 1200);
            } else {
                resultDiv.innerHTML = currentLang === "ua" ? "🌀 спершу зробіть спін" : "🌀 spin first";
                setTimeout(() => {
                    if (lastMessage) resultDiv.innerHTML = `✨ ${lastMessage}`;
                    else resultDiv.innerHTML = currentLang === "ua" ? "🌀 натисніть SPIN" : "🌀 press SPIN";
                }, 1500);
            }
        }

        function randomSpin() {
            if (spinning) return;
            // випадковий вибір, без попереднього виділення? але виділимо картку
            targetSegment = Math.floor(Math.random() * 12);
            highlightCard(targetSegment);
            startSpin();
        }

        function setLanguage(lang) {
            currentLang = lang;
            currentSpheres = SPHERES[lang];
            document.querySelectorAll(".lang-btn").forEach(btn => {
                if (btn.dataset.lang === lang) btn.classList.add("active");
                else btn.classList.remove("active");
            });
            titleField.innerText = lang === "ua" ? "✨ поле сфер ✨" : "✨ field of spheres ✨";
            buildCards();
            if (targetSegment !== -1) highlightCard(targetSegment);
            resultDiv.innerHTML = lang === "ua" ? "🌀 натисніть SPIN" : "🌀 press SPIN";
        }

        function saveApiKey() {
            const key = groqKeyInput.value.trim();
            if (key && key.startsWith("gsk_")) {
                groqApiKey = key;
                localStorage.setItem("groq_api_key", key);
                resultDiv.innerHTML = currentLang === "ua" ? "🔑 API ключ збережено!" : "🔑 API key saved!";
                setTimeout(() => {
                    resultDiv.innerHTML = lastMessage ? `✨ ${lastMessage}` : (currentLang === "ua" ? "🌀 натисніть SPIN" : "🌀 press SPIN");
                }, 2000);
            } else {
                alert(currentLang === "ua" ? "Введіть коректний ключ Groq (починається з gsk_)" : "Enter a valid Groq key (starts with gsk_)");
            }
        }

        function init() {
            buildCards();
            drawWheel();
            spinBtn.addEventListener("click", randomSpin);
            copyBtn.addEventListener("click", copyResult);
            saveKeyBtn.addEventListener("click", saveApiKey);
            document.querySelectorAll(".lang-btn").forEach(btn => {
                btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
            });
            window.addEventListener("resize", () => drawWheel());
            resultDiv.innerText = "🌀 натисніть SPIN";
            if (groqApiKey) groqKeyInput.value = groqApiKey;
        }
        init();
    })();
</script>
