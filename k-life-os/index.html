<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌀 Сакральне коло 12 сфер · Оракул долі</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: radial-gradient(ellipse at 40% 50%, #0a0a1a, #010105);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', 'Times New Roman', serif;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
        }
        .info-panel {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        .message {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            padding: 0.7rem 1.8rem;
            display: inline-block;
            max-width: 85vw;
            font-size: 1rem;
            font-weight: 400;
            color: #f5e6c8;
            border: 1px solid rgba(210, 180, 140, 0.6);
            box-shadow: 0 0 25px rgba(210, 150, 80, 0.3);
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
            font-family: monospace;
        }
        .controls {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 20;
            display: flex;
            gap: 0.8rem;
            background: rgba(10, 15, 35, 0.6);
            backdrop-filter: blur(12px);
            padding: 0.4rem 1rem;
            border-radius: 3rem;
            border: 1px solid rgba(210, 180, 140, 0.5);
            pointer-events: auto;
        }
        button {
            background: rgba(30, 40, 70, 0.9);
            border: none;
            color: #f0e6d0;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
        }
        button:hover {
            background: #d9a13b;
            color: #0a0a1a;
            box-shadow: 0 0 12px #e6b85e;
            transform: scale(1.02);
        }
        .history {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            font-size: 0.65rem;
            color: #b9ad7a;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            z-index: 15;
            max-width: 40vw;
            white-space: nowrap;
            overflow-x: auto;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            .controls { top: 1rem; right: 1rem; gap: 0.4rem; }
            .message { font-size: 0.7rem; padding: 0.4rem 1rem; }
            button { padding: 0.2rem 0.7rem; font-size: 0.7rem; }
            .history { font-size: 0.55rem; bottom: 0.7rem; left: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="sacredCanvas"></canvas>
    <div class="info-panel">
        <div class="message" id="msg">🌀 торкнись будь-якого сектора</div>
    </div>
    <div class="controls">
        <button id="randomBtn">✨ випадкова сфера</button>
        <button id="copyBtn">📋 скопіювати</button>
    </div>
    <div class="history" id="historyLog"></div>
</div>

<script>
    (function() {
        // ========== 12 СФЕР ЖИТТЯ (повні назви з емодзі) ==========
        const SPHERES = [
            { emoji: "🚀", name: "Creativity or Self-Expression", archetype: "Творець" },
            { emoji: "🧑‍🔬", name: "Personal Development or Self-Care", archetype: "Мудрець" },
            { emoji: "🏘", name: "Domestic Life or Household Management", archetype: "Хранителька" },
            { emoji: "💴", name: "Finance", archetype: "Господар" },
            { emoji: "🤝", name: "Parenting or Family", archetype: "Захисник" },
            { emoji: "📚", name: "Recreation and Hobbies", archetype: "Гравець" },
            { emoji: "🗣️", name: "Community Involvement or Social Connection", archetype: "Зв'язкова" },
            { emoji: "🌳", name: "Physical Health", archetype: "Цілитель" },
            { emoji: "🔎", name: "Career or Education", archetype: "Шукач" },
            { emoji: "🌿", name: "Environmental or Charitable Causes", archetype: "Опікун Землі" },
            { emoji: "👥", name: "Personal Relationship", archetype: "Коханий" },
            { emoji: "🧘", name: "Spirituality", archetype: "Провідник" }
        ];

        // ========== БАГАТА БАЗА ГЛИБОКИХ ФРАЗ (для кожної сфери) ==========
        const PHRASES_BY_SPHERE = [
            [ "Творчість — між небом і землею", "Кожен мазок — це молитва", "Створюй так, ніби ніхто не дивиться", "У тобі живе вічний архітектор", "Безформне чекає на твою форму" ],
            [ "Ти — сад, який потребує догляду", "Щоденний маленький крок змінює все", "Саморозвиток — це не спринт, а танець", "Простягни руку собі вчорашній", "Мудрість приходить через тишу" ],
            [ "Дім — це дзеркало твоєї душі", "Ритуал затишку змінює енергію", "Прибери з любов'ю — простір віддячить", "Запали свічку на згадку про себе", "Святилище починається з однієї речі" ],
            [ "Гроші люблять повагу, а не страх", "Фінансова грамотність — це свобода", "Вдячність за кожну монету творить потік", "Ти гідна достатку", "Бюджет — це карта твоїх цінностей" ],
            [ "Родина — це не обов'язок, а гавань", "Обійми лікують там, де слова безсилі", "Традиції тримають покоління", "Дай дитині крила, а не клітку", "Ти — ланка нескінченного кола" ],
            [ "Хобі — це голос внутрішньої дитини", "Гра — найсерйозніша справа", "Відпочинок зцілює краще за ліки", "Дозволь собі радіти без причини", "Творча перерва — це інвестиція" ],
            [ "Разом ми — зірки одного сузір'я", "Маленька допомога змінює світ", "Твій голос має значення", "Спільнота народжується з довіри", "Даруй увагу — отримуй диво" ],
            [ "Твоє тіло — храм, дбай про нього", "Рух — це молитва", "Слухай, що шепоче твоя плоть", "Зцілення починається з дихання", "Сила в гнучкості, а не в напрузі" ],
            [ "Кар'єра — це гра, а не війна", "Роби те, що має сенс", "Навик, який змінить усе, вже в тобі", "Успіх — це наслідок радості", "Кожен проєкт — це нова пригода" ],
            [ "Планета дихає разом із тобою", "Екозвичка — це подяка землі", "Ти можеш змінити світ, починаючи з себе", "Навіть одна відмова від пластику рятує", "Природа — найкраща лікарка" ],
            [ "Справжні стосунки — це безпека", "Слухати — це найвища форма любові", "Кордони не руйнують, а зміцнюють", "Ти гідна ніжності", "Любов без умов починається з себе" ],
            [ "Духовність — це повернення додому", "Тиша відкриває відповіді", "Ти — іскра вічного вогню", "Медитація — це зустріч із собою", "Всесвіт шепоче — прислухайся" ]
        ];

        // ========== ГЛОБАЛЬНІ ЗМІННІ ==========
        const canvas = document.getElementById("sacredCanvas");
        const ctx = canvas.getContext("2d");
        let width, height, centerX, centerY;
        let radius = 280;          // радіус кола
        let angleOffset = 0;
        let rotationSpeed = 0.002; // повільне обертання
        let hoverIndex = -1;
        let activeIndex = -1;
        let lastMessage = "";
        let history = [];

        // Елементи UI
        const msgDiv = document.getElementById("msg");
        const randomBtn = document.getElementById("randomBtn");
        const copyBtn = document.getElementById("copyBtn");
        const historyDiv = document.getElementById("historyLog");

        // Частинки зоряного пилу
        let particles = [];

        // ---------- ФУНКЦІЇ РОЗМІРІВ ТА ЧАСТИНОК ----------
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2;
            centerY = height / 2;
            radius = Math.min(width, height) * 0.27;
            initParticles();
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 300; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    rad: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.5 + 0.2,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: (Math.random() - 0.5) * 0.1
                });
            }
        }

        function updateParticles() {
            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < -20) p.x = width + 20;
                if (p.x > width + 20) p.x = -20;
                if (p.y < -20) p.y = height + 20;
                if (p.y > height + 20) p.y = -20;
            }
        }

        // ---------- ВИЗНАЧЕННЯ ІНДЕКСУ ПІД МИШЕЮ ----------
        function getSegmentIndex(mx, my) {
            const dx = mx - centerX;
            const dy = my - centerY;
            const dist = Math.hypot(dx, dy);
            if (dist > radius + 12 || dist < radius * 0.45) return -1;
            let angle = Math.atan2(dy, dx) - angleOffset;
            angle = (angle + Math.PI * 2) % (Math.PI * 2);
            const step = (Math.PI * 2) / 12;
            return Math.floor(angle / step);
        }

        // ---------- МАЛЮВАННЯ САКРАЛЬНОГО КОЛА ----------
        function drawSegment(idx, startAng, endAng, isHover, isActive) {
            // Основний колір – залежить від індексу та часу (легка зміна, щоб "дихало")
            const hue = (idx * 30 + Date.now() * 0.1) % 360;
            let fillColor;
            if (isActive) fillColor = `hsl(45, 95%, 65%)`;          // золотий спалах
            else if (isHover) fillColor = `hsl(${hue}, 85%, 60%)`;
            else fillColor = `hsl(${hue}, 70%, 45%)`;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, startAng, endAng);
            ctx.arc(centerX, centerY, radius * 0.45, endAng, startAng, true);
            ctx.closePath();
            ctx.fillStyle = fillColor;
            ctx.fill();
            ctx.strokeStyle = "rgba(255, 215, 140, 0.8)";
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // Додаємо внутрішню лінію (енергетичний промінь)
            const midAng = startAng + (endAng - startAng)/2;
            const innerR = radius * 0.48;
            const outerR = radius * 0.92;
            const x1 = centerX + Math.cos(midAng) * innerR;
            const y1 = centerY + Math.sin(midAng) * innerR;
            const x2 = centerX + Math.cos(midAng) * outerR;
            const y2 = centerY + Math.sin(midAng) * outerR;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = isActive ? "#fff5cc" : "rgba(255, 220, 120, 0.7)";
            ctx.lineWidth = 2;
            ctx.stroke();

            // Номер сфери
            const txtR = radius * 0.72;
            const tx = centerX + Math.cos(midAng) * txtR;
            const ty = centerY + Math.sin(midAng) * txtR;
            ctx.font = `bold ${Math.max(16, radius * 0.09)}px "Segoe UI"`;
            ctx.fillStyle = isActive ? "#1f1a0a" : "#fffae6";
            ctx.shadowBlur = 5;
            ctx.shadowColor = "#ffaa66";
            ctx.fillText(idx+1, tx-11, ty+7);
            ctx.shadowBlur = 0;
        }

        function drawCenter() {
            // Внутрішній ореол
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.32, 0, Math.PI*2);
            ctx.fillStyle = "#1e1e3a";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.18, 0, Math.PI*2);
            ctx.fillStyle = "#e6b85e";
            ctx.fill();
            ctx.font = `28px "Segoe UI Symbol"`;
            ctx.fillStyle = "#1f1a0a";
            ctx.fillText("⚛️", centerX-17, centerY+11);
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, width, height);
            grad.addColorStop(0, "#0a0a1a");
            grad.addColorStop(1, "#010105");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            // зірки
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.rad, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 240, 200, ${p.alpha * 0.7})`;
                ctx.fill();
            }
        }

        function drawWheel() {
            drawBackground();
            const step = (Math.PI * 2) / 12;
            for (let i = 0; i < 12; i++) {
                const start = i * step + angleOffset;
                const end = (i+1) * step + angleOffset;
                const isHover = (hoverIndex === i);
                const isActive = (activeIndex === i);
                drawSegment(i, start, end, isHover, isActive);
            }
            drawCenter();
        }

        // ---------- АНІМАЦІЯ ----------
        function animate() {
            angleOffset += rotationSpeed;
            updateParticles();
            drawWheel();
            requestAnimationFrame(animate);
        }

        // ---------- ОТРИМАННЯ ВИПАДКОВОЇ ФРАЗИ ДЛЯ СФЕРИ ----------
        function getRandomPhrase(sphereIdx) {
            const arr = PHRASES_BY_SPHERE[sphereIdx];
            if (!arr) return "✨ Слухай своє серце";
            return arr[Math.floor(Math.random() * arr.length)];
        }

        // ---------- ВІДОБРАЖЕННЯ ПОВІДОМЛЕННЯ ТА ОНОВЛЕННЯ ІСТОРІЇ ----------
        function setMessage(sphereIdx, phrase) {
            const sphere = SPHERES[sphereIdx];
            lastMessage = `${sphere.emoji} ${sphere.name} · ${phrase}`;
            msgDiv.style.opacity = "0";
            setTimeout(() => {
                msgDiv.innerHTML = `🌀 ${lastMessage}`;
                msgDiv.style.opacity = "1";
            }, 40);
            // Історія (зберігаємо тільки назву + емодзі)
            history.unshift(`${sphere.emoji} ${sphere.name.substring(0, 28)}`);
            if (history.length > 6) history.pop();
            historyDiv.innerHTML = `📜 історія: ${history.join(' · ')}`;
        }

        // ---------- ВИБІР СФЕРИ (КЛІК АБО ВИПАДКОВИЙ) ----------
        function selectSphere(index, addToHistory = true) {
            activeIndex = index;
            const phrase = getRandomPhrase(index);
            setMessage(index, phrase);
            // Ефект «пульсації» — тимчасове прискорення обертання
            const originalSpeed = rotationSpeed;
            rotationSpeed = 0.025;
            setTimeout(() => { rotationSpeed = originalSpeed; }, 400);
            // Зняти підсвітку через 1 секунду
            setTimeout(() => {
                if (activeIndex === index) activeIndex = -1;
            }, 1000);
        }

        function randomSphere() {
            const rand = Math.floor(Math.random() * 12);
            selectSphere(rand, true);
        }

        // ---------- ВЗАЄМОДІЯ З МИШЕЮ/ДОТИКОМ ----------
        function onMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mx, my;
            if (e.touches) {
                mx = (e.touches[0].clientX - rect.left) * scaleX;
                my = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                mx = (e.clientX - rect.left) * scaleX;
                my = (e.clientY - rect.top) * scaleY;
            }
            const idx = getSegmentIndex(mx, my);
            if (idx !== hoverIndex) {
                hoverIndex = idx;
                canvas.style.cursor = (hoverIndex !== -1) ? "pointer" : "default";
            }
        }

        function onMouseLeave() {
            hoverIndex = -1;
            canvas.style.cursor = "default";
        }

        function onCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mx, my;
            if (e.touches) {
                mx = (e.touches[0].clientX - rect.left) * scaleX;
                my = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                mx = (e.clientX - rect.left) * scaleX;
                my = (e.clientY - rect.top) * scaleY;
            }
            const idx = getSegmentIndex(mx, my);
            if (idx !== -1) {
                selectSphere(idx, true);
            }
        }

        function copyToClipboard() {
            if (lastMessage) {
                navigator.clipboard.writeText(lastMessage);
                const original = msgDiv.innerText;
                msgDiv.innerHTML = "✅ скопійовано!";
                setTimeout(() => { msgDiv.innerHTML = original; }, 1200);
            } else {
                msgDiv.innerHTML = "🌀 спочатку оберіть сферу";
                setTimeout(() => {
                    msgDiv.innerHTML = lastMessage || "🌀 торкнись будь-якого сектора";
                }, 1500);
            }
        }

        // ---------- ПОДІЇ ТА ІНІЦІАЛІЗАЦІЯ ----------
        function bindEvents() {
            canvas.addEventListener("mousemove", onMouseMove);
            canvas.addEventListener("mouseleave", onMouseLeave);
            canvas.addEventListener("click", onCanvasClick);
            canvas.addEventListener("touchmove", (e) => { e.preventDefault(); onMouseMove(e); });
            canvas.addEventListener("touchend", onMouseLeave);
            canvas.addEventListener("touchstart", (e) => { e.preventDefault(); onCanvasClick(e); });
            randomBtn.addEventListener("click", randomSphere);
            copyBtn.addEventListener("click", copyToClipboard);
        }

        function init() {
            resizeCanvas();
            bindEvents();
            animate();
            window.addEventListener("resize", () => {
                resizeCanvas();
                initParticles();
            });
            // Стартова випадкова сфера для настрою
            setTimeout(() => {
                randomSphere();
            }, 300);
        }

        init();
    })();
</script>
</body>
</html>
