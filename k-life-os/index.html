<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Неоновий оракул · 12 сфер життя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f2a, #010108);
            font-family: 'Segoe UI', 'Inter', 'Times New Roman', serif;
            min-height: 100vh;
            padding: 1.5rem;
            color: #f0e6d0;
        }
        /* фон з частинками */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(255, 215, 150, 0.4);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        /* верхня панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(10, 20, 35, 0.6);
            backdrop-filter: blur(12px);
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .lang-switch {
            display: flex;
            gap: 0.5rem;
        }
        .lang-btn {
            background: none;
            border: none;
            color: #b9c7e8;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .lang-btn.active {
            background: #0ff;
            color: #010312;
            box-shadow: 0 0 8px cyan;
        }
        .api-area {
            display: flex;
            gap: 0.5rem;
            background: #0a1022cc;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
        }
        .api-area input {
            background: #1a2a3a;
            border: none;
            color: #f0e6d0;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            width: 180px;
        }
        .api-area button {
            background: #d4af37;
            border: none;
            border-radius: 2rem;
            padding: 0.1rem 0.6rem;
            cursor: pointer;
            font-size: 0.7rem;
        }
        /* сітка карток */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .sphere-neon-card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .sphere-neon-card:hover {
            transform: translateY(-6px);
            border-color: #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            background: rgba(25, 45, 75, 0.8);
        }
        .card-emoji {
            font-size: 2rem;
            display: inline-block;
            margin-right: 0.5rem;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            display: inline-block;
            vertical-align: middle;
        }
        .card-short {
            font-size: 0.7rem;
            color: #bbd0ff;
            margin-top: 0.5rem;
            border-left: 2px solid #0ff;
            padding-left: 0.6rem;
        }
        /* історія */
        .history-bar {
            background: rgba(0,0,0,0.5);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-top: 1rem;
        }
        .history-list {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .history-item {
            background: #1a2a3a;
            border-radius: 2rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
        }
        .copy-btn {
            background: #d4af37;
            border: none;
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            cursor: pointer;
        }
        /* модальне вікно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #0e1a28;
            border-radius: 2rem;
            max-width: 550px;
            width: 90%;
            border: 2px solid #0ff;
            box-shadow: 0 0 40px rgba(0,255,255,0.3);
            overflow: hidden;
        }
        .modal-header {
            padding: 1rem 1.5rem;
            background: #0a1522;
            border-bottom: 1px solid #0ff3;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .modal-close {
            background: none;
            border: none;
            color: #0ff;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal-body {
            padding: 1.5rem;
        }
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            font-style: italic;
            border-left: 3px solid #ffaa44;
            padding-left: 1rem;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
        }
        .option-btn {
            background: #1e2f44;
            border: 1px solid #3a5a7a;
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            color: #e6f0ff;
            font-size: 0.85rem;
        }
        .option-btn:hover {
            background: #2a4a6a;
            border-color: #0ff;
        }
        .modal-footer {
            padding: 1rem 1.5rem;
            background: #0a1522;
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            border-top: 1px solid #0ff3;
        }
        .modal-footer button {
            background: #2a4a6a;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        .timer-hint {
            font-size: 0.7rem;
            color: #ffaa66;
            text-align: center;
            margin-top: 0.5rem;
        }
        @media (max-width: 700px) {
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="container">
    <div class="top-bar">
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="ua">UA</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <div class="api-area">
            <input type="text" id="groqKey" placeholder="Groq API key (gsk_...)" autocomplete="off">
            <button id="saveKeyBtn">💾</button>
        </div>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
    <div class="history-bar">
        <div class="history-list" id="historyList"></div>
        <button class="copy-btn" id="copyHistoryBtn">📋 COPY</button>
    </div>
    <div class="timer-hint" id="timerHint"></div>
</div>

<!-- Модальне вікно -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">Сфера</span>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body">
            <div class="question-text" id="modalQuestion">Завантаження...</div>
            <div class="options-list" id="modalOptions"></div>
        </div>
        <div class="modal-footer">
            <button id="modalCopyBtn">📋 Копіювати питання</button>
            <button id="modalCloseBtn">Закрити</button>
        </div>
    </div>
</div>

<script>
    // ---------- ДАНІ СФЕР ----------
    const SPHERES = {
        ua: [
            { emoji: "🚀", name: "Творчість або Самовираження", short: "Творчість" },
            { emoji: "🧑‍🔬", name: "Особистий розвиток або Турбота про себе", short: "Саморозвиток" },
            { emoji: "🏘", name: "Домашнє життя або Ведення господарства", short: "Дім" },
            { emoji: "💴", name: "Фінанси", short: "Фінанси" },
            { emoji: "🤝", name: "Батьківство або Сім'я", short: "Сім'я" },
            { emoji: "📚", name: "Відпочинок і Хобі", short: "Хобі" },
            { emoji: "🗣️", name: "Спільнота або Соціальні зв'язки", short: "Спільнота" },
            { emoji: "🌳", name: "Фізичне здоров'я", short: "Здоров'я" },
            { emoji: "🔎", name: "Кар'єра або Освіта", short: "Кар'єра" },
            { emoji: "🌿", name: "Екологія або Благодійність", short: "Екологія" },
            { emoji: "👥", name: "Особисті стосунки", short: "Стосунки" },
            { emoji: "🧘", name: "Духовність", short: "Духовність" }
        ],
        en: [
            { emoji: "🚀", name: "Creativity or Self-Expression", short: "Creativity" },
            { emoji: "🧑‍🔬", name: "Personal Development or Self-Care", short: "Self-Development" },
            { emoji: "🏘", name: "Domestic Life or Household Management", short: "Home" },
            { emoji: "💴", name: "Finance", short: "Finance" },
            { emoji: "🤝", name: "Parenting or Family", short: "Family" },
            { emoji: "📚", name: "Recreation and Hobbies", short: "Hobbies" },
            { emoji: "🗣️", name: "Community Involvement or Social Connection", short: "Community" },
            { emoji: "🌳", name: "Physical Health", short: "Health" },
            { emoji: "🔎", name: "Career or Education", short: "Career" },
            { emoji: "🌿", name: "Environmental or Charitable Causes", short: "Ecology" },
            { emoji: "👥", name: "Personal Relationship", short: "Relationships" },
            { emoji: "🧘", name: "Spirituality", short: "Spirituality" }
        ]
    };

    // Локальна база питань з варіантами (для fallback)
    const LOCAL_QUESTIONS = {
        ua: [
            { q: "Якби страх зник, що б ти створила?", opts: ["🎨 Намалювати картину", "📝 Написати вірш", "🎭 Вийти на сцену"] },
            { q: "Яка звичка виснажує тебе, але ти її тримаєшся?", opts: ["Прокрастинація", "Скролінг соцмереж", "Надмірна самокритика"] },
            { q: "Який емоційний слід залишив твій дім у твоїй душі?", opts: ["Тепло", "Тривога", "Свобода"] },
            { q: "Якби гроші не мали значення, чим би ти займалась?", opts: ["Подорожі", "Творчість", "Допомога іншим"] },
            { q: "Яку роль ти граєш у сім'ї, і чи хочеш її змінити?", opts: ["Миротворець", "Відповідальна", "Спостерігач"] },
            { q: "Чому ти не дозволяєш собі відпочивати без провини?", opts: ["Відчуття обов'язку", "Страх осуду", "Звичка"] },
            { q: "Де ти шукаєш прийняття, але не знаходиш?", opts: ["Робота", "Соцмережі", "Стосунки"] },
            { q: "Як твоє тіло намагається з тобою говорити?", opts: ["Біль", "Втома", "Легкість"] },
            { q: "Що ти робиш не через покликання, а через страх?", opts: ["Робота", "Навчання", "Стосунки"] },
            { q: "Як твоя повсякденність впливає на планету?", opts: ["Відходи", "Транспорт", "Енергія"] },
            { q: "Які стосунки ти терпиш, хоча вони тебе руйнують?", opts: ["Дружба", "Романтичні", "Родинні"] },
            { q: "Де ти втрачаєш себе, намагаючись догодити іншим?", opts: ["Робота", "Сім'я", "Соціум"] }
        ],
        en: [
            { q: "If fear disappeared, what would you create?", opts: ["Paint a picture", "Write a poem", "Perform on stage"] },
            { q: "Which habit drains you but you keep it?", opts: ["Procrastination", "Social media scrolling", "Self-criticism"] },
            { q: "What emotional trace did your home leave in your soul?", opts: ["Warmth", "Anxiety", "Freedom"] },
            { q: "If money didn't matter, what would you do?", opts: ["Travel", "Create art", "Help others"] },
            { q: "What role do you play in your family?", opts: ["Peacemaker", "Responsible one", "Observer"] },
            { q: "Why don't you allow yourself to rest without guilt?", opts: ["Sense of duty", "Fear of judgment", "Habit"] },
            { q: "Where do you seek acceptance but don't find it?", opts: ["Work", "Social media", "Relationships"] },
            { q: "How is your body trying to speak to you?", opts: ["Pain", "Fatigue", "Lightness"] },
            { q: "What do you do not out of calling but out of fear?", opts: ["Work", "Study", "Relationships"] },
            { q: "How does your daily life affect the planet?", opts: ["Waste", "Transport", "Energy"] },
            { q: "Which relationships do you tolerate though they harm you?", opts: ["Friendship", "Romantic", "Family"] },
            { q: "Where do you lose yourself trying to please others?", opts: ["Work", "Family", "Society"] }
        ]
    };

    let currentLang = "ua";
    let currentSpheres = SPHERES.ua;
    let groqApiKey = localStorage.getItem("groq_api_key") || "";
    let lastGenerated = null; // { sphereId, question, options, timestamp }
    let history = []; // масив { sphereShort, questionPreview }
    let lastSpinTime = 0;
    const COOLDOWN_MS = 3600000; // 1 година

    // DOM
    const cardsGrid = document.getElementById("cardsGrid");
    const historyListDiv = document.getElementById("historyList");
    const timerHint = document.getElementById("timerHint");
    const groqKeyInput = document.getElementById("groqKey");
    const saveKeyBtn = document.getElementById("saveKeyBtn");
    const copyHistoryBtn = document.getElementById("copyHistoryBtn");
    const modalOverlay = document.getElementById("modalOverlay");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalClose = document.getElementById("modalClose");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const modalCopyBtn = document.getElementById("modalCopyBtn");

    if (groqApiKey) groqKeyInput.value = groqApiKey;

    // Генерація частинок
    function createParticles() {
        const container = document.getElementById("particles");
        for (let i = 0; i < 80; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            const size = Math.random() * 4 + 1;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.left = `${Math.random() * 100}%`;
            p.style.animationDelay = `${Math.random() * 15}s`;
            p.style.animationDuration = `${8 + Math.random() * 10}s`;
            container.appendChild(p);
        }
    }
    createParticles();

    // Отримання через Groq (ситуативне питання + варіанти)
    async function generateQuestionWithOptions(sphereName) {
        const prompt = currentLang === "ua" 
            ? `Ти — мудрий оракул. Придумай одне глибоке ситуативне питання для сфери життя "${sphereName}" та 3-4 варіанти відповідей (кожен короткий, 3-7 слів). Формат виводу: спочатку питання, потім новий рядок, потім варіанти через кому. Не використовуй зайві символи.`
            : `You are a wise oracle. Create one deep situational question for the life sphere "${sphereName}" and 3-4 answer options (each short, 3-7 words). Output format: question first, then new line, then options separated by commas. No extra symbols.`;
        
        if (!groqApiKey) {
            // локальний fallback
            const local = LOCAL_QUESTIONS[currentLang];
            const idx = Math.floor(Math.random() * local.length);
            return { question: local[idx].q, options: local[idx].opts };
        }
        
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${groqApiKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama3-8b-8192", messages: [{ role: "user", content: prompt }], temperature: 0.9, max_tokens: 200 })
            });
            if (!response.ok) throw new Error("API error");
            const data = await response.json();
            let text = data.choices[0].message.content.trim();
            // парсинг: перший рядок – питання, далі – варіанти через кому
            let lines = text.split(/\r?\n/);
            let question = lines[0].replace(/^["']|["']$/g, '');
            let optionsStr = lines.slice(1).join(' ').replace(/^["']|["']$/g, '');
            let options = optionsStr.split(',').map(s => s.trim()).filter(s => s.length > 0);
            if (options.length < 2) options = ["Так", "Ні", "Можливо"];
            return { question, options };
        } catch (err) {
            console.warn("Groq failed, using local", err);
            const local = LOCAL_QUESTIONS[currentLang];
            const idx = Math.floor(Math.random() * local.length);
            return { question: local[idx].q, options: local[idx].opts };
        }
    }

    // Показати модалку з питаннями
    async function showModal(sphereId) {
        const now = Date.now();
        if (lastSpinTime && (now - lastSpinTime) < COOLDOWN_MS) {
            const left = Math.ceil((COOLDOWN_MS - (now - lastSpinTime)) / 60000);
            timerHint.innerText = currentLang === "ua" ? `⏳ наступний оракул через ${left} хв` : `⏳ next oracle in ${left} min`;
            return;
        }
        const sphere = currentSpheres[sphereId];
        modalTitle.innerHTML = `${sphere.emoji} ${sphere.name}`;
        modalQuestion.innerHTML = "✨ Запитую оракула...";
        modalOptions.innerHTML = "";
        modalOverlay.classList.add("active");
        
        const result = await generateQuestionWithOptions(sphere.name);
        modalQuestion.innerHTML = result.question;
        modalOptions.innerHTML = "";
        result.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = opt;
            btn.onclick = () => {
                // можна додати збереження вибору, але поки просто повідомлення
                alert(`✨ Ви обрали: ${opt}\nЗапишіть цю думку собі.`);
            };
            modalOptions.appendChild(btn);
        });
        
        // зберігаємо в історію
        const preview = sphere.short;
        history.unshift({ sphereShort: preview, questionPreview: result.question.substring(0, 50) });
        if (history.length > 6) history.pop();
        updateHistoryUI();
        
        lastSpinTime = Date.now();
        lastGenerated = { sphereId, question: result.question, options: result.options, timestamp: lastSpinTime };
        timerHint.innerText = currentLang === "ua" ? `✅ оракул відповів! наступний через 1 годину` : `✅ oracle answered! next in 1 hour`;
        setTimeout(() => {
            if ((Date.now() - lastSpinTime) > COOLDOWN_MS) timerHint.innerText = "";
        }, 5000);
    }
    
    function updateHistoryUI() {
        historyListDiv.innerHTML = history.map(h => `<div class="history-item">${h.sphereShort}</div>`).join('');
    }
    
    function copyHistory() {
        const text = history.map(h => `${h.sphereShort}: ${h.questionPreview}`).join('\n');
        navigator.clipboard.writeText(text);
        alert("Історія скопійована!");
    }
    
    // Побудова карток
    function buildCards() {
        cardsGrid.innerHTML = "";
        currentSpheres.forEach((sphere, idx) => {
            const card = document.createElement("div");
            card.className = "sphere-neon-card";
            card.innerHTML = `
                <div><span class="card-emoji">${sphere.emoji}</span><span class="card-title">${sphere.short}</span></div>
                <div class="card-short">${sphere.name}</div>
            `;
            card.onclick = () => showModal(idx);
            cardsGrid.appendChild(card);
        });
    }
    
    function setLanguage(lang) {
        currentLang = lang;
        currentSpheres = SPHERES[lang];
        document.querySelectorAll(".lang-btn").forEach(btn => {
            if (btn.dataset.lang === lang) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        buildCards();
    }
    
    function saveApiKey() {
        const key = groqKeyInput.value.trim();
        if (key && key.startsWith("gsk_")) {
            groqApiKey = key;
            localStorage.setItem("groq_api_key", key);
            alert("API ключ збережено!");
        } else if (key) {
            alert("Невірний формат ключа Groq (має починатися з gsk_)");
        }
    }
    
    // Події модалки
    modalClose.onclick = () => modalOverlay.classList.remove("active");
    modalCloseBtn.onclick = () => modalOverlay.classList.remove("active");
    modalCopyBtn.onclick = () => {
        if (lastGenerated) {
            const text = `${lastGenerated.question}\n${lastGenerated.options.join('\n')}`;
            navigator.clipboard.writeText(text);
            alert("Питання скопійовано!");
        }
    };
    
    document.querySelectorAll(".lang-btn").forEach(btn => btn.onclick = () => setLanguage(btn.dataset.lang));
    saveKeyBtn.onclick = saveApiKey;
    copyHistoryBtn.onclick = copyHistory;
    
    buildCards();
    updateHistoryUI();
</script>
</body>
</html>
