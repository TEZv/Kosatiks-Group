<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎡 Рулетка Сфер Життя · Оракул Долі</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #03060c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', 'Poppins', system-ui, sans-serif;
            overflow: hidden;
            padding: 1rem;
        }

        .roulette-container {
            position: relative;
            width: min(95vw, 95vh, 700px);
            height: min(95vw, 95vh, 700px);
            margin: auto;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.3), inset 0 0 20px rgba(0,0,0,0.5);
            background: #1a1f2e;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls {
            position: absolute;
            bottom: -80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            z-index: 20;
        }

        button {
            background: radial-gradient(circle at 30% 20%, #f5b042, #c9771e);
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 3rem;
            font-weight: bold;
            font-size: 1.1rem;
            color: #0f1722;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #7a3a10;
            font-family: inherit;
            letter-spacing: 1px;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a3a10;
        }
        button:disabled {
            opacity: 0.6;
            transform: translateY(0);
            cursor: not-allowed;
        }

        .result-panel {
            position: absolute;
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            padding: 0.5rem 1.5rem;
            white-space: nowrap;
            font-size: 1rem;
            font-weight: 500;
            color: #ffefcf;
            border: 1px solid #ffb347;
            box-shadow: 0 0 20px rgba(255,180,0,0.3);
            z-index: 15;
            font-family: monospace;
            max-width: 90vw;
            overflow-x: auto;
            white-space: normal;
            text-align: center;
        }

        .history {
            position: absolute;
            bottom: -120px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 0.3rem;
            border-radius: 2rem;
            width: fit-content;
            margin: 0 auto;
            white-space: nowrap;
            overflow-x: auto;
            max-width: 90vw;
        }

        @media (max-width: 700px) {
            .roulette-container { width: 85vw; height: 85vw; }
            .result-panel { top: -60px; font-size: 0.7rem; padding: 0.3rem 1rem; }
            button { padding: 0.5rem 1rem; font-size: 0.8rem; }
            .history { bottom: -90px; font-size: 0.6rem; }
        }
    </style>
</head>
<body>
<div style="position: relative; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div class="roulette-container">
        <canvas id="wheelCanvas" width="700" height="700"></canvas>
        <div class="controls">
            <button id="spinBtn">🎲 КИНУТИ КУЛЬКУ 🎲</button>
        </div>
        <div class="result-panel" id="resultMessage">🌀 Натисніть «Кинути кульку»</div>
        <div class="history" id="historyLog"></div>
    </div>
</div>

<script>
    (function() {
        // ==================== ТОЧНІ 12 СФЕР (з емодзі) ====================
        const SPHERES = [
            { emoji: "🚀", name: "Creativity or Self-Expression" },
            { emoji: "🧑‍🔬", name: "Personal Development or Self-Care" },
            { emoji: "🏘", name: "Domestic Life or Household Management" },
            { emoji: "💴", name: "Finance" },
            { emoji: "🤝", name: "Parenting or Family" },
            { emoji: "📚", name: "Recreation and Hobbies" },
            { emoji: "🗣️", name: "Community Involvement or Social Connection" },
            { emoji: "🌳", name: "Physical Health" },
            { emoji: "🔎", name: "Career or Education" },
            { emoji: "🌿", name: "Environmental or Charitable Causes" },
            { emoji: "👥", name: "Personal Relationship" },
            { emoji: "🧘", name: "Spirituality" }
        ];

        // ==================== БАГАТО СЕНСОВНИХ ФРАЗ (БЕЗ ГЕНЕРАЦІЇ) ====================
        const ORACLE_PHRASES = [
            "🌟 Час діяти — всесвіт підтримує",
            "🌙 Прислухайся до внутрішнього шепоту",
            "🏠 Затишок починається з тебе",
            "💎 Фінансова свобода — це рішення",
            "💖 Родина — це тиха гавань",
            "🎨 Твоє хобі — ключ до натхнення",
            "🤝 Одна добра справа змінює день",
            "💪 Твоє тіло — храм, дбай про нього",
            "🚀 Маленький крок сьогодні — великий стрибок завтра",
            "🍃 Планета дякує за кожну екодію",
            "💞 Справжні стосунки починаються з любові до себе",
            "🕉️ Тиша відкриває відповіді"
        ];

        // Додаткові фрази для кожної сфери (щоб було різноманіття)
        const SPHERE_PHRASES = {
            0: ["🎨 Творчість лікує там, де слова безсилі", "✨ Створи щось недосконале — це і є магія", "🖌️ Твій внутрішній художник чекає на дозвіл"],
            1: ["🌱 Кожен день — нова версія тебе", "🧘 Саморозвиток не спринт, а танець", "📖 Читай, вчись, зростай без тиску"],
            2: ["🕯️ Одна свічка змінює атмосферу всього дому", "🏡 Затишок починається з дрібниць", "🧹 Прибери з любов'ю — простір віддячить"],
            3: ["💰 Гроші люблять турботу, а не страх", "💎 Фінансова грамотність — твоя суперсила", "📊 Маленькі заощадження створюють велику свободу"],
            4: ["👨‍👩‍👧 Родина — це не обов'язок, а безпечне місце", "💖 Обійми без причини лікують", "🤗 Сімейні традиції тримають світ"],
            5: ["🎯 Хобі — це твоя внутрішня дитина", "⚡ Відпочинок — не лінь, а перезавантаження", "🎮 Грай, щоб жити повніше"],
            6: ["🤝 Сила спільноти народжується з маленьких жестів", "🗣️ Твій голос має значення", "🌟 Допоможи одному — зміниш світ"],
            7: ["🏃‍♀️ Рух — це молитва тілу", "🌿 Твоє тіло шепоче — прислухайся", "💪 Здоров'я починається з дихання"],
            8: ["🚀 Кар'єра — це гра, а не війна", "📈 Роби те, що має сенс, і гроші прийдуть", "💼 Навик, який змінить усе, вже в тобі"],
            9: ["🍃 Маленька екозвичка рятує океан", "🌍 Ти можеш змінити планету, починаючи з себе", "♻️ Сортуй сміття — даруй майбутнє"],
            10: ["💞 Стосунки квітнуть, коли є повага", "🤲 Слухати — це також любов", "💖 Найкращий комплімент — щирість"],
            11: ["🕉️ Духовність — це повернення додому до себе", "🧘 Медитуй 5 хвилин — світ зміниться", "✨ Ти — частина великого космосу"]
        };

        // ==================== НАЛАШТУВАННЯ КОЛЕСА ====================
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        let width, height, centerX, centerY, radius;
        let anglePerSegment = (Math.PI * 2) / 12;
        let currentRotation = 0;          // кут повороту колеса (радіани)
        let spinning = false;
        let spinAnimation = null;
        let finalAngle = 0;
        let selectedIndex = -1;

        // Історія
        let historyList = [];

        // Елементи UI
        const spinBtn = document.getElementById("spinBtn");
        const resultDiv = document.getElementById("resultMessage");
        const historyDiv = document.getElementById("historyLog");

        function resizeCanvas() {
            const container = document.querySelector(".roulette-container");
            const size = container.clientWidth;
            canvas.width = size;
            canvas.height = size;
            width = size;
            height = size;
            centerX = size/2;
            centerY = size/2;
            radius = size/2 - 8;
            drawWheel();
        }

        // Малювання колеса
        function drawWheel() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            // фонова тінь
            ctx.shadowBlur = 0;
            for (let i = 0; i < 12; i++) {
                const start = i * anglePerSegment + currentRotation;
                const end = (i+1) * anglePerSegment + currentRotation;
                // градієнт для кожного сектора
                const gradient = ctx.createLinearGradient(centerX - radius*0.5, centerY - radius*0.5, centerX + radius*0.5, centerY + radius*0.5);
                const hue = (i * 30) % 360;
                gradient.addColorStop(0, `hsl(${hue}, 75%, 55%)`);
                gradient.addColorStop(1, `hsl(${hue}, 85%, 35%)`);
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, start, end);
                ctx.lineTo(centerX, centerY);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = "#ffdd99";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            // малюємо текст та емодзі на секторах (виправити поворот)
            for (let i = 0; i < 12; i++) {
                const midAngle = i * anglePerSegment + anglePerSegment/2 + currentRotation;
                const textRadius = radius * 0.7;
                const x = centerX + Math.cos(midAngle) * textRadius;
                const y = centerY + Math.sin(midAngle) * textRadius;
                ctx.font = `bold ${Math.max(12, radius * 0.07)}px "Segoe UI"`;
                ctx.fillStyle = "#fff8e7";
                ctx.shadowBlur = 4;
                ctx.shadowColor = "black";
                ctx.fillText(SPHERES[i].emoji, x-12, y-8);
                ctx.font = `${Math.max(10, radius * 0.05)}px "Segoe UI"`;
                ctx.fillStyle = "#ffffff";
                ctx.fillText((i+1).toString(), x-6, y+10);
                ctx.shadowBlur = 0;
            }
            // центральне коло
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.18, 0, Math.PI*2);
            ctx.fillStyle = "#f5b042";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.12, 0, Math.PI*2);
            ctx.fillStyle = "#7a3a10";
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = `bold ${radius * 0.1}px monospace`;
            ctx.fillText("🎯", centerX-10, centerY+8);
        }

        // Функція визначення індексу за кутом (де зараз верхня точка вказувача)
        // У нас вказівник – це просто візуальна стрілка, але ми будемо рахувати, який сектор знаходиться зверху (12 годин)
        function getSelectedIndexFromRotation() {
            // Верхня точка (12 годин) має кут -PI/2 відносно центру
            const pointerAngle = -Math.PI/2;
            // Знаходимо кут сектора відносно повороту колеса
            let rawAngle = pointerAngle - currentRotation;
            rawAngle = ((rawAngle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
            const idx = Math.floor(rawAngle / anglePerSegment);
            return idx % 12;
        }

        // Анімація обертання (симуляція кульки)
        function startSpin() {
            if (spinning) return;
            spinning = true;
            spinBtn.disabled = true;
            // Випадковий кінцевий кут (багато обертів)
            const spins = Math.floor(Math.random() * 10) + 15; // 15-25 обертів
            const extraAngle = (Math.random() * Math.PI * 2);
            const targetRotation = currentRotation + (spins * 2 * Math.PI) + extraAngle;
            const startTime = performance.now();
            const duration = 2500; // 2.5 секунди анімації

            function animateSpin(now) {
                const elapsed = now - startTime;
                let t = Math.min(1, elapsed / duration);
                // easeOutCubic
                const ease = 1 - Math.pow(1-t, 3);
                const newRotation = currentRotation + (targetRotation - currentRotation) * ease;
                currentRotation = newRotation;
                drawWheel();
                if (t < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    // фінальний кут
                    currentRotation = targetRotation % (2*Math.PI);
                    drawWheel();
                    const idx = getSelectedIndexFromRotation();
                    selectedIndex = idx;
                    // Показати результат
                    const sphere = SPHERES[selectedIndex];
                    const sphereSpecific = SPHERE_PHRASES[selectedIndex] || ORACLE_PHRASES;
                    let phraseArray = sphereSpecific;
                    if (Array.isArray(phraseArray)) {
                        phraseArray = phraseArray;
                    } else {
                        phraseArray = ORACLE_PHRASES;
                    }
                    const randomPhrase = phraseArray[Math.floor(Math.random() * phraseArray.length)];
                    const generalPhrase = ORACLE_PHRASES[Math.floor(Math.random() * ORACLE_PHRASES.length)];
                    const finalMessage = `${sphere.emoji} ${sphere.name} · ${randomPhrase}`;
                    resultDiv.innerHTML = `✨ ${finalMessage}`;
                    // Додати в історію
                    historyList.unshift(`${sphere.emoji} ${sphere.name}`);
                    if (historyList.length > 5) historyList.pop();
                    historyDiv.innerHTML = `📜 Історія: ${historyList.join(' · ')}`;
                    // Ефект спалаху на canvas
                    flashEffect();
                    spinning = false;
                    spinBtn.disabled = false;
                }
            }
            requestAnimationFrame(animateSpin);
        }

        function flashEffect() {
            const overlay = document.createElement('div');
            overlay.style.position = 'absolute';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.borderRadius = '50%';
            overlay.style.background = 'radial-gradient(circle, rgba(255,255,200,0.8) 0%, rgba(255,200,0,0) 80%)';
            overlay.style.pointerEvents = 'none';
            overlay.style.zIndex = '10';
            overlay.style.transition = 'opacity 0.4s';
            document.querySelector('.roulette-container').appendChild(overlay);
            setTimeout(() => { overlay.style.opacity = '0'; }, 50);
            setTimeout(() => { overlay.remove(); }, 500);
        }

        // Обробник кнопки
        spinBtn.addEventListener("click", startSpin);

        // Ініціалізація
        window.addEventListener("resize", () => {
            resizeCanvas();
            drawWheel();
        });
        resizeCanvas();
        drawWheel();

        // Додатковий декоративний елемент – статична стрілка зверху (вказівник)
        const container = document.querySelector('.roulette-container');
        const pointer = document.createElement('div');
        pointer.style.position = 'absolute';
        pointer.style.top = '-20px';
        pointer.style.left = '50%';
        pointer.style.transform = 'translateX(-50%)';
        pointer.style.width = '0';
        pointer.style.height = '0';
        pointer.style.borderLeft = '20px solid transparent';
        pointer.style.borderRight = '20px solid transparent';
        pointer.style.borderTop = '40px solid #ffd966';
        pointer.style.filter = 'drop-shadow(0 5px 6px black)';
        pointer.style.zIndex = '20';
        pointer.style.pointerEvents = 'none';
        container.appendChild(pointer);
        // Маленька кулька в центрі (статична декорація)
        const ballDeco = document.createElement('div');
        ballDeco.style.position = 'absolute';
        ballDeco.style.bottom = '10%';
        ballDeco.style.right = '10%';
        ballDeco.style.width = '25px';
        ballDeco.style.height = '25px';
        ballDeco.style.background = 'radial-gradient(circle at 30% 30%, white, silver)';
        ballDeco.style.borderRadius = '50%';
        ballDeco.style.boxShadow = '0 0 12px gold';
        ballDeco.style.zIndex = '15';
        ballDeco.style.pointerEvents = 'none';
        container.appendChild(ballDeco);
    })();
</script>
</body>
</html>
