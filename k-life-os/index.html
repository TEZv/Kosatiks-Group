<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎡 Рулетка Сфер · Оракул Життя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #0a1f1a 0%, #030a07 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', 'Times New Roman', serif;
            padding: 1rem;
        }
        .roulette-layout {
            max-width: 1500px;
            width: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            padding: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #d4af37;
        }
        .wheel-area {
            flex: 1.2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        canvas {
            width: 100%;
            max-width: 500px;
            height: auto;
            background: #1a3a2a;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #b8860b, 0 0 0 12px #d4af37, 0 15px 35px black;
        }
        .betting-area {
            flex: 0.9;
            min-width: 300px;
            background: #0f281f;
            border-radius: 2rem;
            padding: 1rem;
            border: 2px solid #d4af37;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 10px 20px black;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .lang-switch {
            display: flex;
            gap: 0.5rem;
        }
        .lang-btn {
            background: #2a4a3a;
            border: none;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            color: #f5e6b0;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .lang-btn.active {
            background: #d4af37;
            color: #0a1a12;
        }
        .api-settings {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            background: #0a1f18;
            padding: 0.4rem;
            border-radius: 2rem;
            align-items: center;
        }
        .api-settings input {
            background: #1a3a2a;
            border: none;
            color: #f9e2a1;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            width: 140px;
        }
        .api-settings button {
            background: #d4af37;
            border: none;
            padding: 0.1rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.6rem;
            cursor: pointer;
        }
        .betting-title {
            text-align: center;
            font-size: 1.2rem;
            color: #f7d97a;
            letter-spacing: 2px;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 0.3rem;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 0.3rem;
        }
        .sphere-card {
            background: rgba(30, 50, 70, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 0.5rem 0.3rem;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #e9d6a3;
            font-size: 0.7rem;
            font-weight: bold;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .sphere-card.selected-card {
            background: radial-gradient(circle, #f5b042, #b45f1b);
            color: #0f1a0e;
            border-color: #ffdf80;
            box-shadow: 0 0 15px #f5b042;
            transform: scale(1.01);
        }
        .sphere-emoji { font-size: 1.3rem; display: block; }
        .sphere-name-full { font-size: 0.65rem; font-weight: normal; line-height: 1.2; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 0.5rem 0;
        }
        button {
            background: radial-gradient(circle at 30% 20%, #f5b042, #b45f1b);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 0.85rem;
            color: #0f1a0e;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 3px 0 #5a2e0a;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #5a2e0a;
        }
        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .result-area {
            background: #0a1f18;
            border-radius: 1.5rem;
            padding: 0.5rem;
            border: 1px solid #d4af37;
            text-align: center;
        }
        .result-text {
            color: #f9e2a1;
            font-size: 0.85rem;
            word-break: break-word;
            line-height: 1.4;
        }
        .question-text {
            color: #ffdfa0;
            font-style: italic;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            border-top: 1px dashed #d4af37;
            padding-top: 0.5rem;
        }
        .history {
            margin-top: 0.4rem;
            font-size: 0.65rem;
            color: #c9b27c;
            overflow-x: auto;
            white-space: nowrap;
        }
        .timer-hint {
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffaa66;
            text-align: center;
            margin-top: 0.2rem;
            background: #0a1f18;
            padding: 0.2rem;
            border-radius: 2rem;
        }
        @media (max-width: 900px) {
            .roulette-layout { flex-direction: column; align-items: center; }
            .betting-area { width: 100%; }
            .cards-grid { max-height: 40vh; }
        }
    </style>
</head>
<body>
<div class="roulette-layout">
    <div class="wheel-area">
        <canvas id="rouletteCanvas" width="600" height="600" style="width:100%; height:auto; max-width:600px; aspect-ratio:1/1"></canvas>
        <div class="top-bar" style="width:100%; justify-content:center;">
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="ua">🇺🇦 UA</button>
                <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
            </div>
        </div>
    </div>
    <div class="betting-area">
        <div class="betting-title" id="titleField">✨ поле сфер ✨</div>
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="controls">
            <button id="spinBtn">🎲 SPIN THE BALL</button>
            <button id="copyBtn">📋 COPY</button>
        </div>
        <div class="result-area">
            <div class="result-text" id="resultMessage">🌀 натисніть SPIN</div>
            <div class="question-text" id="questionMessage"></div>
            <div class="history" id="historyLog"></div>
        </div>
        <div class="timer-hint" id="timerHint"></div>
        <div class="api-settings">
            <input type="text" id="groqKeyInput" placeholder="Groq API key (gsk_...)" autocomplete="off">
            <input type="text" id="proxyUrlInput" placeholder="https://your-proxy.vercel.app/api/groq">
            <button id="saveKeyBtn">💾</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- ДАНІ СФЕР (повні назви) ----------
        const SPHERES = {
            ua: [
                { emoji: "🚀", name: "Творчість або Самовираження", short: "Творчість" },
                { emoji: "🧑‍🔬", name: "Особистий розвиток або Турбота про себе", short: "Саморозвиток" },
                { emoji: "🏘", name: "Домашнє життя або Ведення господарства", short: "Дім" },
                { emoji: "💴", name: "Фінанси", short: "Фінанси" },
                { emoji: "🤝", name: "Батьківство або Сім'я", short: "Сім'я" },
                { emoji: "📚", name: "Відпочинок і Хобі", short: "Хобі" },
                { emoji: "🗣️", name: "Спільнота або Соціальні зв'язки", short: "Спільнота" },
                { emoji: "🌳", name: "Фізичне здоров'я", short: "Здоров'я" },
                { emoji: "🔎", name: "Кар'єра або Освіта", short: "Кар'єра" },
                { emoji: "🌿", name: "Екологія або Благодійність", short: "Екологія" },
                { emoji: "👥", name: "Особисті стосунки", short: "Стосунки" },
                { emoji: "🧘", name: "Духовність", short: "Духовність" }
            ],
            en: [
                { emoji: "🚀", name: "Creativity or Self-Expression", short: "Creativity" },
                { emoji: "🧑‍🔬", name: "Personal Development or Self-Care", short: "Self-Development" },
                { emoji: "🏘", name: "Domestic Life or Household Management", short: "Home" },
                { emoji: "💴", name: "Finance", short: "Finance" },
                { emoji: "🤝", name: "Parenting or Family", short: "Family" },
                { emoji: "📚", name: "Recreation and Hobbies", short: "Hobbies" },
                { emoji: "🗣️", name: "Community Involvement or Social Connection", short: "Community" },
                { emoji: "🌳", name: "Physical Health", short: "Health" },
                { emoji: "🔎", name: "Career or Education", short: "Career" },
                { emoji: "🌿", name: "Environmental or Charitable Causes", short: "Ecology" },
                { emoji: "👥", name: "Personal Relationship", short: "Relationships" },
                { emoji: "🧘", name: "Spirituality", short: "Spirituality" }
            ]
        };

        // Локальна база глибоких питань (fallback)
        const FALLBACK_QUESTIONS = {
            ua: {
                0: "Якби страх зник, що б ти створила?",
                1: "Яка звичка виснажує тебе, але ти її тримаєшся?",
                2: "Який емоційний слід залишив твій дім у твоїй душі?",
                3: "Якби гроші не мали значення, чим би ти займалась?",
                4: "Яку роль ти граєш у сім'ї, і чи хочеш її змінити?",
                5: "Чому ти не дозволяєш собі відпочивати без провини?",
                6: "Де ти шукаєш прийняття, але не знаходиш?",
                7: "Як твоє тіло намагається з тобою говорити?",
                8: "Що ти робиш не через покликання, а через страх?",
                9: "Як твоя повсякденність впливає на планету?",
                10: "Які стосунки ти терпиш, хоча вони тебе руйнують?",
                11: "Де ти втрачаєш себе, намагаючись догодити іншим?"
            },
            en: {
                0: "If fear disappeared, what would you create?",
                1: "Which habit drains you but you keep it?",
                2: "What emotional trace did your home leave in your soul?",
                3: "If money didn't matter, what would you do?",
                4: "What role do you play in your family – do you want to change it?",
                5: "Why don't you allow yourself to rest without guilt?",
                6: "Where do you seek acceptance but don't find it?",
                7: "How is your body trying to speak to you?",
                8: "What do you do not out of calling but out of fear?",
                9: "How does your daily life affect the planet?",
                10: "Which relationships do you tolerate though they harm you?",
                11: "Where do you lose yourself trying to please others?"
            }
        };

        let currentLang = "ua";
        let currentSpheres = SPHERES.ua;
        let groqApiKey = localStorage.getItem("groq_api_key") || "";
        let proxyUrl = localStorage.getItem("groq_proxy_url") || "";
        let lastMessage = "";
        let lastQuestion = "";
        let history = [];
        let spinning = false;
        let lastSpinTime = 0;
        const SPIN_COOLDOWN = 3600000; // 1 година

        // Canvas wheel
        const canvas = document.getElementById("rouletteCanvas");
        const ctx = canvas.getContext("2d");
        let size = 600, center = 300, radius = 280;
        let wheelAngle = 0;
        let ballAngle = 0;
        let spinStart = 0;
        let spinDuration = 2500;
        let wheelStartAngle = 0, ballStartAngle = 0;
        let wheelDelta = 0, ballDelta = 0;

        // DOM
        const cardsGrid = document.getElementById("cardsGrid");
        const resultDiv = document.getElementById("resultMessage");
        const questionDiv = document.getElementById("questionMessage");
        const historyDiv = document.getElementById("historyLog");
        const spinBtn = document.getElementById("spinBtn");
        const copyBtn = document.getElementById("copyBtn");
        const timerHint = document.getElementById("timerHint");
        const groqKeyInput = document.getElementById("groqKeyInput");
        const proxyUrlInput = document.getElementById("proxyUrlInput");
        const saveKeyBtn = document.getElementById("saveKeyBtn");

        if (groqApiKey) groqKeyInput.value = groqApiKey;
        if (proxyUrl) proxyUrlInput.value = proxyUrl;

        // Побудова карток (неклікабельні)
        function buildCards() {
            cardsGrid.innerHTML = "";
            currentSpheres.forEach((s, idx) => {
                const card = document.createElement("div");
                card.className = "sphere-card";
                card.dataset.idx = idx;
                card.innerHTML = `
                    <span class="sphere-emoji">${s.emoji}</span>
                    <div class="sphere-name-full">${s.name}</div>
                `;
                cardsGrid.appendChild(card);
            });
        }

        function highlightCard(index) {
            const cards = document.querySelectorAll(".sphere-card");
            cards.forEach((card, i) => {
                if (i === index) card.classList.add("selected-card");
                else card.classList.remove("selected-card");
            });
        }

        // Малювання колеса
        function drawWheel() {
            if (!ctx) return;
            ctx.clearRect(0, 0, size, size);
            ctx.fillStyle = "#1e3a2a";
            ctx.fillRect(0, 0, size, size);
            const step = (Math.PI * 2) / 12;
            for (let i = 0; i < 12; i++) {
                const start = i * step + wheelAngle;
                const end = (i+1) * step + wheelAngle;
                const isRed = (i % 2 === 0);
                const color1 = isRed ? "#b22222" : "#2c2c2c";
                const color2 = isRed ? "#8b0000" : "#1a1a1a";
                const grad = ctx.createRadialGradient(center, center, radius*0.2, center, center, radius);
                grad.addColorStop(0, color1);
                grad.addColorStop(1, color2);
                ctx.beginPath();
                ctx.arc(center, center, radius, start, end);
                ctx.lineTo(center, center);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = "#f7d97a";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                const mid = start + step/2;
                const txtR = radius * 0.7;
                const x = center + Math.cos(mid) * txtR;
                const y = center + Math.sin(mid) * txtR;
                ctx.font = `bold ${Math.max(18, radius*0.08)}px "Segoe UI"`;
                ctx.fillStyle = "#fff8e7";
                ctx.shadowBlur = 3;
                ctx.fillText(i+1, x-11, y+7);
                ctx.shadowBlur = 0;
            }
            ctx.beginPath();
            ctx.arc(center, center, radius*0.18, 0, Math.PI*2);
            ctx.fillStyle = "#d4af37";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(center, center, radius*0.1, 0, Math.PI*2);
            ctx.fillStyle = "#b8860b";
            ctx.fill();
            const ballRad = radius * 0.045;
            const ballX = center + Math.cos(ballAngle) * (radius - ballRad - 5);
            const ballY = center + Math.sin(ballAngle) * (radius - ballRad - 5);
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRad, 0, Math.PI*2);
            ctx.fillStyle = "#f0f0f0";
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(ballX-2, ballY-2, ballRad*0.3, 0, Math.PI*2);
            ctx.fill();
        }

        function getSegmentAtTop() {
            const pointerAngle = -Math.PI/2;
            let raw = pointerAngle - wheelAngle;
            raw = ((raw % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
            return Math.floor(raw / (Math.PI*2/12));
        }

        // Генерація глибокого питання через Groq
        async function generateDeepQuestion(sphereName) {
            const prompt = currentLang === "ua" 
                ? `Ти — мудрий оракул. Напиши одне глибоке, провокаційне, ситуативне питання для роздумів (максимум 20 слів) для сфери життя "${sphereName}". Питання має спонукати до саморефлексії. Не використовуй лапки, тільки текст питання.`
                : `You are a wise oracle. Write one deep, provocative, situational question for reflection (max 20 words) for the life sphere "${sphereName}". The question should encourage self-reflection. No quotes, just the question text.`;
            
            if (!groqApiKey) {
                // fallback з бази
                const fallback = FALLBACK_QUESTIONS[currentLang];
                return fallback ? (fallback[Math.floor(Math.random() * 12)] || "Яке питання ти давно не ставила собі?") : "Яке питання ти давно не ставила собі?";
            }
            
            try {
                let url = "https://api.groq.com/openai/v1/chat/completions";
                let headers = { "Authorization": `Bearer ${groqApiKey}`, "Content-Type": "application/json" };
                let body = JSON.stringify({ model: "llama3-8b-8192", messages: [{ role: "user", content: prompt }], temperature: 0.9, max_tokens: 80 });
                
                if (proxyUrl && proxyUrl.trim() !== "") {
                    url = proxyUrl.trim();
                    headers = { "Content-Type": "application/json" };
                    body = JSON.stringify({ prompt, apiKey: groqApiKey });
                }
                
                const response = await fetch(url, { method: "POST", headers, body });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                let text = data.choices?.[0]?.message?.content?.trim() || "";
                text = text.replace(/^["']|["']$/g, '');
                if (text.length === 0) throw new Error("Empty response");
                return text;
            } catch (err) {
                console.warn("AI fallback", err);
                const fallback = FALLBACK_QUESTIONS[currentLang];
                return fallback ? (fallback[Math.floor(Math.random() * 12)] || "Яке питання ти давно не ставила собі?") : "Яке питання ти давно не ставила собі?";
            }
        }

        // Форматування часу
        function formatCooldown(ms) {
            const hours = Math.floor(ms / 3600000);
            const minutes = Math.floor((ms % 3600000) / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            if (hours > 0) return `${hours}г ${minutes}хв ${seconds}с`;
            if (minutes > 0) return `${minutes}хв ${seconds}с`;
            return `${seconds}с`;
        }

        // Запуск спіну
        async function startSpin() {
            if (spinning) return;
            const now = Date.now();
            const timeLeft = SPIN_COOLDOWN - (now - lastSpinTime);
            if (lastSpinTime && timeLeft > 0) {
                const timeStr = formatCooldown(timeLeft);
                timerHint.innerText = currentLang === "ua" 
                    ? `⏳ наступний спін через ${timeStr}` 
                    : `⏳ next spin in ${timeStr}`;
                return;
            }
            timerHint.innerText = "";
            
            const finalTarget = Math.floor(Math.random() * 12);
            
            spinning = true;
            spinBtn.disabled = true;
            
            // Обчислюємо необхідний поворот колеса, щоб сектор finalTarget опинився під вказівником
            const currentIdx = getSegmentAtTop();
            let deltaIndices = (finalTarget - currentIdx + 12) % 12;
            let deltaAngle = deltaIndices * (Math.PI*2/12);
            const extraFull = (Math.floor(Math.random() * 8) + 8) * 2 * Math.PI;
            wheelDelta = deltaAngle + extraFull;
            
            // Кулька: багато обертів + фіксуємо у верхній точці (12 годин)
            const finalBallPos = -Math.PI/2;
            let ballDeltaVal = (finalBallPos - ballAngle + 2*Math.PI) % (2*Math.PI);
            ballDeltaVal += (Math.floor(Math.random() * 10) + 12) * 2 * Math.PI;
            ballDelta = ballDeltaVal;
            
            wheelStartAngle = wheelAngle;
            ballStartAngle = ballAngle;
            spinStart = performance.now();
            requestAnimationFrame(animateSpin);
            
            async function animateSpin(now) {
                const elapsed = now - spinStart;
                let t = Math.min(1, elapsed / spinDuration);
                const ease = 1 - Math.pow(1-t, 3);
                wheelAngle = wheelStartAngle + wheelDelta * ease;
                ballAngle = ballStartAngle + ballDelta * ease;
                drawWheel();
                if (t < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    wheelAngle = (wheelStartAngle + wheelDelta) % (2*Math.PI);
                    ballAngle = (ballStartAngle + ballDelta) % (2*Math.PI);
                    drawWheel();
                    const finalIdx = getSegmentAtTop();
                    const sphere = currentSpheres[finalIdx];
                    const question = await generateDeepQuestion(sphere.name);
                    lastMessage = `${sphere.emoji} ${sphere.name}`;
                    lastQuestion = question;
                    resultDiv.innerHTML = `✨ ${lastMessage}`;
                    questionDiv.innerHTML = `💭 ${question}`;
                    history.unshift(`${sphere.emoji} ${sphere.short}`);
                    if (history.length > 6) history.pop();
                    historyDiv.innerHTML = `📜 ${currentLang === "ua" ? "історія" : "history"}: ${history.join(' · ')}`;
                    highlightCard(finalIdx);
                    spinning = false;
                    spinBtn.disabled = false;
                    lastSpinTime = Date.now();
                    const timeUntilNext = SPIN_COOLDOWN;
                    const timeStr = formatCooldown(timeUntilNext);
                    timerHint.innerText = currentLang === "ua" 
                        ? `✅ спін виконано! наступний через ${timeStr}` 
                        : `✅ spin done! next in ${timeStr}`;
                    setTimeout(() => {
                        if (!spinning) timerHint.innerText = "";
                    }, 5000);
                    flashEffect();
                }
            }
        }

        function flashEffect() {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.background = 'radial-gradient(circle, rgba(255,215,0,0.3), transparent)';
            overlay.style.pointerEvents = 'none';
            overlay.style.zIndex = '999';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 400);
        }

        function copyResult() {
            const textToCopy = lastQuestion ? `${lastMessage}\n💭 ${lastQuestion}` : lastMessage;
            if (textToCopy) {
                navigator.clipboard.writeText(textToCopy);
                const original = resultDiv.innerText;
                resultDiv.innerHTML = "✅ copied!";
                setTimeout(() => resultDiv.innerHTML = original, 1200);
            } else {
                resultDiv.innerHTML = currentLang === "ua" ? "🌀 спершу зробіть спін" : "🌀 spin first";
                setTimeout(() => {
                    if (lastMessage) resultDiv.innerHTML = `✨ ${lastMessage}`;
                    else resultDiv.innerHTML = currentLang === "ua" ? "🌀 натисніть SPIN" : "🌀 press SPIN";
                }, 1500);
            }
        }

        function setLanguage(lang) {
            currentLang = lang;
            currentSpheres = SPHERES[lang];
            document.querySelectorAll(".lang-btn").forEach(btn => {
                if (btn.dataset.lang === lang) btn.classList.add("active");
                else btn.classList.remove("active");
            });
            buildCards();
            resultDiv.innerHTML = lang === "ua" ? "🌀 натисніть SPIN" : "🌀 press SPIN";
            questionDiv.innerHTML = "";
        }

        function saveApiSettings() {
            const key = groqKeyInput.value.trim();
            const proxy = proxyUrlInput.value.trim();
            if (key) groqApiKey = key;
            if (proxy) proxyUrl = proxy;
            localStorage.setItem("groq_api_key", groqApiKey);
            localStorage.setItem("groq_proxy_url", proxyUrl);
            resultDiv.innerHTML = currentLang === "ua" ? "🔑 налаштування збережено" : "🔑 settings saved";
            setTimeout(() => {
                resultDiv.innerHTML = lastMessage ? `✨ ${lastMessage}` : (currentLang === "ua" ? "🌀 натисніть SPIN" : "🌀 press SPIN");
            }, 1500);
        }

        function init() {
            buildCards();
            drawWheel();
            spinBtn.addEventListener("click", startSpin);
            copyBtn.addEventListener("click", copyResult);
            saveKeyBtn.addEventListener("click", saveApiSettings);
            document.querySelectorAll(".lang-btn").forEach(btn => {
                btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
            });
            window.addEventListener("resize", () => drawWheel());
            resultDiv.innerText = "🌀 натисніть SPIN";
        }
        init();
    })();
</script>
</body>
</html>
