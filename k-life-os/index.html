    // Nuke any service worker or Cache API from previous sessions, in case
    // the browser is holding on to an older shell. Safe to re-run.
    (function() {
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(rs) {
            rs.forEach(function(r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
      } catch (e) {}
    })();

    /* === v2 Redesign: KOSATIK, glassmorphism, gradient, mobile === */
    :root {
      --c-bg-1: #050a18;
      --c-bg-2: #0a1530;
      --c-accent: #00e5ff;
      --c-accent-2: #ff6bd9;
      --c-accent-3: #ffd86b;
      --c-text: #e6f7ff;
      --c-text-dim: rgba(230, 247, 255, 0.55);
      --glass-bg: rgba(15, 25, 50, 0.45);
      --glass-border: rgba(0, 229, 255, 0.18);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    /* Animated gradient background */
    body {
      background: linear-gradient(135deg, var(--c-bg-1) 0%, var(--c-bg-2) 50%, #1a0a25 100%);
      background-size: 300% 300%;
      animation: gradientShift 18s ease infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Glassmorphism utility */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    /* KOSATIK mascot (floating, top-right) */
    .kosatik {
      position: fixed; top: 1.5rem; right: 1.5rem;
      width: 64px; height: 64px;
      z-index: 100;
      cursor: pointer;

        { name: { ua: "космічна туманність", en: "cosmic nebula" }, g1: "#0a0f1c", g2: "#010308" },
        { name: { ua: "неонова сітка", en: "neon grid" }, neon: true },
        { name: { ua: "місячне сяйво", en: "moonlight" }, g1: "#1a2a3a", g2: "#02040c" },
        { name: { ua: "вогняні хвилі", en: "fire waves" }, g1: "#2a1a0a", g2: "#010008" },
        { name: { ua: "кришталева печера", en: "crystal cave" }, g1: "#203040", g2: "#020b1a" },
        { name: { ua: "магічне коло", en: "magic circle" }, g1: "#1e1a3a", g2: "#030108" }
    ];
    let currentTheme = 0;

    function initParticles() {
        particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({
                angle: Math.random() * Math.PI * 2,
                dist: R * (0.5 + Math.random() * 1.2),
                speed: (0.0003 + Math.random() * 0.0008) * (Math.random() < 0.5 ? 1 : -1),
                size: 0.8 + Math.random() * 1.5,
                alpha: 0.3 + Math.random() * 0.5
            });
        }
    }

    function resize() {
        const container = canvas.parentElement;
        const containerW = container.clientWidth;
        const vh = window.innerHeight;
        const maxW = Math.min(containerW - 2, 900);
        const maxH = vh * 0.78;
        W = Math.min(maxW, maxH);
        H = W;
        canvas.width = W;
        canvas.height = H;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        cx = W / 2;
        cy = H / 2;
        R = W * 0.33;
        rw = R * 0.22;
        initParticles();
        draw();
    }

    function drawBackground() {
        const t = THEMES[currentTheme];
        if (t.neon) {
            ctx.fillStyle = "#02050c";
            ctx.fillRect(0, 0, W, H);
            ctx.strokeStyle = "rgba(0, 255, 255, 0.08)";
            ctx.lineWidth = 1;
            for (let i = 0; i < W; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
            }
        } else {
            const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.7);
            g.addColorStop(0, t.g1);
            g.addColorStop(1, t.g2);
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);
        }
    }

    function drawParticles() {
        for (const p of particles) {
            p.angle += p.speed;
            const x = cx + Math.cos(p.angle) * p.dist;
            const y = cy + Math.sin(p.angle) * p.dist;
            ctx.beginPath();
            ctx.arc(x, y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 240, 200, ${p.alpha})`;
            ctx.fill();
        }
    }

    function drawPointer() {
        const px = cx;
        const py = cy - R - rw / 2 - 18;
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#0ff";
        ctx.beginPath();
        ctx.moveTo(px, py + 18);
        ctx.lineTo(px - 10, py);
        ctx.lineTo(px + 10, py);
        ctx.closePath();
        ctx.fillStyle = "#0ff";
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
    }

    function drawSegment(idx, sa, ea, isHover, isActive) {
        const c = COLORS[idx];
        ctx.save();
        const g = ctx.createRadialGradient(cx, cy, R - rw, cx, cy, R + rw);
        if (isActive) {
            g.addColorStop(0, "#fff8");
            g.addColorStop(0.5, "#ffdd88");
            g.addColorStop(1, "#ffaa33");
        } else if (isHover) {
            g.addColorStop(0, "#fff5");
            g.addColorStop(1, c);
        } else {
            g.addColorStop(0, c + "cc");
            g.addColorStop(1, c + "77");
        }
        ctx.beginPath();
        ctx.arc(cx, cy, R + rw / 2, sa, ea);
        ctx.arc(cx, cy, R - rw / 2, ea, sa, true);
        ctx.closePath();
        ctx.fillStyle = g;
        ctx.fill();
        ctx.strokeStyle = isActive ? "#ffff80" : "rgba(0,255,255,0.5)";
        ctx.lineWidth = isActive ? 2 : 1;
        ctx.stroke();
        if (isActive) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ffaa33";
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        const mid = (sa + ea) / 2;
        const tx = cx + Math.cos(mid) * R;
        const ty = cy + Math.sin(mid) * R;
        ctx.font = `bold ${Math.max(14, R * 0.13)}px "Segoe UI"`;
        ctx.fillStyle = isActive ? "#1a102a" : "#fffef0";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(idx + 1, tx, ty);
        ctx.restore();
    }

    function drawRing() {
        const step = (Math.PI * 2) / 12;
        for (let i = 0; i < 12; i++) {
            drawSegment(i, i * step + angleOffset, (i + 1) * step + angleOffset, hoverIdx === i, activeIdx === i);
        }
    }

    function drawCenter() {
        eyePulse += 0.03;
        const pulse = 1 + Math.sin(eyePulse) * 0.05;
        const cr = R * 0.35 * pulse;

        ctx.save();
        ctx.shadowBlur = 25;
        ctx.shadowColor = "rgba(255, 220, 100, 0.4)";
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr);
        cg.addColorStop(0, "#2a3050");
        cg.addColorStop(0.7, "#1a2040");
        cg.addColorStop(1, "#0f1525");
        ctx.fillStyle = cg;
        ctx.fill();
        ctx.strokeStyle = "rgba(0, 255, 255, 0.3)";
        ctx.lineWidth = 1;
        ctx.stroke();

        const er = cr * 0.45;
        ctx.beginPath();
        ctx.arc(cx, cy, er, 0, Math.PI * 2);
        const eg = ctx.createRadialGradient(cx - er * 0.15, cy - er * 0.15, 0, cx, cy, er);
        eg.addColorStop(0, "#ffeaa0");
        eg.addColorStop(0.5, "#d4a030");
        eg.addColorStop(1, "#8a6010");
        ctx.fillStyle = eg;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx, cy, er * 0.35, 0, Math.PI * 2);
        ctx.fillStyle = "#0a0f1c";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx - er * 0.1, cy - er * 0.1, er * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.fill();
        ctx.restore();
    }

    function draw() {
        drawBackground();
        drawParticles();
        drawRing();
        drawCenter();
        drawPointer();
    }

    function animate() {
        if (autoRotate && hoverIdx === -1 && activeIdx === -1 && !spinAnim) {
            angleOffset += rotSpeed;
        }
        if (spinAnim) {
            const now = performance.now();
            let t = Math.min(1, (now - spinAnim.start) / spinAnim.duration);
            const ease = 1 - Math.pow(1 - t, 4);
            angleOffset = spinAnim.from + spinAnim.delta * ease;
            if (t >= 1) {
                const targetIdx = spinAnim.target;
                angleOffset = spinAnim.to;
                spinAnim = null;
                onSpinComplete(targetIdx);
            }
        }
        draw();
        requestAnimationFrame(animate);
    }

    function getIdxAt(mx, my) {
        const dx = mx - cx, dy = my - cy;
        const dist = Math.hypot(dx, dy);
        if (dist < R - rw * 1.2 || dist > R + rw * 1.2) return -1;
        let a = Math.atan2(dy, dx) - angleOffset;
        a = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        return Math.floor(a / ((Math.PI * 2) / 12));
    }

    function highlightCard(idx) {
        document.querySelectorAll(".sphere-card").forEach((c, i) => {
            c.classList.toggle("selected", i === idx);
        });
    }

    function showModalLoading(sphereName) {
        const s = SPHERES[currentLang][lastSphereIdx];
        modalSphere.innerHTML = `${s.emoji} ${s.name}`;
        currentQuestion.innerHTML = `<div class="questions-loading"><span class="spinner"></span>${I18N[currentLang].loadingQ}</div>`;
        answersList.innerHTML = "";
        document.querySelectorAll(".modal-lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === currentLang));
        modal.classList.add("active");
    }

    function renderCurrentItem(item) {
        currentItem = item;
        if (!item) {
            currentQuestion.textContent = "—";
            answersList.innerHTML = "";
            return;
        }
        currentQuestion.textContent = item.q;
        answersList.innerHTML = "";
        item.a.forEach((answer, i) => {
            const el = document.createElement("div");
            el.className = "question-item";
            const letter = String.fromCharCode(65 + i);
            el.innerHTML = `<span style="opacity:0.5;margin-right:0.4rem;">${letter}.</span>${answer}`;
            el.onclick = () => {
                document.querySelectorAll(".answers-list .question-item").forEach(x => x.classList.remove("selected"));
                el.classList.add("selected");
                lastAnswer = answer;
                lastQuestion = `${item.q}\n→ ${answer}`;
            };
            answersList.appendChild(el);
        });
        if (item.a.length > 0) {
            const first = answersList.querySelector(".question-item");
            if (first) first.classList.add("selected");
            lastAnswer = item.a[0];
            lastQuestion = `${item.q}\n→ ${item.a[0]}`;
        }
    }

    async function onSpinComplete(idx) {
        const s = SPHERES[currentLang][idx];
        lastSphereIdx = idx;
        highlightCard(idx);
        const bg = COLORS[idx];
        document.body.style.background = `radial-gradient(circle at 30% 20%, ${bg}22, #010308)`;
        setTimeout(() => { document.body.style.background = ""; }, 1200);
        showModalLoading(s.short);
        const fullPool = await generateQuestions(s.short, s.name);
        currentItemPool = fullPool;
        const unseenIdxs = getUnseenIndices(fullPool);
        if (unseenIdxs.length > 0) {
            currentItemIdx = unseenIdxs[Math.floor(Math.random() * unseenIdxs.length)];
            renderCurrentItem(fullPool[currentItemIdx]);
        } else if (fullPool.length > 0) {
            currentItemIdx = 0;
            renderCurrentItem(fullPool[0]);
        }
        activeIdx = -1;
        spinning = false;
        lastSpinTime = Date.now();
        document.getElementById("spinBtn").disabled = false;
        document.getElementById("randomBtn").disabled = false;
        timerHint.textContent = I18N[currentLang].nextIn1h;
        setTimeout(() => { if (!spinning) timerHint.textContent = ""; }, 5000);
    }

    function spinToTarget(targetIdx) {
        if (spinning) return;
        const now = Date.now();
        if (lastSpinTime && (now - lastSpinTime) < SPIN_COOLDOWN) {
            const left = Math.round((SPIN_COOLDOWN - (now - lastSpinTime)) / 60000);
            timerHint.textContent = I18N[currentLang].waitMin(left);
            return;
        }
        spinning = true;
        activeIdx = targetIdx;
        document.getElementById("spinBtn").disabled = true;
        document.getElementById("randomBtn").disabled = true;
        highlightCard(targetIdx);

        const step = (Math.PI * 2) / 12;
        const targetAngle = -Math.PI / 2 - targetIdx * step - step / 2;

        let cur = angleOffset % (Math.PI * 2);
        let tgt = targetAngle % (Math.PI * 2);
        let delta = tgt - cur;
        if (delta < 0) delta += Math.PI * 2;
        delta += (6 + Math.floor(Math.random() * 5)) * Math.PI * 2;

        spinAnim = {
            from: angleOffset,
            to: angleOffset + delta,
            delta: delta,
            start: performance.now(),
            duration: 2500 + Math.random() * 500,
            target: targetIdx
        };
    }

    async function generateQuestions(sphereShort, sphereFull) {
        const cache = await loadQuestions();
        if (cache && cache[currentLang] && cache[currentLang][sphereFull]) {
            const entry = cache[currentLang][sphereFull];
            if (Array.isArray(entry) && entry.length >= 1) {
                const first = entry[0];
                if (typeof first === "object" && first.q && Array.isArray(first.a)) {
                    return entry.map((item, idx) => ({ ...item, _idx: idx }));
                }
                return [{ ...entry[0], a: entry[0].a || ["—", "—", "—"], _idx: 0 }];
            }
        }
        const fb = FALLBACK_QUESTIONS[currentLang];
        const q = fb[Math.floor(Math.random() * fb.length)];
        const fallbackAnswers = currentLang === "ua"
            ? ["Відчути", "Проаналізувати", "Відпустити"]
            : ["Feel it", "Analyze it", "Let it go"];
        return [{ q, a: fallbackAnswers, _idx: -1 }];
    }

    function getUnseenIndices(pool) {
        const seen = seenThisSession[currentLang] || {};
        const allSeen = pool.every(it => (seen[it._idx] || 0) > 0);
        if (allSeen) {
            seenThisSession[currentLang] = {};
            return pool.map((_, i) => i);
        }
        return pool
            .map((it, i) => (seen[it._idx] || 0) > 0 ? -1 : i)
            .filter(i => i !== -1);
    }

    let cachedQuestions = null;
    async function loadQuestions() {
        if (cachedQuestions) return cachedQuestions;
        try {
            const r = await fetch("questions.json?t=" + Date.now());
            cachedQuestions = await r.json();
            return cachedQuestions;
        } catch { return null; }
    }

    canvas.addEventListener("mousemove", (e) => {
        if (spinAnim) return;
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        const mx = (e.clientX - rect.left) * scale;
        const my = (e.clientY - rect.top) * scale;
        hoverIdx = getIdxAt(mx, my);
        canvas.style.cursor = hoverIdx !== -1 ? "pointer" : "default";
    });
    canvas.addEventListener("mouseleave", () => { hoverIdx = -1; });
    canvas.addEventListener("click", (e) => {
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        const mx = (e.clientX - rect.left) * scale;
        const my = (e.clientY - rect.top) * scale;
        const idx = getIdxAt(mx, my);
        if (idx !== -1) spinToTarget(idx);
    });

    function buildCards() {
        const grid = document.getElementById("cardsGrid");
        grid.innerHTML = "";
        SPHERES[currentLang].forEach((s, i) => {
            const card = document.createElement("div");
            card.className = "sphere-card";
            const color = COLORS[i];
            card.style.setProperty("--sphere-color", color);
            card.innerHTML = `<span class="card-emoji">${s.emoji}</span><span class="card-name">${s.short}</span>`;
            grid.appendChild(card);
        });
    }

    function formatCooldown(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return I18N[currentLang].formatHms(h, m, s);
    }

    function updateTimer() {
        if (!lastSpinTime) return;
        const left = SPIN_COOLDOWN - (Date.now() - lastSpinTime);
        if (left > 0) {
            timerHint.textContent = `${I18N[currentLang].cooldownPrefix} ${formatCooldown(left)}`;
        } else {
            timerHint.textContent = "";
        }
    }
    setInterval(updateTimer, 1000);

    document.getElementById("randomBtn").onclick = () => {
        spinToTarget(Math.floor(Math.random() * 12));
    };
    document.getElementById("spinBtn").onclick = () => {
        spinToTarget(Math.floor(Math.random() * 12));
    };
    document.getElementById("moodBtn").onclick = () => {
        currentTheme = (currentTheme + 1) % THEMES.length;
        const m = THEMES[currentTheme].name[currentLang];
        document.getElementById("resultMsg").textContent = `${I18N[currentLang].moodPrefix} ${m}`;
        setTimeout(() => document.getElementById("resultMsg").textContent = I18N[currentLang].resultPlaceholder, 1500);
    };

    async function setLanguage(lang) {
        if (lang !== "ua" && lang !== "en") return;
        currentLang = lang;
        document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === currentLang));
        document.querySelectorAll(".modal-lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === currentLang));
        buildCards();
        applyI18n();
        if (!lastSpinTime) {
            document.getElementById("resultMsg").textContent = I18N[currentLang].resultPlaceholder;
        }
        if (modal.classList.contains("active") && lastSphereIdx !== -1) {
            const s = SPHERES[currentLang][lastSphereIdx];
            modalSphere.innerHTML = `${s.emoji} ${s.name}`;
            currentQuestion.innerHTML = `<div class="questions-loading"><span class="spinner"></span>${I18N[currentLang].loadingQ}</div>`;
            answersList.innerHTML = "";
            const fullPool = await generateQuestions(s.short, s.name);
            currentItemPool = fullPool;
            if (currentItemIdx < fullPool.length) {
                renderCurrentItem(fullPool[currentItemIdx]);
            } else if (fullPool.length > 0) {
                currentItemIdx = 0;
                renderCurrentItem(fullPool[0]);
            }
        }
    }

    document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.onclick = () => setLanguage(btn.dataset.lang);
    });
    document.querySelectorAll(".modal-lang-btn").forEach(btn => {
        btn.onclick = () => setLanguage(btn.dataset.lang);
    });

    document.getElementById("modalCloseBtn").onclick = () => {
        if (currentItem && lastSphereIdx !== -1) {
            const s = SPHERES[currentLang][lastSphereIdx];
            const summary = `${s.emoji} ${s.short} · ${currentItem.q.substring(0, 35)}... → ${lastAnswer.substring(0, 20)}`;
            historyList.unshift(summary);
            if (historyList.length > 6) historyList.pop();
            document.getElementById("historyLog").innerHTML = historyList.map(h => `<div class="history-item">📜 ${h}</div>`).join("");
        }
        modal.classList.remove("active");
    };
    document.getElementById("modalCopyBtn").onclick = () => {
        if (currentItem && lastSphereIdx !== -1) {
            const s = SPHERES[currentLang][lastSphereIdx];
            const text = `${s.emoji} ${s.name}\n\n💭 ${currentItem.q}\n\n→ ${lastAnswer}`;
            navigator.clipboard.writeText(text);
            document.getElementById("modalCopyBtn").textContent = I18N[currentLang].copied;
            setTimeout(() => { document.getElementById("modalCopyBtn").textContent = I18N[currentLang].copy; }, 1500);
        }
    };
    document.getElementById("modalCopyBtn").onclick = () => {
        if (lastQuestion && lastSphereIdx !== -1) {
            const s = SPHERES[currentLang][lastSphereIdx];
            navigator.clipboard.writeText(`${s.emoji} ${s.name}\n💭 ${lastQuestion}`);
            document.getElementById("modalCopyBtn").textContent = I18N[currentLang].copied;
            setTimeout(() => { document.getElementById("modalCopyBtn").textContent = I18N[currentLang].copy; }, 1500);
        }
    };
    document.getElementById("modalRerollBtn").onclick = () => {
        if (lastSphereIdx === -1 || currentItemPool.length === 0) return;
        if (currentItem && currentItem._idx >= 0) {
            if (!seenThisSession[currentLang]) seenThisSession[currentLang] = {};
            seenThisSession[currentLang][currentItem._idx] = Date.now();
        }
        const unseenIdxs = getUnseenIndices(currentItemPool);
        if (unseenIdxs.length > 0) {
            currentItemIdx = unseenIdxs[Math.floor(Math.random() * unseenIdxs.length)];
            renderCurrentItem(currentItemPool[currentItemIdx]);
        } else {
            const s = SPHERES[currentLang][lastSphereIdx];
            currentQuestion.innerHTML = `<div class="questions-loading"><span class="spinner"></span>${I18N[currentLang].pickingOther}</div>`;
            answersList.innerHTML = "";
            generateQuestions(s.short, s.name).then(pool => {
                currentItemPool = pool;
                const freshIdxs = getUnseenIndices(pool);
                if (freshIdxs.length > 0) {
                    currentItemIdx = freshIdxs[Math.floor(Math.random() * freshIdxs.length)];
                    renderCurrentItem(pool[currentItemIdx]);
                } else if (pool.length > 0) {
                    currentItemIdx = 0;
                    renderCurrentItem(pool[0]);
                }
            });
        }
    };
    window.onclick = (e) => { if (e.target === modal) modal.classList.remove("active"); };

    window.addEventListener("resize", resize);
    resize();
    animate();
    applyI18n();
    buildCards();
})();
</script>

  <button class="onboard-close" id="onboardClose" aria-label="Close">×</button>
  <div class="onboard-step"><span class="onboard-num">1</span>Оберіть сферу або натисніть <b>SPIN</b></div>
  <div class="onboard-step"><span class="onboard-num">2</span>Питання + 3 варіанти відповіді</div>
  <div class="onboard-step"><span class="onboard-num">3</span>Копіюйте для Reels / постів / сторіз</div>
  <div class="onboard-step"><span class="onboard-num">4</span>Натисніть на KOSATIK для нової поради 🌀</div>
</div>

<!-- Theme switcher dock -->
<div class="theme-dock glass" id="themeDock">
  <button class="theme-btn active" data-set-theme="cosmic" aria-label="Cosmic"></button>
  <button class="theme-btn" data-set-theme="fire" aria-label="Fire"></button>
  <button class="theme-btn" data-set-theme="ice" aria-label="Ice"></button>
  <button class="theme-btn" data-set-theme="forest" aria-label="Forest"></button>
  <button class="theme-btn" data-set-theme="aurora" aria-label="Aurora"></button>
</div>

<!-- KOSATIK behavior + onboarding -->
<script>
(function () {
  'use strict';
  const kosatik = document.getElementById('kosatikMascot');
  const onboard = document.getElementById('onboard');
  const onboardClose = document.getElementById('onboardClose');

  // Show onboarding once per session, after PIN passed
  if (onboard && !sessionStorage.getItem('klife_onboarded')) {
    setTimeout(() => {
      if (window.KLifeRealtime && window.KLifeRealtime.hasWheelAccess && window.KLifeRealtime.hasWheelAccess()) {
        onboard.classList.add('show');
      }
    }, 1500);
  }
  if (onboardClose) {
    onboardClose.addEventListener('click', () => {
      onboard.classList.remove('show');
      sessionStorage.setItem('klife_onboarded', '1');
    });
  }

  // KOSATIK reacts to SPIN
  const spinBtn = document.getElementById('spinBtn');
  const randomBtn = document.getElementById('randomBtn');
  function triggerSpinAnim() {
    if (!kosatik) return;
    kosatik.classList.remove('spinning', 'thinking');
    void kosatik.offsetWidth; // restart anim
    kosatik.classList.add('spinning');
    setTimeout(() => {
      kosatik.classList.remove('spinning');
      kosatik.classList.add('thinking');
    }, 2500);
  }
  if (spinBtn) spinBtn.addEventListener('click', triggerSpinAnim);
  if (randomBtn) randomBtn.addEventListener('click', triggerSpinAnim);

  // KOSATIK click = random encouraging phrase (follows page language)
  if (kosatik) {
    kosatik.addEventListener('click', () => {
      const phrases = (I18N[currentLang] && I18N[currentLang].kosatikClickPhrases) || [];
      if (phrases.length === 0) return;
      const ph = phrases[Math.floor(Math.random() * phrases.length)];
      // mini tooltip
      const tip = document.createElement('div');
      tip.textContent = ph;
      tip.style.cssText = 'position:fixed;top:5rem;right:1.5rem;z-index:101;max-width:240px;padding:0.7rem 1rem;background:rgba(15,25,50,0.85);backdrop-filter:blur(20px);border:1px solid rgba(0,229,255,0.3);border-radius:0.8rem;font-size:0.85rem;color:#e6f7ff;animation:klifePopIn 0.3s ease';
      document.body.appendChild(tip);
      setTimeout(() => {
        tip.style.transition = 'opacity 0.3s';
        tip.style.opacity = '0';
        setTimeout(() => tip.remove(), 300);
      }, 3500);
    });
  }

  // Inject popIn keyframe (once)
  if (!document.getElementById('klifePopStyle')) {
    const s = document.createElement('style');
    s.id = 'klifePopStyle';
    s.textContent = '@keyframes klifePopIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}';
    document.head.appendChild(s);
  }

  // Share buttons in modal
  function getCurrentQuestionText() {
    const q = document.getElementById('currentQuestion');
    const ans = document.querySelector('.answers-list .question-item.selected');
    if (!q) return '';
    let text = q.textContent.trim();
    if (ans) text += '\n→ ' + ans.textContent.replace(/^[A-D]\.\s*/, '').trim();
    return text;
  }
  document.querySelectorAll('.share-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const text = getCurrentQuestionText();
      if (!text || text.length < 5) return;
      const sphere = document.getElementById('modalSphere')?.textContent || '';
      const fullText = `${text}\n\n${sphere}\n— k-life-os.kosatiks-group.pp.ua`;

      const kind = btn.dataset.share;
      if (kind === 'copy') {
        try {
          await navigator.clipboard.writeText(fullText);
          btn.classList.add('copied');
          btn.textContent = '✓ Скопійовано';
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.textContent = '📋 Копіювати';
          }, 2000);
        } catch (e) {
          // fallback
          const ta = document.createElement('textarea');
          ta.value = fullText;
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch {}
          ta.remove();
        }
      } else if (kind === 'twitter') {
        const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(fullText);
        window.open(url, '_blank', 'width=550,height=420');
      } else if (kind === 'threads') {
        const url = 'https://www.threads.net/intent/post?text=' + encodeURIComponent(fullText);
        window.open(url, '_blank', 'width=550,height=550');
      } else if (kind === 'instagram') {
        // IG has no web intent; copy + show instruction
        try {
          await navigator.clipboard.writeText(fullText);
          btn.classList.add('copied');
          btn.textContent = '✓ Скопійовано для Stories';
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.textContent = '📷 Stories';
          }, 2500);
        } catch {}
      }
    });
  });

  // When PIN passed, animate card
  const origShowGate = window.KLifeRealtime && window.KLifeRealtime.showPinGate;
  const pinCard = document.querySelector('.pin-gate-card');
  if (pinCard) {
    const observer = new MutationObserver(() => {
      if (pinCard.classList.contains('hidden')) {
        pinCard.classList.add('passed');
        setTimeout(() => pinCard.classList.remove('passed'), 700);
      }
    });
    observer.observe(pinCard, { attributes: true, attributeFilter: ['class'] });
  }

  // Theme switcher
  const THEME_KEY = 'klife_theme';
  function applyTheme(t) {
    document.body.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.setTheme === t);
    });
  }
  const savedTheme = localStorage.getItem(THEME_KEY) || 'cosmic';
  applyTheme(savedTheme);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.setTheme;
      applyTheme(t);
      localStorage.setItem(THEME_KEY, t);
    });
  });

  // Confetti on success (when currentQuestion is filled with real text, not spinner)
  const questionObserver = new MutationObserver((muts) => {
    for (const m of muts) {
      if (m.type === 'childList' || m.type === 'characterData') {
        const el = document.getElementById('currentQuestion');
        if (el && el.textContent && el.textContent.trim().length > 5
            && !el.querySelector('.spinner')
            && !el.querySelector('.questions-loading')) {
          // burst confetti once
          if (!el.dataset.confettied) {
            el.dataset.confettied = '1';
            burstConfetti();
            setTimeout(() => { el.dataset.confettied = ''; }, 8000);
          }
        }
      }
    }
  });
  const cq = document.getElementById('currentQuestion');
  if (cq) questionObserver.observe(cq, { childList: true, characterData: true, subtree: true });

  function burstConfetti() {
    const colors = ['#00e5ff', '#ff6bd9', '#ffd86b', '#6bff8c', '#b06bff'];
    for (let i = 0; i < 40; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = '-20px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = Math.random() * 0.3 + 's';
      piece.style.animationDuration = (2 + Math.random() * 1.5) + 's';
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 4000);
    }
  }
})();
</script>
<div id="klife-build" style="position:fixed;bottom:8px;right:12px;z-index:9999;font:600 0.7rem/1 ui-monospace,Menlo,Consolas,monospace;color:rgba(255,213,106,0.55);pointer-events:none;user-select:none;text-shadow:0 1px 2px rgba(0,0,0,0.6);">v10.3 · Google Auth + epoch + rate limit</div>
</body>
</html>
