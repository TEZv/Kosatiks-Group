<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🪷 Колесо тем · 12 сфер натхнення</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #01030a);
            font-family: 'Inter', sans-serif;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* головний контейнер – картка */
        .oracle-card {
            max-width: 800px;
            width: 100%;
            background: rgba(15, 20, 40, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* заголовок */
        .header {
            padding: 1.2rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(0,255,255,0.2);
        }
        .header h1 {
            font-weight: 600;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #fff5cf, #ffd27a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            font-size: 0.75rem;
            color: #8da0c0;
            margin-top: 0.3rem;
        }

        /* сфера + результат */
        .result-area {
            padding: 1.5rem;
            text-align: center;
        }
        .sphere-badge {
            display: inline-block;
            background: #2a3e66cc;
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid cyan;
        }
        .topic {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.3;
            margin: 1rem 0;
            color: #f8eccf;
        }
        .question {
            font-size: 1rem;
            font-style: italic;
            background: #0a102f80;
            padding: 0.8rem;
            border-radius: 1rem;
            margin: 1rem 0;
            border-left: 3px solid #ffaa44;
        }
        .visual-prompt {
            font-size: 0.75rem;
            color: #b9c7e8;
            margin: 0.8rem 0;
            padding: 0.5rem;
            background: #00000040;
            border-radius: 1rem;
        }

        /* кнопки */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .btn {
            background: #1f2f55;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            color: white;
            font-size: 0.85rem;
        }
        .btn-primary {
            background: #ff3e6c;
            box-shadow: 0 0 8px #ff3e6c;
        }
        .btn-primary:hover {
            background: #ff6b8f;
            transform: scale(1.02);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid cyan;
        }
        .btn-outline:hover {
            background: cyan;
            color: #010312;
        }

        /* статистика */
        .stats {
            display: flex;
            justify-content: space-between;
            background: #0a102f70;
            padding: 0.8rem 1.5rem;
            font-size: 0.7rem;
            border-top: 1px solid #2e3a5e;
        }
        .stat-item {
            text-align: center;
        }
        .history {
            padding: 0.8rem 1.5rem;
            border-top: 1px solid #2e3a5e;
            font-size: 0.7rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .history-tag {
            background: #1a2542;
            border-radius: 1rem;
            padding: 0.2rem 0.6rem;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 0 cyan; }
            100% { text-shadow: 0 0 8px cyan; }
        }
        .animate {
            animation: pulse 0.3s ease;
        }
    </style>
</head>
<body>
<div class="oracle-card">
    <div class="header">
        <h1>🌀 Колесо Сфер 🌀</h1>
        <div class="sub">натхнення для блогу · міфологічний рандомайзер</div>
    </div>
    <div class="result-area" id="resultArea">
        <div class="sphere-badge" id="sphereBadge">⚡ оберіть сферу</div>
        <div class="topic" id="topicDisplay">Натисніть «Згенерувати тему»</div>
        <div class="question" id="questionDisplay"></div>
        <div class="visual-prompt" id="visualPrompt"></div>
        <div class="button-group">
            <button class="btn btn-primary" id="randomBtn">✨ Випадкова тема</button>
            <button class="btn btn-outline" id="copyBtn">📋 Копіювати тему</button>
            <button class="btn btn-outline" id="aiBtn">🪄 AI-ідея (локальна)</button>
        </div>
    </div>
    <div class="stats">
        <div class="stat-item">🎯 Ціль на тиждень: <span id="weeklyGoal">2</span> / <span id="weeklyDone">0</span></div>
        <div class="stat-item">📅 Згенеровано сьогодні: <span id="todayCount">0</span></div>
        <button id="resetWeekBtn" style="background:none; border:none; color:#8da0c0; cursor:pointer;">↺ скинути тиждень</button>
    </div>
    <div class="history" id="historyList"></div>
</div>

<script>
    // ------------------------- БАЗА ДАНИХ: 12 СФЕР + ТЕМИ + ПИТАННЯ + ВІЗУАЛ -------------------------
    const spheresUA = [
        "Творчість / Самовираження", "Особистий розвиток", "Дім / Затишок", "Фінанси",
        "Сім'я", "Відпочинок / Хобі", "Спільнота", "Фізичне здоров'я",
        "Кар'єра / Освіта", "Екологія / Благодійність", "Стосунки", "Духовність"
    ];
    // величезний набір тем для кожної сфери (по 10-15 унікальних)
    const topicsDB = {
        0: ["Що я створюю, коли ніхто не оцінює?", "Якби страх зник, який артефакт я б створила?", "Чому творчість – це міст між світами?", "10 хвилин вільного малювання: що народжується?", "Як повернути гру в доросле життя?"],
        1: ["Звичка, яка змінює свідомість за 5 хвилин", "Що моя тінь хоче мені сказати?", "Ритуал ранку: як налаштуватися на день?", "Чому я відкладаю найважливіше?", "Щоденник однієї емоції: експеримент"],
        2: ["Магія домашнього вогнища: 3 ритуали", "Як створити святилище в одній кімнаті?", "Що викинути, щоб звільнити простір для мрій?", "Затишок без витрат: 5 ідей", "Звуки дому: яка музика лікує?"],
        3: ["Гроші як енергія: як змінити переконання?", "Бюджет, що надихає: графік витрат", "Що я купила з радістю останнім часом?", "Фінансова свобода: мій перший крок", "Як говорити з грошима вдячно?"],
        4: ["Сімейна легенда, яка мене сформувала", "Як сказати «люблю» без слів?", "Вечір настільних ігор: чому це важливо", "Традиція, яку я хочу створити", "Що мої батьки передали мені найціннішого?"],
        5: ["Хобі, яке я відкладаю роками", "Стан потоку: як його впіймати?", "20 хвилин нічогонероблення: експеримент", "Чому відпочинок – це не лінь?", "Як знайти час для себе у шаленому ритмі?"],
        6: ["Кому я давно хочу подякувати?", "Одна добра справа без приводу", "Як створити спільноту однодумців?", "Чому ми біжимо від самотності?", "Сила щирого компліменту"],
        7: ["Танок, що лікує: 5 хвилин імпровізації", "Що моє тіло намагається мені сказати?", "Рух без мети: ранкова розминка", "Як полюбити своє відображення?", "Сон як найкращий лікар: гігієна сну"],
        8: ["Якби робота була грою – які правила я б змінила?", "Мої 3 суперсили на роботі", "Що я роблю не через покликання?", "Навик, який змінить мій рік", "Ідеальний робочий день: мій сценарій"],
        9: ["Екозвичка, що приносить радість", "Як зменшити пластик сьогодні без зусиль", "Прогулянка лісом: що я там знаходжу?", "Чому природа – найкращий терапевт?", "Мій внесок у планету: 3 простих дії"],
        10: ["Комплімент, який я хочу почути", "Як я проявляю любов без слів?", "Стосунки, які виснажують: як відпустити?", "Розмова з внутрішньою дитиною", "Що робить стосунки магічними?"],
        11: ["Ранкова медитація за 3 хвилини", "Як знайти тишу в натовпі?", "Практика вдячності: 5 речей", "Що таке душа? моя версія", "Зв'язок зі світом: де я його відчуваю?"]
    };
    // питання для роздумів (додатковий шар)
    const questionsDB = {
        0: "Що б ти намалювала, якби не боялась осуду?",
        1: "Яка частина тебе потребує прощення?",
        2: "Який аромат робить твій дім живим?",
        3: "Якби гроші були енергією, який колір вони мали б?",
        4: "Яку сімейну історію ти ніколи не розповідала?",
        5: "Чому ти не дозволяєш собі просто радіти?",
        6: "Хто потребує твого теплого слова просто зараз?",
        7: "Коли востаннє ти відчувала своє тіло щасливим?",
        8: "Уяви, що твоя робота – це гра. Як би вона виглядала?",
        9: "Як ти можеш подякувати природі сьогодні?",
        10: "Що тобі найважче пробачити іншим?",
        11: "Де ти шукаєш відповіді, коли тихо?",
    };
    // візуальні підказки (для картинки/відео)
    const visualDB = {
        0: "🎨 абстрактний сплеск кольору, неон, вільний мазок",
        1: "🌱 світанок, відкритий щоденник, чашка какао з зорею",
        2: "🕯️ тепле світло свічки, книга, плед",
        3: "💰 монети, що перетворюються на метеликів",
        4: "👨‍👩‍👧 обійми, сімейна вечеря, сміх",
        5: "🎧 навушники, танок у кімнаті, веселощі",
        6: "🤝 руки, що підтримують, коло друзів",
        7: "🧘 йога на світанку, легкість",
        8: "💼 робочий стіл перетворюється на конструктор",
        9: "🌿 листя, краплі роси, скляна пляшка",
        10: "💞 дві долоні, що торкаються, серце",
        11: "🕉️ мандала, зірки, космос",
    };

    let currentSphere = 0;
    let currentTopic = "";
    let currentQuestion = "";
    let currentVisual = "";

    // статистика: weeklyGoal, weeklyDone, todayCount, history (масив)
    let stats = {
        weeklyGoal: 2,
        weeklyDone: 0,
        todayCount: 0,
        lastResetDate: new Date().toDateString(),
        history: [] // зберігає останні 5 тем
    };

    function loadStats() {
        const saved = localStorage.getItem("blog_topics_stats");
        if (saved) {
            const parsed = JSON.parse(saved);
            // перевірка чи не новий день для скидання todayCount
            const todayStr = new Date().toDateString();
            if (parsed.lastResetDate !== todayStr) {
                parsed.todayCount = 0;
                parsed.lastResetDate = todayStr;
            }
            stats = parsed;
        } else {
            stats.lastResetDate = new Date().toDateString();
            stats.todayCount = 0;
            stats.weeklyDone = 0;
            stats.history = [];
        }
        updateStatsUI();
    }

    function saveStats() {
        localStorage.setItem("blog_topics_stats", JSON.stringify(stats));
    }

    function updateStatsUI() {
        document.getElementById("weeklyGoal").innerText = stats.weeklyGoal;
        document.getElementById("weeklyDone").innerText = stats.weeklyDone;
        document.getElementById("todayCount").innerText = stats.todayCount;
        // відобразити історію
        const historyDiv = document.getElementById("historyList");
        historyDiv.innerHTML = stats.history.map(h => `<span class="history-tag">✨ ${h.substring(0, 35)}</span>`).join('');
        if(stats.history.length === 0) historyDiv.innerHTML = '<span class="history-tag">немає згенерованих тем</span>';
    }

    function addToHistory(topic) {
        stats.history.unshift(topic);
        if(stats.history.length > 5) stats.history.pop();
        stats.todayCount++;
        // якщо досягнуто weeklyGoal, збільшуємо weeklyDone тільки при унікальному додаванні? краще рахувати окремо
        // але weeklyDone рахується як кількість тем, згенерованих за тиждень (можна окремий лічильник)
        // додамо логіку: weeklyDone збільшується при кожній генерації, але не більше weeklyGoal? ні, хай просто рахує
        stats.weeklyDone++;
        saveStats();
        updateStatsUI();
    }

    function resetWeek() {
        stats.weeklyDone = 0;
        stats.todayCount = 0;
        stats.lastResetDate = new Date().toDateString();
        stats.history = [];
        saveStats();
        updateStatsUI();
        alert("Тиждень скинуто! Починайте новий цикл натхнення ✨");
    }

    function getRandomTopic(sphereId) {
        const arr = topicsDB[sphereId];
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateRandom() {
        const newSphere = Math.floor(Math.random() * 12);
        currentSphere = newSphere;
        currentTopic = getRandomTopic(currentSphere);
        currentQuestion = questionsDB[currentSphere] || "Яке питання ти давно не ставила собі?";
        currentVisual = visualDB[currentSphere] || "абстрактне світло, неон, казка";
        updateUI();
        addToHistory(currentTopic);
        // анімація
        const topicDiv = document.getElementById("topicDisplay");
        topicDiv.classList.add("animate");
        setTimeout(() => topicDiv.classList.remove("animate"), 300);
    }

    function updateUI() {
        document.getElementById("sphereBadge").innerHTML = `🌀 ${spheresUA[currentSphere]}`;
        document.getElementById("topicDisplay").innerHTML = currentTopic;
        document.getElementById("questionDisplay").innerHTML = `💭 ${currentQuestion}`;
        document.getElementById("visualPrompt").innerHTML = `🎬 Ідея для візуалу: ${currentVisual}`;
    }

    function copyTopic() {
        const text = `${spheresUA[currentSphere]} · ${currentTopic}\n💭 ${currentQuestion}\n🎬 ${currentVisual}`;
        navigator.clipboard.writeText(text);
        alert("Тему скопійовано! Вставте у свою нотатку в Obsidian 📋");
    }

    // локальний AI: випадкова нова тема з бази (замість API)
    function aiIdea() {
        const newSphere = Math.floor(Math.random() * 12);
        const newTopic = getRandomTopic(newSphere);
        const newQuestion = questionsDB[newSphere];
        const newVisual = visualDB[newSphere];
        currentSphere = newSphere;
        currentTopic = newTopic;
        currentQuestion = newQuestion;
        currentVisual = newVisual;
        updateUI();
        addToHistory(currentTopic);
        const topicDiv = document.getElementById("topicDisplay");
        topicDiv.classList.add("animate");
        setTimeout(() => topicDiv.classList.remove("animate"), 300);
    }

    // ініціалізація та генерація першої теми
    loadStats();
    generateRandom();

    document.getElementById("randomBtn").onclick = generateRandom;
    document.getElementById("copyBtn").onclick = copyTopic;
    document.getElementById("aiBtn").onclick = aiIdea;
    document.getElementById("resetWeekBtn").onclick = resetWeek;
</script>
</body>
</html>
