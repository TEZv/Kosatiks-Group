<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌀 Мінливий оракул · Кільце Сфер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: radial-gradient(circle at 30% 20%, #0a0f1c, #010308);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            padding: 1rem;
            gap: 1.5rem;
        }
        .ring-container {
            flex: 2;
            min-width: 320px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            max-width: 650px;
            height: auto;
            background: transparent;
            cursor: pointer;
        }
        .sidebar {
            flex: 1.2;
            min-width: 280px;
            background: rgba(10, 15, 35, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1rem;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 95vh;
            overflow-y: auto;
        }
        .controls {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        button {
            background: rgba(30, 40, 80, 0.9);
            border: none;
            color: #ccf;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: #0ff;
            color: #010312;
            box-shadow: 0 0 12px cyan;
            transform: scale(1.03);
        }
        button:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .lang-switch { display: flex; gap: 0.5rem; justify-content: center; }
        .lang-btn { background: #2a4a3a; padding: 0.2rem 0.8rem; font-size: 0.7rem; }
        .lang-btn.active { background: #0ff; color: #0a1a12; box-shadow: 0 0 8px cyan; }
        .api-settings {
            display: flex; flex-wrap: wrap; gap: 0.5rem;
            background: #0a1f18; padding: 0.4rem; border-radius: 2rem;
            align-items: center; border: 1px solid #0ff;
        }
        .api-settings input {
            background: #1a3a2a; border: 1px solid cyan; color: #f9e2a1;
            padding: 0.2rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; width: 130px;
        }
        .api-settings button { background: #0ff; color: #0a1f18; padding: 0.1rem 0.5rem; font-size: 0.6rem; }
        .cards-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem;
            max-height: 38vh; overflow-y: auto; padding-right: 0.2rem;
        }
        .sphere-card {
            background: rgba(30, 50, 70, 0.6); backdrop-filter: blur(8px);
            border-radius: 0.8rem; padding: 0.35rem 0.2rem; text-align: center;
            transition: all 0.2s; border: 1px solid rgba(0, 255, 255, 0.3);
            color: #e9d6a3; font-size: 0.6rem; font-weight: bold; word-break: break-word; cursor: pointer;
        }
        .sphere-card:hover { background: rgba(0, 255, 255, 0.15); transform: scale(1.02); }
        .sphere-card.selected {
            background: radial-gradient(circle, #f5b042, #b45f1b);
            color: #0f1a0e; border-color: #ffff80; box-shadow: 0 0 12px #ffaa33;
        }
        .card-emoji { font-size: 1.1rem; display: block; }
        .result-area {
            background: #0a1f18; border-radius: 1rem; padding: 0.5rem;
            border: 1px solid cyan; text-align: center;
        }
        .history { margin-top: 0.3rem; font-size: 0.6rem; color: #c9b27c; max-height: 80px; overflow-y: auto; }
        .timer-hint {
            font-size: 0.7rem; font-weight: bold; color: #0ff; text-align: center;
            background: #0a1f18; padding: 0.2rem; border-radius: 2rem;
            transition: opacity 0.3s;
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-card {
            background: linear-gradient(135deg, #0f281f, #0a1a2a);
            border-radius: 2rem; padding: 1.5rem; max-width: 500px; width: 90%;
            border: 2px solid #0ff; box-shadow: 0 0 60px rgba(0,255,255,0.3);
            text-align: center; transform: scale(0.9); transition: transform 0.2s;
        }
        .modal.active .modal-card { transform: scale(1); }
        .modal-card h3 { color: #0ff; margin-bottom: 0.8rem; font-size: 1.1rem; }
        .modal-sphere-name { font-size: 1rem; color: #ffaa33; margin-bottom: 0.5rem; }
        .modal-question { font-size: 1.05rem; color: #ffefcf; margin: 0.8rem 0; line-height: 1.5; }
        .modal-actions { display: flex; gap: 0.8rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
        .modal-actions button { background: rgba(0,255,255,0.15); color: #0ff; border: 1px solid #0ff; }
        .modal-actions button:hover { background: #0ff; color: #0a1f18; }
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .sidebar { max-height: none; }
            canvas { max-width: 90vw; }
        }
    </style>
</head>
<body>
<div class="main-layout">
    <div class="ring-container">
        <canvas id="ringCanvas" width="600" height="600"></canvas>
        <div class="controls">
            <button id="randomBtn">✨ випадкова сфера</button>
            <button id="moodBtn">🎨 новий настрій</button>
        </div>
    </div>
    <div class="sidebar">
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="ua">🇺🇦 UA</button>
            <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
        </div>
        <div class="api-settings">
            <input type="text" id="groqKeyInput" placeholder="Groq API key (gsk_...)" autocomplete="off">
            <button id="saveKeyBtn">💾</button>
        </div>
        <button id="spinBtn" style="background:#0ff; color:#0a1f18; font-weight:bold;">🎲 SPIN (AI питання)</button>
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="result-area">
            <div id="resultMsg" style="font-size:0.75rem;">🌀 оберіть сферу або натисніть SPIN</div>
            <div class="history" id="historyLog"></div>
        </div>
        <div class="timer-hint" id="timerHint"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-card">
        <h3>🌀 Оракул сфери</h3>
        <div class="modal-sphere-name" id="modalSphere"></div>
        <div class="modal-question" id="modalQuestion"></div>
        <div class="modal-actions">
            <button id="modalCloseBtn">Закрити</button>
            <button id="modalSaveBtn">💾 Зберегти</button>
            <button id="modalCopyBtn">📋 Копіювати</button>
        </div>
    </div>
</div>

<script>
(function() {
    const SPHERES = {
        ua: [
            { emoji: "🚀", name: "Творчість або Самовираження", short: "Творчість" },
            { emoji: "🧑‍🔬", name: "Особистий розвиток або Турбота про себе", short: "Саморозвиток" },
            { emoji: "🏘", name: "Домашнє життя або Ведення господарства", short: "Дім" },
            { emoji: "💴", name: "Фінанси", short: "Фінанси" },
            { emoji: "🤝", name: "Батьківство або Сім'я", short: "Сім'я" },
            { emoji: "📚", name: "Відпочинок і Хобі", short: "Хобі" },
            { emoji: "🗣️", name: "Спільнота або Соціальні зв'язки", short: "Спільнота" },
            { emoji: "🌳", name: "Фізичне здоров'я", short: "Здоров'я" },
            { emoji: "🔎", name: "Кар'єра або Освіта", short: "Кар'єра" },
            { emoji: "🌿", name: "Екологія або Благодійність", short: "Екологія" },
            { emoji: "👥", name: "Особисті стосунки", short: "Стосунки" },
            { emoji: "🧘", name: "Духовність", short: "Духовність" }
        ],
        en: [
            { emoji: "🚀", name: "Creativity or Self-Expression", short: "Creativity" },
            { emoji: "🧑‍🔬", name: "Personal Development or Self-Care", short: "Self-Development" },
            { emoji: "🏘", name: "Domestic Life or Household Management", short: "Home" },
            { emoji: "💴", name: "Finance", short: "Finance" },
            { emoji: "🤝", name: "Parenting or Family", short: "Family" },
            { emoji: "📚", name: "Recreation and Hobbies", short: "Hobbies" },
            { emoji: "🗣️", name: "Community Involvement or Social Connection", short: "Community" },
            { emoji: "🌳", name: "Physical Health", short: "Health" },
            { emoji: "🔎", name: "Career or Education", short: "Career" },
            { emoji: "🌿", name: "Environmental or Charitable Causes", short: "Ecology" },
            { emoji: "👥", name: "Personal Relationship", short: "Relationships" },
            { emoji: "🧘", name: "Spirituality", short: "Spirituality" }
        ]
    };

    const COLORS = [
        "#ff6ec7", "#7a6eff", "#4affb5", "#ffb347",
        "#ff6b6b", "#c084fc", "#60a5fa", "#f97316",
        "#10b981", "#14b8a6", "#f43f5e", "#a855f7"
    ];

    const FALLBACK_QUESTIONS = {
        ua: [
            "Якби страх зник, що б ти створила?",
            "Яка звичка виснажує тебе, але ти її тримаєшся?",
            "Який емоційний слід залишив твій дім у твоїй душі?",
            "Якби гроші не мали значення, чим би ти займалась?",
            "Яку роль ти граєш у сім'ї, і чи хочеш її змінити?",
            "Чому ти не дозволяєш собі відпочивати без провини?",
            "Де ти шукаєш прийняття, але не знаходиш?",
            "Як твоє тіло намагається з тобою говорити?",
            "Що ти робиш не через покликання, а через страх?",
            "Як твоя повсякденність впливає на планету?",
            "Які стосунки ти терпиш, хоча вони тебе руйнують?",
            "Де ти втрачаєш себе, намагаючись догодити іншим?"
        ],
        en: [
            "If fear disappeared, what would you create?",
            "Which habit drains you but you keep it?",
            "What emotional trace did your home leave in your soul?",
            "If money didn't matter, what would you do?",
            "What role do you play in your family — do you want to change it?",
            "Why don't you allow yourself to rest without guilt?",
            "Where do you seek acceptance but don't find it?",
            "How is your body trying to speak to you?",
            "What do you do not out of calling but out of fear?",
            "How does your daily life affect the planet?",
            "Which relationships do you tolerate though they harm you?",
            "Where do you lose yourself trying to please others?"
        ]
    };

    let currentLang = "ua";
    let groqApiKey = localStorage.getItem("groq_api_key") || "";
    let lastQuestion = "", lastSphereIdx = -1;
    let historyList = [];
    let spinning = false, lastSpinTime = 0;
    const SPIN_COOLDOWN = 3600000;

    const canvas = document.getElementById("ringCanvas");
    const ctx = canvas.getContext("2d");
    let W, H, cx, cy, R, rw;
    let angleOffset = 0;
    let hoverIdx = -1, activeIdx = -1;
    let autoRotate = true, rotSpeed = 0.001;
    let spinAnim = null;
    let particles = [];
    let eyePulse = 0;

    const THEMES = [
        { name: "космічна туманність", g1: "#0a0f1c", g2: "#010308" },
        { name: "неонова сітка", neon: true },
        { name: "місячне сяйво", g1: "#1a2a3a", g2: "#02040c" },
        { name: "вогняні хвилі", g1: "#2a1a0a", g2: "#010008" },
        { name: "кришталева печера", g1: "#203040", g2: "#020b1a" },
        { name: "магічне коло", g1: "#1e1a3a", g2: "#030108" }
    ];
    let currentTheme = 0;

    function initParticles() {
        particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({
                angle: Math.random() * Math.PI * 2,
                dist: R * (0.5 + Math.random() * 1.2),
                speed: (0.0003 + Math.random() * 0.0008) * (Math.random() < 0.5 ? 1 : -1),
                size: 0.8 + Math.random() * 1.5,
                alpha: 0.3 + Math.random() * 0.5
            });
        }
    }

    function resize() {
        const container = canvas.parentElement;
        W = Math.min(container.clientWidth, 650);
        H = W;
        canvas.width = W;
        canvas.height = H;
        cx = W / 2;
        cy = H / 2;
        R = W * 0.33;
        rw = R * 0.22;
        initParticles();
        draw();
    }

    function drawBackground() {
        const t = THEMES[currentTheme];
        if (t.neon) {
            ctx.fillStyle = "#02050c";
            ctx.fillRect(0, 0, W, H);
            ctx.strokeStyle = "rgba(0, 255, 255, 0.08)";
            ctx.lineWidth = 1;
            for (let i = 0; i < W; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
            }
        } else {
            const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.7);
            g.addColorStop(0, t.g1);
            g.addColorStop(1, t.g2);
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);
        }
    }

    function drawParticles() {
        for (const p of particles) {
            p.angle += p.speed;
            const x = cx + Math.cos(p.angle) * p.dist;
            const y = cy + Math.sin(p.angle) * p.dist;
            ctx.beginPath();
            ctx.arc(x, y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 240, 200, ${p.alpha})`;
            ctx.fill();
        }
    }

    function drawPointer() {
        const px = cx;
        const py = cy - R - rw / 2 - 18;
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#0ff";
        ctx.beginPath();
        ctx.moveTo(px, py + 18);
        ctx.lineTo(px - 10, py);
        ctx.lineTo(px + 10, py);
        ctx.closePath();
        ctx.fillStyle = "#0ff";
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
    }

    function drawSegment(idx, sa, ea, isHover, isActive) {
        const c = COLORS[idx];
        ctx.save();
        const g = ctx.createRadialGradient(cx, cy, R - rw, cx, cy, R + rw);
        if (isActive) {
            g.addColorStop(0, "#fff8");
            g.addColorStop(0.5, "#ffdd88");
            g.addColorStop(1, "#ffaa33");
        } else if (isHover) {
            g.addColorStop(0, "#fff5");
            g.addColorStop(1, c);
        } else {
            g.addColorStop(0, c + "cc");
            g.addColorStop(1, c + "77");
        }
        ctx.beginPath();
        ctx.arc(cx, cy, R + rw / 2, sa, ea);
        ctx.arc(cx, cy, R - rw / 2, ea, sa, true);
        ctx.closePath();
        ctx.fillStyle = g;
        ctx.fill();
        ctx.strokeStyle = isActive ? "#ffff80" : "rgba(0,255,255,0.5)";
        ctx.lineWidth = isActive ? 2 : 1;
        ctx.stroke();
        if (isActive) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ffaa33";
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        const mid = (sa + ea) / 2;
        const tx = cx + Math.cos(mid) * R;
        const ty = cy + Math.sin(mid) * R;
        ctx.font = `bold ${Math.max(14, R * 0.13)}px "Segoe UI"`;
        ctx.fillStyle = isActive ? "#1a102a" : "#fffef0";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(idx + 1, tx, ty);
        ctx.restore();
    }

    function drawRing() {
        const step = (Math.PI * 2) / 12;
        for (let i = 0; i < 12; i++) {
            drawSegment(i, i * step + angleOffset, (i + 1) * step + angleOffset, hoverIdx === i, activeIdx === i);
        }
    }

    function drawCenter() {
        eyePulse += 0.03;
        const pulse = 1 + Math.sin(eyePulse) * 0.05;
        const cr = R * 0.35 * pulse;

        ctx.save();
        ctx.shadowBlur = 25;
        ctx.shadowColor = "rgba(255, 220, 100, 0.4)";
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr);
        cg.addColorStop(0, "#2a3050");
        cg.addColorStop(0.7, "#1a2040");
        cg.addColorStop(1, "#0f1525");
        ctx.fillStyle = cg;
        ctx.fill();
        ctx.strokeStyle = "rgba(0, 255, 255, 0.3)";
        ctx.lineWidth = 1;
        ctx.stroke();

        const er = cr * 0.45;
        ctx.beginPath();
        ctx.arc(cx, cy, er, 0, Math.PI * 2);
        const eg = ctx.createRadialGradient(cx - er * 0.15, cy - er * 0.15, 0, cx, cy, er);
        eg.addColorStop(0, "#ffeaa0");
        eg.addColorStop(0.5, "#d4a030");
        eg.addColorStop(1, "#8a6010");
        ctx.fillStyle = eg;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx, cy, er * 0.35, 0, Math.PI * 2);
        ctx.fillStyle = "#0a0f1c";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx - er * 0.1, cy - er * 0.1, er * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.fill();
        ctx.restore();
    }

    function draw() {
        drawBackground();
        drawParticles();
        drawRing();
        drawCenter();
        drawPointer();
    }

    function animate() {
        if (autoRotate && hoverIdx === -1 && activeIdx === -1 && !spinAnim) {
            angleOffset += rotSpeed;
        }
        if (spinAnim) {
            const now = performance.now();
            let t = Math.min(1, (now - spinAnim.start) / spinAnim.duration);
            const ease = 1 - Math.pow(1 - t, 4);
            angleOffset = spinAnim.from + spinAnim.delta * ease;
            if (t >= 1) {
                angleOffset = spinAnim.to;
                spinAnim = null;
                onSpinComplete(spinAnim ? spinAnim.target : lastSphereIdx);
            }
        }
        draw();
        requestAnimationFrame(animate);
    }

    function getIdxAt(mx, my) {
        const dx = mx - cx, dy = my - cy;
        const dist = Math.hypot(dx, dy);
        if (dist < R - rw * 1.2 || dist > R + rw * 1.2) return -1;
        let a = Math.atan2(dy, dx) - angleOffset;
        a = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        return Math.floor(a / ((Math.PI * 2) / 12));
    }

    function highlightCard(idx) {
        document.querySelectorAll(".sphere-card").forEach((c, i) => {
            c.classList.toggle("selected", i === idx);
        });
    }

    async function onSpinComplete(idx) {
        const s = SPHERES[currentLang][idx];
        const q = await generateQuestion(s.short);
        lastSphereIdx = idx;
        lastQuestion = q;
        modalSphere.innerHTML = `${s.emoji} ${s.name}`;
        modalQuestion.innerHTML = q;
        modal.classList.add("active");
        highlightCard(idx);
        const bg = COLORS[idx];
        document.body.style.background = `radial-gradient(circle at 30% 20%, ${bg}22, #010308)`;
        setTimeout(() => { document.body.style.background = ""; }, 1200);
        activeIdx = -1;
        spinning = false;
        lastSpinTime = Date.now();
        document.getElementById("spinBtn").disabled = false;
        document.getElementById("randomBtn").disabled = false;
        timerHint.textContent = currentLang === "ua" ? "✅ наступний через 1 годину" : "✅ next in 1 hour";
        setTimeout(() => { if (!spinning) timerHint.textContent = ""; }, 5000);
    }

    function spinToTarget(targetIdx) {
        if (spinning) return;
        const now = Date.now();
        if (lastSpinTime && (now - lastSpinTime) < SPIN_COOLDOWN) {
            const left = Math.round((SPIN_COOLDOWN - (now - lastSpinTime)) / 60000);
            timerHint.textContent = currentLang === "ua" ? `⏳ зачекайте ${left} хв` : `⏳ wait ${left} min`;
            return;
        }
        spinning = true;
        activeIdx = targetIdx;
        document.getElementById("spinBtn").disabled = true;
        document.getElementById("randomBtn").disabled = true;
        highlightCard(targetIdx);

        const step = (Math.PI * 2) / 12;
        const targetAngle = -(targetIdx * step + step / 2);

        let cur = angleOffset % (Math.PI * 2);
        let tgt = targetAngle % (Math.PI * 2);
        let delta = tgt - cur;
        if (delta < 0) delta += Math.PI * 2;
        delta += (6 + Math.floor(Math.random() * 5)) * Math.PI * 2;

        spinAnim = {
            from: angleOffset,
            to: angleOffset + delta,
            delta: delta,
            start: performance.now(),
            duration: 2500 + Math.random() * 500,
            target: targetIdx
        };
    }

    async function generateQuestion(sphereName) {
        const q = await loadQuestions();
        if (q && q[currentLang] && q[currentLang][sphereName]) {
            return q[currentLang][sphereName];
        }
        return FALLBACK_QUESTIONS[currentLang][Math.floor(Math.random() * FALLBACK_QUESTIONS[currentLang].length)];
    }

    let cachedQuestions = null;
    async function loadQuestions() {
        if (cachedQuestions) return cachedQuestions;
        try {
            const r = await fetch("questions.json?t=" + Date.now());
            cachedQuestions = await r.json();
            return cachedQuestions;
        } catch { return null; }
    }

    canvas.addEventListener("mousemove", (e) => {
        if (spinAnim) return;
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        const mx = (e.clientX - rect.left) * scale;
        const my = (e.clientY - rect.top) * scale;
        hoverIdx = getIdxAt(mx, my);
        canvas.style.cursor = hoverIdx !== -1 ? "pointer" : "default";
    });
    canvas.addEventListener("mouseleave", () => { hoverIdx = -1; });
    canvas.addEventListener("click", (e) => {
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        const mx = (e.clientX - rect.left) * scale;
        const my = (e.clientY - rect.top) * scale;
        const idx = getIdxAt(mx, my);
        if (idx !== -1) spinToTarget(idx);
    });

    function buildCards() {
        const grid = document.getElementById("cardsGrid");
        grid.innerHTML = "";
        SPHERES[currentLang].forEach((s, i) => {
            const card = document.createElement("div");
            card.className = "sphere-card";
            card.innerHTML = `<span class="card-emoji">${s.emoji}</span><div>${s.short}</div>`;
            card.onclick = () => spinToTarget(i);
            grid.appendChild(card);
        });
    }

    function formatCooldown(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        if (h > 0) return `${h}г ${m}хв ${s}с`;
        if (m > 0) return `${m}хв ${s}с`;
        return `${s}с`;
    }

    function updateTimer() {
        if (!lastSpinTime) return;
        const left = SPIN_COOLDOWN - (Date.now() - lastSpinTime);
        if (left > 0) {
            timerHint.textContent = currentLang === "ua"
                ? `⏳ наступний через ${formatCooldown(left)}`
                : `⏳ next in ${formatCooldown(left)}`;
        } else {
            timerHint.textContent = "";
        }
    }
    setInterval(updateTimer, 1000);

    document.getElementById("randomBtn").onclick = () => {
        spinToTarget(Math.floor(Math.random() * 12));
    };
    document.getElementById("spinBtn").onclick = () => {
        spinToTarget(Math.floor(Math.random() * 12));
    };
    document.getElementById("moodBtn").onclick = () => {
        currentTheme = (currentTheme + 1) % THEMES.length;
        const m = THEMES[currentTheme].name;
        document.getElementById("resultMsg").textContent = `🎨 настрій: ${m}`;
        setTimeout(() => document.getElementById("resultMsg").textContent = "🌀 оберіть сферу або натисніть SPIN", 1500);
    };

    document.getElementById("saveKeyBtn").onclick = () => {
        groqApiKey = document.getElementById("groqKeyInput").value.trim();
        localStorage.setItem("groq_api_key", groqApiKey);
        document.getElementById("resultMsg").textContent = "🔑 збережено";
        setTimeout(() => document.getElementById("resultMsg").textContent = "🌀 оберіть сферу або натисніть SPIN", 1500);
    };
    if (groqApiKey) document.getElementById("groqKeyInput").value = groqApiKey;

    document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.onclick = () => {
            currentLang = btn.dataset.lang;
            document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === currentLang));
            buildCards();
            document.getElementById("resultMsg").textContent = "🌀 оберіть сферу або натисніть SPIN";
        };
    });

    document.getElementById("modalCloseBtn").onclick = () => modal.classList.remove("active");
    document.getElementById("modalSaveBtn").onclick = () => {
        if (lastQuestion && lastSphereIdx !== -1) {
            const s = SPHERES[currentLang][lastSphereIdx];
            historyList.unshift(`${s.emoji} ${s.short} · ${lastQuestion.substring(0, 40)}...`);
            if (historyList.length > 6) historyList.pop();
            document.getElementById("historyLog").innerHTML = historyList.map(h => `<div>📜 ${h}</div>`).join("");
            modal.classList.remove("active");
        }
    };
    document.getElementById("modalCopyBtn").onclick = () => {
        if (lastQuestion && lastSphereIdx !== -1) {
            const s = SPHERES[currentLang][lastSphereIdx];
            navigator.clipboard.writeText(`${s.emoji} ${s.name}\n💭 ${lastQuestion}`);
            document.getElementById("modalCopyBtn").textContent = "✅ скопійовано";
            setTimeout(() => document.getElementById("modalCopyBtn").textContent = "📋 Копіювати", 1500);
        }
    };
    window.onclick = (e) => { if (e.target === modal) modal.classList.remove("active"); };

    window.addEventListener("resize", resize);
    resize();
    animate();
    buildCards();
})();
</script>
</body>
</html>
