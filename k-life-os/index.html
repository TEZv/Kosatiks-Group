<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 Рулетка Сфер Життя · Казино Долі</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #0a1f1a 0%, #030a07 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', 'Times New Roman', serif;
            padding: 1rem;
        }
        .roulette-layout {
            max-width: 1400px;
            width: 100%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            padding: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #d4af37;
        }
        /* ліва частина — колесо */
        .wheel-area {
            flex: 1.2;
            min-width: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        canvas {
            width: 100%;
            max-width: 500px;
            height: auto;
            background: #1a3a2a;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #b8860b, 0 0 0 12px #d4af37, 0 15px 35px black;
        }
        /* права частина — поле ставок (картки сфер) */
        .betting-area {
            flex: 0.8;
            min-width: 280px;
            background: #0f281f;
            border-radius: 2rem;
            padding: 1rem;
            border: 2px solid #d4af37;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 10px 20px black;
        }
        .betting-title {
            text-align: center;
            font-size: 1.2rem;
            color: #f7d97a;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            border-bottom: 1px solid #d4af37;
            display: inline-block;
            width: 100%;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.7rem;
        }
        .sphere-card {
            background: linear-gradient(145deg, #1e3a2a, #0f241a);
            border-radius: 1rem;
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 1px solid #b8860b;
            color: #e9d6a3;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .sphere-card:hover {
            transform: scale(1.02);
            background: #2a5a3a;
            border-color: #f5b042;
        }
        .sphere-card.active-card {
            background: radial-gradient(circle, #f5b042, #b45f1b);
            color: #0f1a0e;
            border-color: #ffdf80;
            box-shadow: 0 0 15px #f5b042;
        }
        .sphere-emoji {
            font-size: 1.4rem;
            display: block;
        }
        .sphere-short {
            font-size: 0.6rem;
            font-weight: normal;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        button {
            background: radial-gradient(circle at 30% 20%, #f5b042, #b45f1b);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 0.9rem;
            color: #0f1a0e;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 3px 0 #5a2e0a;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #5a2e0a;
        }
        .result-area {
            margin-top: 1rem;
            text-align: center;
            background: #0a1f18;
            border-radius: 2rem;
            padding: 0.5rem;
            border: 1px solid #d4af37;
        }
        .result-text {
            color: #f9e2a1;
            font-size: 0.8rem;
            word-break: break-word;
        }
        .history {
            margin-top: 0.5rem;
            font-size: 0.65rem;
            color: #c9b27c;
            overflow-x: auto;
            white-space: nowrap;
        }
        @media (max-width: 900px) {
            .roulette-layout { flex-direction: column; align-items: center; }
            .betting-area { width: 100%; }
        }
    </style>
</head>
<body>
<div class="roulette-layout">
    <div class="wheel-area">
        <canvas id="rouletteCanvas" width="600" height="600" style="width:100%; height:auto; max-width:600px; aspect-ratio:1/1"></canvas>
    </div>
    <div class="betting-area">
        <div class="betting-title">✨ поле сфер ✨</div>
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="controls">
            <button id="spinBtn">🎲 КИНУТИ КУЛЬКУ</button>
            <button id="copyBtn">📋 КОПІЮВАТИ</button>
        </div>
        <div class="result-area">
            <div class="result-text" id="resultMessage">🌀 натисніть «кинути кульку»</div>
            <div class="history" id="historyLog"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== ТОЧНІ 12 СФЕР (повні назви) ==========
        const SPHERES = [
            { emoji: "🚀", name: "Creativity or Self-Expression", short: "Творчість" },
            { emoji: "🧑‍🔬", name: "Personal Development or Self-Care", short: "Саморозвиток" },
            { emoji: "🏘", name: "Domestic Life or Household Management", short: "Дім" },
            { emoji: "💴", name: "Finance", short: "Фінанси" },
            { emoji: "🤝", name: "Parenting or Family", short: "Сім'я" },
            { emoji: "📚", name: "Recreation and Hobbies", short: "Хобі" },
            { emoji: "🗣️", name: "Community Involvement or Social Connection", short: "Спільнота" },
            { emoji: "🌳", name: "Physical Health", short: "Здоров'я" },
            { emoji: "🔎", name: "Career or Education", short: "Кар'єра" },
            { emoji: "🌿", name: "Environmental or Charitable Causes", short: "Екологія" },
            { emoji: "👥", name: "Personal Relationship", short: "Стосунки" },
            { emoji: "🧘", name: "Spirituality", short: "Духовність" }
        ];

        // Багата база натхненних фраз (для кожної сфери)
        const PHRASES = [
            "Творчість — міст між світами", "Створи щось недосконале — це магія", "Кожен мазок — молитва",
            "Рости — це природно, навіть боляче", "Маленький крок сьогодні змінює все", "Ти — сад, який потребує догляду",
            "Запали свічку на згадку про себе", "Дім — дзеркало твоєї душі", "Прибери з любов'ю — простір віддячить",
            "Гроші люблять повагу, а не страх", "Фінансова грамотність — це свобода", "Вдячність творить потік",
            "Обійми лікують без слів", "Родина — це гавань, а не обов'язок", "Традиції тримають покоління",
            "Гра — найсерйозніша справа", "Хобі — голос внутрішньої дитини", "Відпочинок зцілює",
            "Разом ми — зірки одного сузір'я", "Твій голос має значення", "Маленька допомога змінює світ",
            "Твоє тіло — храм", "Рух — це молитва", "Слухай, що шепоче твоя плоть",
            "Кар'єра — це гра, а не війна", "Роби те, що має сенс", "Навик, який змінить усе, вже в тобі",
            "Планета дихає разом із тобою", "Екозвичка — це подяка землі", "Навіть одна відмова від пластику рятує",
            "Справжні стосунки — це безпека", "Слухати — найвища форма любові", "Кордони не руйнують, а зміцнюють",
            "Духовність — це повернення додому", "Тиша відкриває відповіді", "Ти — іскра вічного вогню"
        ];

        // ========== НАЛАШТУВАННЯ КАНВАСУ ==========
        const canvas = document.getElementById("rouletteCanvas");
        const ctx = canvas.getContext("2d");
        let size = 600;
        let center = 300;
        let radius = 280;
        let angleOffset = 0;
        let wheelAngle = 0;
        let ballAngle = 0;
        let spinning = false;
        let spinStart = 0;
        let spinDuration = 2500;
        let targetSegment = 0;
        let wheelStartAngle = 0;
        let ballStartAngle = 0;
        let wheelDelta = 0;
        let ballDelta = 0;
        let activeSphereIndex = -1;
        let lastMessage = "";
        let history = [];

        // DOM елементи
        const cardsGrid = document.getElementById("cardsGrid");
        const resultDiv = document.getElementById("resultMessage");
        const historyDiv = document.getElementById("historyLog");
        const spinBtn = document.getElementById("spinBtn");
        const copyBtn = document.getElementById("copyBtn");

        // ========== ПОБУДОВА КАРТОК СПРАВА ==========
        function buildCards() {
            cardsGrid.innerHTML = "";
            SPHERES.forEach((s, idx) => {
                const card = document.createElement("div");
                card.className = "sphere-card";
                card.dataset.idx = idx;
                card.innerHTML = `<span class="sphere-emoji">${s.emoji}</span><div>${s.short}</div><div class="sphere-short">${s.name.substring(0, 28)}</div>`;
                card.addEventListener("click", () => {
                    if (!spinning) {
                        // Запускаємо спін з цільовим сектором (вибрана картка)
                        targetSegment = idx;
                        startSpin();
                    }
                });
                cardsGrid.appendChild(card);
            });
        }

        function highlightCard(index) {
            const cards = document.querySelectorAll(".sphere-card");
            cards.forEach((card, i) => {
                if (i === index) card.classList.add("active-card");
                else card.classList.remove("active-card");
            });
        }

        // ========== МАЛЮВАННЯ КОЛЕСА ==========
        function drawWheel() {
            if (!ctx) return;
            ctx.clearRect(0, 0, size, size);
            // фон колеса
            ctx.fillStyle = "#1e3a2a";
            ctx.fillRect(0, 0, size, size);
            const step = (Math.PI * 2) / 12;
            for (let i = 0; i < 12; i++) {
                const start = i * step + wheelAngle;
                const end = (i+1) * step + wheelAngle;
                const hue = (i * 30) % 360;
                const grad = ctx.createRadialGradient(center, center, radius*0.2, center, center, radius);
                grad.addColorStop(0, `hsl(${hue}, 85%, 60%)`);
                grad.addColorStop(1, `hsl(${hue}, 80%, 40%)`);
                ctx.beginPath();
                ctx.arc(center, center, radius, start, end);
                ctx.lineTo(center, center);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = "#f7d97a";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // номер
                const mid = start + step/2;
                const txtR = radius * 0.7;
                const x = center + Math.cos(mid) * txtR;
                const y = center + Math.sin(mid) * txtR;
                ctx.font = `bold ${Math.max(18, radius*0.08)}px "Segoe UI"`;
                ctx.fillStyle = "#fff8e7";
                ctx.shadowBlur = 3;
                ctx.fillText(i+1, x-11, y+7);
                ctx.shadowBlur = 0;
            }
            // центральне коло
            ctx.beginPath();
            ctx.arc(center, center, radius*0.18, 0, Math.PI*2);
            ctx.fillStyle = "#d4af37";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(center, center, radius*0.1, 0, Math.PI*2);
            ctx.fillStyle = "#b8860b";
            ctx.fill();
            // кулька
            const ballRad = radius * 0.045;
            const ballX = center + Math.cos(ballAngle) * (radius - ballRad - 5);
            const ballY = center + Math.sin(ballAngle) * (radius - ballRad - 5);
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRad, 0, Math.PI*2);
            ctx.fillStyle = "#f0f0f0";
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.arc(ballX-2, ballY-2, ballRad*0.3, 0, Math.PI*2);
            ctx.fill();
        }

        // Визначення індексу сектора, на який вказує верхній вказівник (12 годин)
        function getSegmentAtTop() {
            const pointerAngle = -Math.PI/2;
            let raw = pointerAngle - wheelAngle;
            raw = ((raw % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
            return Math.floor(raw / (Math.PI*2/12));
        }

        // Отримати випадкову фразу для сфери
        function getRandomPhrase(sphereIdx) {
            const pool = PHRASES.filter(p => p.length > 5);
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function startSpin() {
            if (spinning) return;
            spinning = true;
            spinBtn.disabled = true;
            // Якщо targetSegment не задано, вибираємо випадковий
            if (targetSegment === undefined || targetSegment === -1) {
                targetSegment = Math.floor(Math.random() * 12);
            }
            // Поточний індекс під вказівником
            const currentIdx = getSegmentAtTop();
            let deltaIndices = (targetSegment - currentIdx + 12) % 12;
            let deltaAngle = deltaIndices * (Math.PI*2/12);
            const extraFull = (Math.floor(Math.random() * 8) + 8) * 2 * Math.PI;
            wheelDelta = deltaAngle + extraFull;
            // Кулька: багато обертів + фіксуємо у верхній точці
            const finalBallPos = -Math.PI/2;
            let ballDeltaVal = (finalBallPos - ballAngle + 2*Math.PI) % (2*Math.PI);
            ballDeltaVal += (Math.floor(Math.random() * 10) + 12) * 2 * Math.PI;
            ballDelta = ballDeltaVal;
            wheelStartAngle = wheelAngle;
            ballStartAngle = ballAngle;
            spinStart = performance.now();
            requestAnimationFrame(animateSpin);
        }

        function animateSpin(now) {
            const elapsed = now - spinStart;
            let t = Math.min(1, elapsed / spinDuration);
            const ease = 1 - Math.pow(1-t, 3);
            wheelAngle = wheelStartAngle + wheelDelta * ease;
            ballAngle = ballStartAngle + ballDelta * ease;
            drawWheel();
            if (t < 1) {
                requestAnimationFrame(animateSpin);
            } else {
                // Фіксуємо кути
                wheelAngle = (wheelStartAngle + wheelDelta) % (2*Math.PI);
                ballAngle = (ballStartAngle + ballDelta) % (2*Math.PI);
                drawWheel();
                const finalIdx = getSegmentAtTop();
                activeSphereIndex = finalIdx;
                highlightCard(finalIdx);
                const sphere = SPHERES[finalIdx];
                const phrase = getRandomPhrase(finalIdx);
                lastMessage = `${sphere.emoji} ${sphere.name} · ${phrase}`;
                resultDiv.innerHTML = `✨ ${lastMessage}`;
                history.unshift(`${sphere.emoji} ${sphere.short}`);
                if (history.length > 6) history.pop();
                historyDiv.innerHTML = `📜 історія: ${history.join(' · ')}`;
                spinning = false;
                spinBtn.disabled = false;
                targetSegment = -1;
                // ефект спалаху
                flashEffect();
            }
        }

        function flashEffect() {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.background = 'radial-gradient(circle, rgba(255,215,0,0.3), transparent)';
            overlay.style.pointerEvents = 'none';
            overlay.style.zIndex = '999';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 400);
        }

        function copyResult() {
            if (lastMessage) {
                navigator.clipboard.writeText(lastMessage);
                const original = resultDiv.innerText;
                resultDiv.innerHTML = "✅ скопійовано!";
                setTimeout(() => resultDiv.innerHTML = original, 1200);
            } else {
                resultDiv.innerHTML = "🌀 спочатку зробіть спін";
                setTimeout(() => {
                    if (lastMessage) resultDiv.innerHTML = `✨ ${lastMessage}`;
                    else resultDiv.innerHTML = "🌀 натисніть «кинути кульку»";
                }, 1500);
            }
        }

        function randomSpin() {
            if (spinning) return;
            targetSegment = Math.floor(Math.random() * 12);
            startSpin();
        }

        // Ініціалізація
        function init() {
            buildCards();
            drawWheel();
            spinBtn.addEventListener("click", randomSpin);
            copyBtn.addEventListener("click", copyResult);
            window.addEventListener("resize", () => { drawWheel(); });
            // стартове повідомлення
            setTimeout(() => {
                resultDiv.innerHTML = "🌀 оберіть картку або натисніть «кинути кульку»";
            }, 500);
        }
        init();
    })();
</script>
</body>
</html>
