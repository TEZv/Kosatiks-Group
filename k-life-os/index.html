<!DOCTYPE html>
<html lang="uk" id="htmlLang">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title id="pageTitle">🌀 Мінливий оракул · Кільце Сфер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        html, body { height: 100%; }
        body {
            background: radial-gradient(circle at 30% 20%, #0a0f1c, #010308);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            padding: 1rem;
            gap: 1rem;
            align-items: stretch;
        }
        .ring-container {
            flex: 3 1 600px;
            min-width: 300px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 80vh;
            aspect-ratio: 1 / 1;
            background: transparent;
            cursor: pointer;
        }
        .sidebar {
            flex: 1 1 280px;
            min-width: 260px;
            max-width: 320px;
            background: linear-gradient(180deg, rgba(15, 20, 40, 0.9) 0%, rgba(8, 12, 25, 0.95) 100%);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: calc(100vh - 2rem);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 255, 255, 0.3) transparent;
            position: relative;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.3); border-radius: 2px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        
        .sidebar-section {
            background: rgba(0, 255, 255, 0.03);
            border-radius: 0.8rem;
            padding: 0.5rem;
            border: 1px solid rgba(0, 255, 255, 0.1);
        }
        .sidebar-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(0, 255, 255, 0.5);
            margin-bottom: 0.4rem;
            font-weight: 600;
        }
        
        .controls {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }
        button {
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.2);
            color: #aef;
            padding: 0.5rem 1rem;
            border-radius: 0.8rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            backdrop-filter: blur(4px);
            flex: 1;
        }
        button:hover {
            background: rgba(0, 255, 255, 0.15);
            border-color: rgba(0, 255, 255, 0.5);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }
        .btn-primary {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(100, 200, 255, 0.15));
            border-color: rgba(0, 255, 255, 0.4);
            color: #fff;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.3), rgba(100, 200, 255, 0.25));
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }
        
        .lang-switch { display: flex; gap: 0.4rem; justify-content: center; }
        .lang-btn { 
            background: rgba(0, 255, 255, 0.05); 
            border: 1px solid rgba(0, 255, 255, 0.15);
            padding: 0.3rem 0.7rem; 
            font-size: 0.65rem;
            flex: none;
        }
        .lang-btn.active { 
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.25), rgba(0, 200, 200, 0.2)); 
            color: #fff; 
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        
        .api-settings { display: none; }
        .cards-grid {
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 0.3rem;
            overflow-y: auto;
            padding: 0.2rem;
        }
        .sphere-card {
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 0.6rem; 
            padding: 0.5rem 0.2rem; 
            text-align: center;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 2px solid var(--sphere-color, rgba(0, 255, 255, 0.3));
            color: #bde;
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .sphere-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, var(--sphere-color, rgba(0, 255, 255, 0.15)), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sphere-card:hover::before { opacity: 0.4; }
        .sphere-card:hover { 
            border-color: var(--sphere-color, rgba(0, 255, 255, 0.4));
            transform: translateY(-2px);
            box-shadow: 0 4px 20px color-mix(in srgb, var(--sphere-color, cyan) 30%, transparent);
        }
        .sphere-card.selected {
            background: linear-gradient(135deg, rgba(255, 170, 50, 0.3), rgba(200, 100, 20, 0.25));
            border-color: rgba(255, 200, 100, 0.6);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 170, 50, 0.3);
        }
        .sphere-card.selected::before { opacity: 0; }
        .card-emoji { 
            font-size: 1.2rem; 
            display: block; 
            margin-bottom: 0.2rem;
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.3));
        }
        .card-name { 
            font-size: 0.5rem; 
            font-weight: 500;
            line-height: 1.2;
            opacity: 0.8;
        }
        .sphere-card.selected .card-name { opacity: 1; }
        
        .result-area {
            background: rgba(0, 20, 30, 0.4);
            border-radius: 0.8rem; 
            padding: 0.6rem;
            border: 1px solid rgba(0, 255, 255, 0.15);
            text-align: center;
        }
        #resultMsg {
            font-size: 0.7rem;
            color: #8cf;
            line-height: 1.4;
        }
        .history { 
            margin-top: 0.4rem; 
            font-size: 0.55rem; 
            color: rgba(200, 180, 140, 0.7); 
            max-height: 70px; 
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 255, 255, 0.2) transparent;
        }
        .history-item {
            padding: 0.25rem 0.3rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.05);
            border-radius: 0.3rem;
            transition: background 0.2s;
        }
        .history-item:hover {
            background: rgba(0, 255, 255, 0.05);
        }
        .history-item:last-child { border-bottom: none; }
        .timer-hint {
            font-size: 0.6rem; 
            font-weight: 500; 
            color: rgba(0, 255, 255, 0.6); 
            text-align: center;
            padding: 0.3rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.15); }
            50% { box-shadow: 0 0 30px rgba(0, 255, 255, 0.25); }
        }
        .sidebar { animation: pulse-glow 4s ease-in-out infinite; }
        
        .sidebar-orb {
            position: absolute;
            top: -30px;
            right: -30px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.3) 0%, rgba(100, 100, 255, 0.1) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(8px);
            animation: float-orb 6s ease-in-out infinite;
        }
        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
            50% { transform: translate(-10px, 10px) scale(1.1); opacity: 1; }
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: 0.2s;
        }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-card {
            background: linear-gradient(135deg, rgba(15, 25, 40, 0.95), rgba(10, 15, 30, 0.98));
            border-radius: 1.5rem; 
            padding: 1.5rem; 
            max-width: 480px; 
            width: 92%;
            border: 1px solid rgba(0, 255, 255, 0.3); 
            box-shadow: 
                0 0 40px rgba(0, 255, 255, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center; 
            transform: scale(0.9); 
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal.active .modal-card { transform: scale(1); }
        .modal-card h3 { 
            color: rgba(0, 255, 255, 0.9); 
            margin-bottom: 0.8rem; 
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.05em;
        }
        .modal-sphere-name { 
            font-size: 1.1rem; 
            color: rgba(255, 200, 100, 0.95); 
            margin-bottom: 0.3rem;
            font-weight: 600;
        }
        .modal-hint {
            font-size: 0.7rem;
            color: rgba(0, 255, 255, 0.5);
            margin-bottom: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }
        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin: 0.5rem 0 1rem;
        }
        .question-item {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 0.8rem;
            padding: 0.7rem 0.9rem;
            font-size: 0.9rem;
            color: rgba(255, 240, 220, 0.95);
            line-height: 1.45;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .question-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: rgba(0, 255, 255, 0.3);
            transition: background 0.2s;
        }
        .question-item:hover {
            background: rgba(0, 255, 255, 0.12);
            border-color: rgba(0, 255, 255, 0.4);
            transform: translateX(2px);
        }
        .question-item:hover::before {
            background: rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        }
        .question-item.selected {
            background: linear-gradient(135deg, rgba(255, 170, 50, 0.2), rgba(200, 100, 20, 0.15));
            border-color: rgba(255, 200, 100, 0.6);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 170, 50, 0.2);
        }
        .question-item.selected::before {
            background: rgba(255, 200, 100, 0.9);
            box-shadow: 0 0 10px rgba(255, 200, 100, 0.6);
        }
        .current-question {
            background: rgba(255, 200, 100, 0.08);
            border: 1px solid rgba(255, 200, 100, 0.3);
            border-radius: 0.8rem;
            padding: 0.9rem 1rem;
            font-size: 0.95rem;
            color: rgba(255, 245, 220, 0.98);
            line-height: 1.5;
            text-align: left;
            margin-bottom: 0.6rem;
            font-weight: 500;
        }
        .answers-label {
            font-size: 0.65rem;
            color: rgba(0, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0.6rem 0 0.4rem;
            text-align: left;
        }
        .answers-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
        }
        .questions-loading {
            text-align: center;
            padding: 1.5rem 0;
            color: rgba(0, 255, 255, 0.6);
            font-size: 0.85rem;
        }
        .questions-loading .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-top-color: rgba(0, 255, 255, 0.9);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-actions { display: flex; gap: 0.6rem; justify-content: center; margin-top: 1.2rem; flex-wrap: wrap; }
        .modal-actions button { 
            background: rgba(0, 255, 255, 0.1); 
            color: rgba(0, 255, 255, 0.9); 
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 0.8rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        .modal-actions button:hover { 
            background: rgba(0, 255, 255, 0.2); 
            color: #fff;
            border-color: rgba(0, 255, 255, 0.6);
            transform: translateY(-1px);
        }
        #modalRerollBtn {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.25), rgba(100, 200, 255, 0.18)) !important;
            border-color: rgba(0, 255, 255, 0.5) !important;
            color: #fff !important;
            font-weight: 600;
        }
        #modalRerollBtn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.35), rgba(100, 200, 255, 0.28)) !important;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        @media (max-width: 1100px) {
            .main-layout { padding: 0.75rem; gap: 0.75rem; }
            .ring-container { flex: 2 1 500px; }
        }
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; padding: 0.5rem; gap: 0.5rem; }
            .sidebar { 
                max-width: 100%; 
                max-height: none;
                flex: 1 1 auto;
            }
            .ring-container { flex: 1 1 auto; min-height: auto; }
            .cards-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 600px) {
            .main-layout { padding: 0.4rem; }
            .cards-grid { grid-template-columns: repeat(3, 1fr); }
            .sidebar { padding: 0.7rem; }
        }
        @media (max-height: 700px) {
            .sidebar { 
                max-height: calc(100vh - 1rem);
                padding: 0.7rem;
            }
        }
    </style>
</head>
<body>
<div class="main-layout">
    <div class="ring-container">
        <canvas id="ringCanvas" width="600" height="600"></canvas>
        <div class="controls">
            <button id="randomBtn" data-i18n="randomSphere">✨ випадкова сфера</button>
            <button id="moodBtn" data-i18n="newMood">🎨 новий настрій</button>
        </div>
    </div>
    <div class="sidebar">
        <div class="sidebar-orb"></div>
        <div class="sidebar-section">
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="ua">🇺🇦 UA</button>
                <button class="lang-btn" data-lang="en">🇬🇧 EN</button>

        <div class="sidebar-section">

        <div class="timer-hint" id="timerHint"></div>
    </div>
</div>

<div id="modal" class="modal">

        <h3 data-i18n="oracleOfSphere">🌀 Оракул сфери</h3>

</div>

            waitMin: (m) => `⏳ зачекайте ${m} хв`,
            loadingQ: "Завантажую питання...",
            pickingOther: "Обираю інші...",
            cooldownPrefix: "⏳ наступний через",
            moodPrefix: "🎨 настрій:",
            pageTitle: "🌀 Мінливий оракул · Кільце Сфер",
            formatHms: (h, m, s) => {
                if (h > 0) return `${h}г ${m}хв ${s}с`;
                if (m > 0) return `${m}хв ${s}с`;
                return `${s}с`;
            }
        },
        en: {
            randomSphere: "✨ random sphere",
            newMood: "🎨 new mood",
            lifeSpheres: "Life Spheres",
            spinChoose: "🎲 SPIN · choose a sphere",
            lastQuestion: "Recent",
            resultPlaceholder: "🌀 choose a sphere or press SPIN",
            oracleOfSphere: "🌀 Sphere Oracle",
            answersLabel: "How could she respond?",
            otherQ: "🎲 Other question",
            close: "Close",
            copy: "📋 Copy",
            copied: "✅ copied",
            nextIn1h: "✅ next in 1 hour",
            waitMin: (m) => `⏳ wait ${m} min`,
            loadingQ: "Loading questions...",
            pickingOther: "Picking others...",
            cooldownPrefix: "⏳ next in",
            moodPrefix: "🎨 mood:",
            pageTitle: "🌀 Shifting Oracle · Sphere Ring",
            formatHms: (h, m, s) => {
                if (h > 0) return `${h}h ${m}m ${s}s`;
                if (m > 0) return `${m}m ${s}s`;
                return `${s}s`;
            }
        }
    };

    function applyI18n() {
        const dict = I18N[currentLang];
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.dataset.i18n;
            if (dict[key]) el.innerHTML = dict[key];
        });
        const def = document.querySelector("[data-i18n-default]");
        if (def) def.innerHTML = dict.resultPlaceholder;
        document.title = dict.pageTitle;
        const htmlEl = document.getElementById("htmlLang");
        if (htmlEl) htmlEl.lang = currentLang === "ua" ? "uk" : "en";
    }

    const canvas = document.getElementById("ringCanvas");
    const ctx = canvas.getContext("2d");
    const modal = document.getElementById("modal");
    const modalSphere = document.getElementById("modalSphere");
    const currentQuestion = document.getElementById("currentQuestion");
    const answersList = document.getElementById("answersList");
    let currentItemPool = [];
    let currentItem = null;
    let lastAnswer = "";
    let W, H, cx, cy, R, rw;
    let angleOffset = 0;
    let hoverIdx = -1, activeIdx = -1;
    let autoRotate = true, rotSpeed = 0.001;
    let spinAnim = null;
    let particles = [];
    let eyePulse = 0;

    const THEMES = [
        { name: { ua: "космічна туманність", en: "cosmic nebula" }, g1: "#0a0f1c", g2: "#010308" },
        { name: { ua: "неонова сітка", en: "neon grid" }, neon: true },
        { name: { ua: "місячне сяйво", en: "moonlight" }, g1: "#1a2a3a", g2: "#02040c" },
        { name: { ua: "вогняні хвилі", en: "fire waves" }, g1: "#2a1a0a", g2: "#010008" },
        { name: { ua: "кришталева печера", en: "crystal cave" }, g1: "#203040", g2: "#020b1a" },
        { name: { ua: "магічне коло", en: "magic circle" }, g1: "#1e1a3a", g2: "#030108" }
    ];
    let currentTheme = 0;

    function initParticles() {
        particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({
                angle: Math.random() * Math.PI * 2,
                dist: R * (0.5 + Math.random() * 1.2),
                speed: (0.0003 + Math.random() * 0.0008) * (Math.random() < 0.5 ? 1 : -1),
                size: 0.8 + Math.random() * 1.5,
                alpha: 0.3 + Math.random() * 0.5
            });
        }
    }

    function resize() {
        const container = canvas.parentElement;
        const containerW = container.clientWidth;
        const vh = window.innerHeight;
        const maxW = Math.min(containerW - 2, 900);
        const maxH = vh * 0.78;
        W = Math.min(maxW, maxH);
        H = W;
        canvas.width = W;
        canvas.height = H;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        cx = W / 2;
        cy = H / 2;
        R = W * 0.33;
        rw = R * 0.22;
        initParticles();
        draw();
    }

    function drawBackground() {
        const t = THEMES[currentTheme];
        if (t.neon) {
            ctx.fillStyle = "#02050c";
            ctx.fillRect(0, 0, W, H);
            ctx.strokeStyle = "rgba(0, 255, 255, 0.08)";
            ctx.lineWidth = 1;
            for (let i = 0; i < W; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
            }
        } else {
            const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.7);
            g.addColorStop(0, t.g1);
            g.addColorStop(1, t.g2);
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);
        }
    }

    function drawParticles() {
        for (const p of particles) {
            p.angle += p.speed;
            const x = cx + Math.cos(p.angle) * p.dist;
            const y = cy + Math.sin(p.angle) * p.dist;
            ctx.beginPath();
            ctx.arc(x, y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 240, 200, ${p.alpha})`;
            ctx.fill();
        }
    }

    function drawPointer() {
        const px = cx;
        const py = cy - R - rw / 2 - 18;
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#0ff";
        ctx.beginPath();
        ctx.moveTo(px, py + 18);
        ctx.lineTo(px - 10, py);
        ctx.lineTo(px + 10, py);
        ctx.closePath();
        ctx.fillStyle = "#0ff";
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
    }

    function drawSegment(idx, sa, ea, isHover, isActive) {
        const c = COLORS[idx];
        ctx.save();
        const g = ctx.createRadialGradient(cx, cy, R - rw, cx, cy, R + rw);
        if (isActive) {
            g.addColorStop(0, "#fff8");
            g.addColorStop(0.5, "#ffdd88");
            g.addColorStop(1, "#ffaa33");
        } else if (isHover) {
            g.addColorStop(0, "#fff5");
            g.addColorStop(1, c);
        } else {
            g.addColorStop(0, c + "cc");
            g.addColorStop(1, c + "77");
        }
        ctx.beginPath();
        ctx.arc(cx, cy, R + rw / 2, sa, ea);
        ctx.arc(cx, cy, R - rw / 2, ea, sa, true);
        ctx.closePath();
        ctx.fillStyle = g;
        ctx.fill();
        ctx.strokeStyle = isActive ? "#ffff80" : "rgba(0,255,255,0.5)";
        ctx.lineWidth = isActive ? 2 : 1;
        ctx.stroke();
        if (isActive) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ffaa33";
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        const mid = (sa + ea) / 2;
        const tx = cx + Math.cos(mid) * R;
        const ty = cy + Math.sin(mid) * R;
        ctx.font = `bold ${Math.max(14, R * 0.13)}px "Segoe UI"`;
        ctx.fillStyle = isActive ? "#1a102a" : "#fffef0";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(idx + 1, tx, ty);
        ctx.restore();
    }

    function drawRing() {
        const step = (Math.PI * 2) / 12;
        for (let i = 0; i < 12; i++) {
            drawSegment(i, i * step + angleOffset, (i + 1) * step + angleOffset, hoverIdx === i, activeIdx === i);
        }
    }

    function drawCenter() {
        eyePulse += 0.03;
        const pulse = 1 + Math.sin(eyePulse) * 0.05;
        const cr = R * 0.35 * pulse;

        ctx.save();
        ctx.shadowBlur = 25;
        ctx.shadowColor = "rgba(255, 220, 100, 0.4)";
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr);
        cg.addColorStop(0, "#2a3050");
        cg.addColorStop(0.7, "#1a2040");
        cg.addColorStop(1, "#0f1525");
        ctx.fillStyle = cg;
        ctx.fill();
        ctx.strokeStyle = "rgba(0, 255, 255, 0.3)";
        ctx.lineWidth = 1;
        ctx.stroke();

        const er = cr * 0.45;
        ctx.beginPath();
        ctx.arc(cx, cy, er, 0, Math.PI * 2);
        const eg = ctx.createRadialGradient(cx - er * 0.15, cy - er * 0.15, 0, cx, cy, er);
        eg.addColorStop(0, "#ffeaa0");
        eg.addColorStop(0.5, "#d4a030");
        eg.addColorStop(1, "#8a6010");
        ctx.fillStyle = eg;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx, cy, er * 0.35, 0, Math.PI * 2);
        ctx.fillStyle = "#0a0f1c";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx - er * 0.1, cy - er * 0.1, er * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.fill();
        ctx.restore();
    }

    function draw() {
        drawBackground();
        drawParticles();
        drawRing();
        drawCenter();
        drawPointer();
    }

    function animate() {
        if (autoRotate && hoverIdx === -1 && activeIdx === -1 && !spinAnim) {
            angleOffset += rotSpeed;
        }
        if (spinAnim) {
            const now = performance.now();
            let t = Math.min(1, (now - spinAnim.start) / spinAnim.duration);
            const ease = 1 - Math.pow(1 - t, 4);
            angleOffset = spinAnim.from + spinAnim.delta * ease;
            if (t >= 1) {
                const targetIdx = spinAnim.target;
                angleOffset = spinAnim.to;
                spinAnim = null;
                onSpinComplete(targetIdx);
            }
        }
        draw();
        requestAnimationFrame(animate);
    }

    function getIdxAt(mx, my) {
        const dx = mx - cx, dy = my - cy;
        const dist = Math.hypot(dx, dy);
        if (dist < R - rw * 1.2 || dist > R + rw * 1.2) return -1;
        let a = Math.atan2(dy, dx) - angleOffset;
        a = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        return Math.floor(a / ((Math.PI * 2) / 12));
    }

    function highlightCard(idx) {
        document.querySelectorAll(".sphere-card").forEach((c, i) => {
            c.classList.toggle("selected", i === idx);
        });
    }

    function showModalLoading(sphereName) {
        const s = SPHERES[currentLang][lastSphereIdx];
        modalSphere.innerHTML = `${s.emoji} ${s.name}`;
        currentQuestion.innerHTML = `<div class="questions-loading"><span class="spinner"></span>${I18N[currentLang].loadingQ}</div>`;
        answersList.innerHTML = "";
        modal.classList.add("active");
    }

    function renderCurrentItem(item) {
        currentItem = item;
        if (!item) {
            currentQuestion.textContent = "—";
            answersList.innerHTML = "";
            return;
        }
        currentQuestion.textContent = item.q;
        answersList.innerHTML = "";
        item.a.forEach((answer, i) => {
            const el = document.createElement("div");
            el.className = "question-item";
            const letter = String.fromCharCode(65 + i);
            el.innerHTML = `<span style="opacity:0.5;margin-right:0.4rem;">${letter}.</span>${answer}`;
            el.onclick = () => {
                document.querySelectorAll(".answers-list .question-item").forEach(x => x.classList.remove("selected"));
                el.classList.add("selected");
                lastAnswer = answer;
                lastQuestion = `${item.q}\n→ ${answer}`;
            };
            answersList.appendChild(el);
        });
        if (item.a.length > 0) {
            const first = answersList.querySelector(".question-item");
            if (first) first.classList.add("selected");
            lastAnswer = item.a[0];
            lastQuestion = `${item.q}\n→ ${item.a[0]}`;
        }
    }

    async function onSpinComplete(idx) {
        const s = SPHERES[currentLang][idx];
        lastSphereIdx = idx;
        highlightCard(idx);
        const bg = COLORS[idx];
        document.body.style.background = `radial-gradient(circle at 30% 20%, ${bg}22, #010308)`;
        setTimeout(() => { document.body.style.background = ""; }, 1200);
        showModalLoading(s.short);
        currentItemPool = await generateQuestions(s.short, s.name);
        if (currentItemPool.length > 0) {
            renderCurrentItem(currentItemPool[0]);
        }
        activeIdx = -1;
        spinning = false;
        lastSpinTime = Date.now();
        document.getElementById("spinBtn").disabled = false;
        document.getElementById("randomBtn").disabled = false;
        timerHint.textContent = I18N[currentLang].nextIn1h;
        setTimeout(() => { if (!spinning) timerHint.textContent = ""; }, 5000);
    }

    function spinToTarget(targetIdx) {
        if (spinning) return;
        const now = Date.now();
        if (lastSpinTime && (now - lastSpinTime) < SPIN_COOLDOWN) {
            const left = Math.round((SPIN_COOLDOWN - (now - lastSpinTime)) / 60000);
            timerHint.textContent = I18N[currentLang].waitMin(left);
            return;
        }
        spinning = true;
        activeIdx = targetIdx;
        document.getElementById("spinBtn").disabled = true;
        document.getElementById("randomBtn").disabled = true;
        highlightCard(targetIdx);

        const step = (Math.PI * 2) / 12;
        const targetAngle = -Math.PI / 2 - targetIdx * step - step / 2;

        let cur = angleOffset % (Math.PI * 2);
        let tgt = targetAngle % (Math.PI * 2);
        let delta = tgt - cur;
        if (delta < 0) delta += Math.PI * 2;
        delta += (6 + Math.floor(Math.random() * 5)) * Math.PI * 2;

        spinAnim = {
            from: angleOffset,
            to: angleOffset + delta,
            delta: delta,
            start: performance.now(),
            duration: 2500 + Math.random() * 500,
            target: targetIdx
        };
    }

    async function generateQuestions(sphereShort, sphereFull) {
        const cache = await loadQuestions();
        if (cache && cache[currentLang] && cache[currentLang][sphereFull]) {
            const entry = cache[currentLang][sphereFull];
            if (Array.isArray(entry) && entry.length >= 1) {
                const first = entry[0];
                if (typeof first === "object" && first.q && Array.isArray(first.a)) {
                    const shuffled = [...entry].sort(() => Math.random() - 0.5);
                    return shuffled.slice(0, 3);
                }
                return [{ q: entry[0], a: ["—", "—", "—"] }];
            }
        }
        const fb = FALLBACK_QUESTIONS[currentLang];
        const q = fb[Math.floor(Math.random() * fb.length)];
        const fallbackAnswers = currentLang === "ua"
            ? ["Відчути", "Проаналізувати", "Відпустити"]
            : ["Feel it", "Analyze it", "Let it go"];
        return [{ q, a: fallbackAnswers }];
    }

    let cachedQuestions = null;
    async function loadQuestions() {
        if (cachedQuestions) return cachedQuestions;
        try {
            const r = await fetch("questions.json?t=" + Date.now());
            cachedQuestions = await r.json();
            return cachedQuestions;
        } catch { return null; }
    }

    canvas.addEventListener("mousemove", (e) => {
        if (spinAnim) return;
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        const mx = (e.clientX - rect.left) * scale;
        const my = (e.clientY - rect.top) * scale;
        hoverIdx = getIdxAt(mx, my);
        canvas.style.cursor = hoverIdx !== -1 ? "pointer" : "default";
    });
    canvas.addEventListener("mouseleave", () => { hoverIdx = -1; });
    canvas.addEventListener("click", (e) => {
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        const mx = (e.clientX - rect.left) * scale;
        const my = (e.clientY - rect.top) * scale;
        const idx = getIdxAt(mx, my);
        if (idx !== -1) spinToTarget(idx);
    });

    function buildCards() {
        const grid = document.getElementById("cardsGrid");
        grid.innerHTML = "";
        SPHERES[currentLang].forEach((s, i) => {
            const card = document.createElement("div");
            card.className = "sphere-card";
            const color = COLORS[i];
            card.style.setProperty("--sphere-color", color);
            card.innerHTML = `<span class="card-emoji">${s.emoji}</span><span class="card-name">${s.short}</span>`;
            grid.appendChild(card);
        });
    }

    function formatCooldown(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return I18N[currentLang].formatHms(h, m, s);
    }

    function updateTimer() {
        if (!lastSpinTime) return;
        const left = SPIN_COOLDOWN - (Date.now() - lastSpinTime);
        if (left > 0) {
            timerHint.textContent = `${I18N[currentLang].cooldownPrefix} ${formatCooldown(left)}`;
        } else {
            timerHint.textContent = "";
        }
    }
    setInterval(updateTimer, 1000);

    document.getElementById("randomBtn").onclick = () => {
        spinToTarget(Math.floor(Math.random() * 12));
    };
    document.getElementById("spinBtn").onclick = () => {
        spinToTarget(Math.floor(Math.random() * 12));
    };
    document.getElementById("moodBtn").onclick = () => {
        currentTheme = (currentTheme + 1) % THEMES.length;
        const m = THEMES[currentTheme].name[currentLang];
        document.getElementById("resultMsg").textContent = `${I18N[currentLang].moodPrefix} ${m}`;
        setTimeout(() => document.getElementById("resultMsg").textContent = I18N[currentLang].resultPlaceholder, 1500);
    };

    document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.onclick = () => {
            currentLang = btn.dataset.lang;
            document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === currentLang));
            buildCards();
            applyI18n();
            if (!lastSpinTime) {
                document.getElementById("resultMsg").textContent = I18N[currentLang].resultPlaceholder;
            }
        };
    });

    document.getElementById("modalCloseBtn").onclick = () => {
        if (currentItem && lastSphereIdx !== -1) {
            const s = SPHERES[currentLang][lastSphereIdx];
            const summary = `${s.emoji} ${s.short} · ${currentItem.q.substring(0, 35)}... → ${lastAnswer.substring(0, 20)}`;
            historyList.unshift(summary);
            if (historyList.length > 6) historyList.pop();
            document.getElementById("historyLog").innerHTML = historyList.map(h => `<div class="history-item">📜 ${h}</div>`).join("");
        }
        modal.classList.remove("active");
    };
    document.getElementById("modalCopyBtn").onclick = () => {
        if (currentItem && lastSphereIdx !== -1) {
            const s = SPHERES[currentLang][lastSphereIdx];
            const text = `${s.emoji} ${s.name}\n\n💭 ${currentItem.q}\n\n→ ${lastAnswer}`;
            navigator.clipboard.writeText(text);
            document.getElementById("modalCopyBtn").textContent = I18N[currentLang].copied;
            setTimeout(() => { document.getElementById("modalCopyBtn").textContent = I18N[currentLang].copy; }, 1500);
        }
    };
    document.getElementById("modalCopyBtn").onclick = () => {
        if (lastQuestion && lastSphereIdx !== -1) {
            const s = SPHERES[currentLang][lastSphereIdx];
            navigator.clipboard.writeText(`${s.emoji} ${s.name}\n💭 ${lastQuestion}`);
            document.getElementById("modalCopyBtn").textContent = I18N[currentLang].copied;
            setTimeout(() => { document.getElementById("modalCopyBtn").textContent = I18N[currentLang].copy; }, 1500);
        }
    };
    document.getElementById("modalRerollBtn").onclick = () => {
        if (lastSphereIdx === -1 || currentItemPool.length === 0) return;
        let next;
        if (currentItemPool.length > 1) {
            const others = currentItemPool.filter(it => it !== currentItem);
            next = others[Math.floor(Math.random() * others.length)];
        } else {
            const s = SPHERES[currentLang][lastSphereIdx];
            currentQuestion.innerHTML = `<div class="questions-loading"><span class="spinner"></span>${I18N[currentLang].pickingOther}</div>`;
            answersList.innerHTML = "";
            generateQuestions(s.short, s.name).then(pool => {
                currentItemPool = pool;
                renderCurrentItem(pool[0]);
            });
            return;
        }
        renderCurrentItem(next);
    };
    window.onclick = (e) => { if (e.target === modal) modal.classList.remove("active"); };

    window.addEventListener("resize", resize);
    resize();
    animate();
    applyI18n();
    buildCards();
})();
</script>
</body>
</html>
