<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌀 Калейдоскоп Сфер · 12 вібрацій натхнення</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
        }
        .info-panel {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        .message {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            padding: 0.7rem 1.8rem;
            display: inline-block;
            max-width: 85vw;
            font-size: 1rem;
            font-weight: 400;
            color: #f5eac1;
            border: 1px solid rgba(255, 100, 200, 0.5);
            box-shadow: 0 0 20px rgba(255, 100, 200, 0.2);
            letter-spacing: 0.3px;
            transition: opacity 0.2s;
            font-family: monospace;
        }
        .controls {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 20;
            display: flex;
            gap: 0.6rem;
            background: rgba(10, 15, 35, 0.7);
            backdrop-filter: blur(12px);
            padding: 0.4rem 1rem;
            border-radius: 3rem;
            border: 1px solid rgba(255, 100, 200, 0.4);
            pointer-events: auto;
        }
        button {
            background: rgba(30, 40, 80, 0.9);
            border: none;
            color: #f0e6d0;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
        }
        button:hover {
            background: #ff66cc;
            color: #010312;
            box-shadow: 0 0 12px #ff66cc;
            transform: scale(1.02);
        }
        @media (max-width: 700px) {
            .controls { top: 1rem; right: 1rem; }
            .message { font-size: 0.75rem; padding: 0.4rem 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="kaleidoscopeCanvas"></canvas>
    <div class="info-panel">
        <div class="message" id="msg">🌀 оберіть будь-яку пелюстку</div>
    </div>
    <div class="controls">
        <button id="randomBtn">✨ випадкова сфера</button>
        <button id="copyBtn">📋 скопіювати</button>
        <button id="pauseBtn">⏸️ пауза</button>
    </div>
</div>

<script>
    (function() {
        // ---------- 12 СФЕР ЖИТТЯ ----------
        const SPHERES = [
            "Творчість", "Саморозвиток", "Дім", "Фінанси",
            "Сім'я", "Хобі", "Спільнота", "Здоров'я",
            "Кар'єра", "Екологія", "Стосунки", "Духовність"
        ];

        // Багата база афірмацій/натхненних фраз (без генерації)
        const AFFIRMATIONS = [
            "Творчість — це подих душі", "Рости — це природно", "Дім починається з усмішки",
            "Гроші люблять порядок", "Сім'я — це якір любові", "Хобі живить зсередини",
            "Разом ми сильніші", "Здоров'я — це багатство", "Кар'єра — це гра, а не війна",
            "Планета чекає на турботу", "Справжні стосунки — це безпека", "Тиша відкриває глибину",
            "Дозволь собі бути незавершеною", "Кожен крок має значення", "Магія в дрібницях",
            "Твій внутрішній оракул завжди поруч", "Сьогодні — день натхнення", "Відпочинок — це ресурс",
            "Ти можеш все, але не одразу", "Світло всередині тебе не згасає", "Будь ніжною до себе",
            "Зірки народжуються в темряві", "Довіряй своєму ритму", "Крила виростають у польоті"
        ];

        // ---------- НАЛАШТУВАННЯ КАНВАСУ ----------
        const canvas = document.getElementById("kaleidoscopeCanvas");
        const ctx = canvas.getContext("2d");
        let width, height, centerX, centerY;
        let radius = 220;     // радіус калейдоскопа
        let angleOffset = 0;
        let rotationSpeed = 0.004;
        let animateId = null;
        let isPaused = false;

        let hoverIndex = -1;
        let activeIndex = -1;   // для підсвітки при кліку
        let currentMessage = "";

        // UI елементи
        const msgDiv = document.getElementById("msg");
        const randomBtn = document.getElementById("randomBtn");
        const copyBtn = document.getElementById("copyBtn");
        const pauseBtn = document.getElementById("pauseBtn");

        // ---------- ФУНКЦІЇ РОЗМІРІВ ----------
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2;
            centerY = height / 2;
            radius = Math.min(width, height) * 0.28;
        }

        // ---------- ВИЗНАЧЕННЯ СЕГМЕНТА ПІД КУРСОРОМ ----------
        function getSegmentIndex(mx, my) {
            const dx = mx - centerX;
            const dy = my - centerY;
            const dist = Math.hypot(dx, dy);
            if (dist > radius + 15 || dist < radius * 0.45) return -1;
            let angle = Math.atan2(dy, dx) - angleOffset;
            angle = (angle + Math.PI * 2) % (Math.PI * 2);
            const step = (Math.PI * 2) / 12;
            return Math.floor(angle / step);
        }

        // ---------- МАЛЮВАННЯ КАЛЕЙДОСКОПА ----------
        function drawSegment(idx, startAng, endAng, isHover, isActive) {
            // яскраві кольори, що змінюються з часом (додає різноманіття)
            const hue = (idx * 30 + Date.now() * 0.5) % 360;
            let color;
            if (isActive) color = `hsl(45, 100%, 65%)`;
            else if (isHover) color = `hsl(${hue}, 85%, 70%)`;
            else color = `hsl(${hue}, 75%, 55%)`;

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, startAng, endAng);
            ctx.arc(centerX, centerY, radius * 0.45, endAng, startAng, true);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = "rgba(255, 200, 100, 0.7)";
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // візерунок всередині (крапки/лінії)
            const midAng = startAng + (endAng - startAng)/2;
            const rText = radius * 0.75;
            const tx = centerX + Math.cos(midAng) * rText;
            const ty = centerY + Math.sin(midAng) * rText;
            ctx.font = `bold ${Math.max(18, radius * 0.11)}px "Segoe UI"`;
            ctx.fillStyle = isActive ? "#2a1a0a" : "#fff8e7";
            ctx.shadowBlur = 5;
            ctx.shadowColor = "#ffaa66";
            ctx.fillText(idx+1, tx-12, ty+8);
            ctx.shadowBlur = 0;

            // додаткові декоративні лінії
            ctx.beginPath();
            ctx.moveTo(centerX + Math.cos(startAng) * (radius-8), centerY + Math.sin(startAng) * (radius-8));
            ctx.lineTo(centerX + Math.cos(startAng) * (radius*0.5+8), centerY + Math.sin(startAng) * (radius*0.5+8));
            ctx.strokeStyle = "rgba(255, 200, 100, 0.5)";
            ctx.stroke();
        }

        function drawKaleidoscope() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            // фон – глибокий космос із зірками, що переливаються
            const grad = ctx.createLinearGradient(0, 0, width, height);
            grad.addColorStop(0, "#0a0a1a");
            grad.addColorStop(1, "#02020c");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            // зірки
            ctx.fillStyle = "rgba(255,240,200,0.7)";
            for (let i = 0; i < 180; i++) {
                if (i%2 === 0) continue;
                ctx.beginPath();
                ctx.arc((i*131)%width, (i*253)%height, 1.2, 0, Math.PI*2);
                ctx.fill();
            }
            // калейдоскоп
            const step = (Math.PI * 2) / 12;
            for (let i = 0; i < 12; i++) {
                const start = i * step + angleOffset;
                const end = (i+1) * step + angleOffset;
                const isHover = (hoverIndex === i);
                const isActive = (activeIndex === i);
                drawSegment(i, start, end, isHover, isActive);
            }
            // центральне коло
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.32, 0, Math.PI*2);
            ctx.fillStyle = "#1e1e3acc";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.18, 0, Math.PI*2);
            ctx.fillStyle = "#ffcc88";
            ctx.fill();
            ctx.font = `28px "Segoe UI Symbol"`;
            ctx.fillStyle = "#1a102a";
            ctx.fillText("🌀", centerX-16, centerY+12);
        }

        // ---------- АНІМАЦІЯ ----------
        function animate() {
            if (!isPaused) {
                angleOffset += rotationSpeed;
            }
            drawKaleidoscope();
            requestAnimationFrame(animate);
        }

        // ---------- ВЗАЄМОДІЯ ----------
        function onMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mx, my;
            if (e.touches) {
                mx = (e.touches[0].clientX - rect.left) * scaleX;
                my = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                mx = (e.clientX - rect.left) * scaleX;
                my = (e.clientY - rect.top) * scaleY;
            }
            const idx = getSegmentIndex(mx, my);
            if (idx !== hoverIndex) {
                hoverIndex = idx;
                canvas.style.cursor = (hoverIndex !== -1) ? "pointer" : "default";
            }
        }

        function onMouseLeave() {
            hoverIndex = -1;
            canvas.style.cursor = "default";
        }

        function onSphereClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mx, my;
            if (e.touches) {
                mx = (e.touches[0].clientX - rect.left) * scaleX;
                my = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                mx = (e.clientX - rect.left) * scaleX;
                my = (e.clientY - rect.top) * scaleY;
            }
            const idx = getSegmentIndex(mx, my);
            if (idx === -1) return;

            activeIndex = idx;
            const sphereName = SPHERES[idx];
            const randomAff = AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)];
            currentMessage = `${sphereName} · ${randomAff}`;
            msgDiv.style.opacity = "0";
            setTimeout(() => {
                msgDiv.innerHTML = `🌀 ${currentMessage}`;
                msgDiv.style.opacity = "1";
            }, 60);

            // ефект пульсації (тимчасове збільшення швидкості обертання)
            const originalSpeed = rotationSpeed;
            rotationSpeed = 0.02;
            setTimeout(() => { rotationSpeed = originalSpeed; }, 200);

            setTimeout(() => {
                if (activeIndex === idx) activeIndex = -1;
            }, 1000);
        }

        function randomSphere() {
            const rand = Math.floor(Math.random() * 12);
            activeIndex = rand;
            const sphereName = SPHERES[rand];
            const aff = AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)];
            currentMessage = `${sphereName} · ${aff}`;
            msgDiv.style.opacity = "0";
            setTimeout(() => {
                msgDiv.innerHTML = `🌀 ${currentMessage}`;
                msgDiv.style.opacity = "1";
            }, 60);
            setTimeout(() => {
                if (activeIndex === rand) activeIndex = -1;
            }, 1000);
            // додатковий візуальний спалах (прискорення обертання)
            const originalSpeed = rotationSpeed;
            rotationSpeed = 0.025;
            setTimeout(() => { rotationSpeed = originalSpeed; }, 250);
        }

        function copyToClipboard() {
            if (currentMessage) {
                navigator.clipboard.writeText(currentMessage);
                const originalText = msgDiv.innerText;
                msgDiv.innerHTML = "✅ скопійовано!";
                setTimeout(() => { msgDiv.innerHTML = originalText; }, 1200);
            } else {
                msgDiv.innerHTML = "🌀 спочатку оберіть сферу";
                setTimeout(() => {
                    msgDiv.innerHTML = currentMessage || "🌀 оберіть будь-яку пелюстку";
                }, 1500);
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? "▶️ пуск" : "⏸️ пауза";
        }

        // ---------- ПОДІЇ ----------
        function bindEvents() {
            canvas.addEventListener("mousemove", onMouseMove);
            canvas.addEventListener("mouseleave", onMouseLeave);
            canvas.addEventListener("click", onSphereClick);
            canvas.addEventListener("touchmove", (e) => { e.preventDefault(); onMouseMove(e); });
            canvas.addEventListener("touchend", onMouseLeave);
            canvas.addEventListener("touchstart", (e) => { e.preventDefault(); onSphereClick(e); });
            randomBtn.addEventListener("click", randomSphere);
            copyBtn.addEventListener("click", copyToClipboard);
            pauseBtn.addEventListener("click", togglePause);
        }

        // ---------- ІНІЦІАЛІЗАЦІЯ ----------
        function init() {
            resizeCanvas();
            bindEvents();
            animate();
            window.addEventListener("resize", () => {
                resizeCanvas();
            });
            // стартова випадкова фраза для настрою
            setTimeout(() => {
                randomSphere();
            }, 300);
        }

        init();
    })();
</script>
</body>
</html>
