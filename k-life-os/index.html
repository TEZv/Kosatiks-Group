<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌀 Мінливий оракул · Кільце Сфер із Groq AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0f1c, #010308);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            transition: background 0.8s ease;
            overflow-x: hidden;
        }

        .main-layout {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            padding: 1rem;
            gap: 1.5rem;
        }

        /* Ліва частина: кільце */
        .ring-container {
            flex: 2;
            min-width: 320px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            max-width: 600px;
            height: auto;
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            cursor: pointer;
        }

        /* Права панель: картки, налаштування, історія */
        .sidebar {
            flex: 1.2;
            min-width: 280px;
            background: rgba(10, 15, 35, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1rem;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 95vh;
            overflow-y: auto;
        }

        /* кнопки керування (дублюються зверху, але залишимо оригінальні на canvas, додамо ще SPIN в панель) */
        .controls {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: rgba(30, 40, 80, 0.9);
            border: none;
            color: #ccf;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: #0ff;
            color: #010312;
            box-shadow: 0 0 12px cyan;
            transform: scale(1.02);
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .lang-switch {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 0.5rem;
        }
        .lang-btn {
            background: #2a4a3a;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
        }
        .lang-btn.active {
            background: #0ff;
            color: #0a1a12;
            box-shadow: 0 0 8px cyan;
        }

        .api-settings {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            background: #0a1f18;
            padding: 0.4rem;
            border-radius: 2rem;
            align-items: center;
            border: 1px solid #0ff;
        }
        .api-settings input {
            background: #1a3a2a;
            border: 1px solid cyan;
            color: #f9e2a1;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            width: 130px;
        }
        .api-settings button {
            background: #0ff;
            color: #0a1f18;
            padding: 0.1rem 0.5rem;
            font-size: 0.6rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            max-height: 40vh;
            overflow-y: auto;
            padding-right: 0.2rem;
        }
        .sphere-card {
            background: rgba(30, 50, 70, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 0.4rem 0.2rem;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(0, 255, 255, 0.4);
            color: #e9d6a3;
            font-size: 0.65rem;
            font-weight: bold;
            word-break: break-word;
            cursor: pointer;
        }
        .sphere-card:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: scale(1.01);
        }
        .sphere-card.selected {
            background: radial-gradient(circle, #f5b042, #b45f1b);
            color: #0f1a0e;
            border-color: #ffff80;
            box-shadow: 0 0 12px #ffaa33;
        }
        .card-emoji { font-size: 1.2rem; display: block; }

        .result-area {
            background: #0a1f18;
            border-radius: 1rem;
            padding: 0.5rem;
            border: 1px solid cyan;
            text-align: center;
        }
        .history {
            margin-top: 0.4rem;
            font-size: 0.65rem;
            color: #c9b27c;
            max-height: 100px;
            overflow-y: auto;
        }
        .timer-hint {
            font-size: 0.7rem;
            font-weight: bold;
            color: #0ff;
            text-align: center;
            background: #0a1f18;
            padding: 0.2rem;
            border-radius: 2rem;
        }

        /* Модальне вікно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-card {
            background: #0f281f;
            border-radius: 2rem;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
            border: 2px solid #0ff;
            box-shadow: 0 0 40px cyan;
            text-align: center;
        }
        .modal-card h3 { color: #0ff; margin-bottom: 1rem; }
        .modal-question { font-size: 1.1rem; color: #ffefcf; margin: 1rem 0; line-height: 1.4; }
        .modal-actions { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .sidebar { max-height: none; }
        }
    </style>
</head>
<body>
<div class="main-layout">
    <div class="ring-container">
        <canvas id="ringCanvas" width="600" height="600"></canvas>
        <div class="controls" style="margin-top: 1rem;">
            <button id="randomBtn">✨ випадкова сфера</button>
            <button id="moodBtn">🎨 новий настрій</button>
        </div>
    </div>
    <div class="sidebar">
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="ua">🇺🇦 UA</button>
            <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
        </div>
        <div class="api-settings">
            <input type="text" id="groqKeyInput" placeholder="Groq API key (gsk_...)" autocomplete="off">
            <input type="text" id="proxyUrlInput" placeholder="https://your-proxy.vercel.app/api/groq">
            <button id="saveKeyBtn">💾</button>
        </div>
        <button id="spinBtn" style="background:#0ff; color:#0a1f18; font-weight:bold;">🎲 SPIN (AI питання)</button>
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="result-area">
            <div id="resultMsg" style="font-size:0.8rem;">🌀 оберіть сферу або натисніть SPIN</div>
            <div class="history" id="historyLog"></div>
        </div>
        <div class="timer-hint" id="timerHint"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-card">
        <h3>🌀 Оракул сфери</h3>
        <div id="modalSphere" style="font-weight:bold; color:#ffaa33;"></div>
        <div class="modal-question" id="modalQuestion"></div>
        <div class="modal-actions">
            <button id="modalCloseBtn">Закрити</button>
            <button id="modalSaveBtn">💾 Зберегти в історію</button>
            <button id="modalCopyBtn">📋 Копіювати</button>
        </div>
    </div>
</div>

<script>
    // ========== ОРИГІНАЛЬНІ ДАНІ КІЛЬЦЯ ТА ФРАЗ ==========
    const SPHERES_NAMES = {
        ua: ["Творчість", "Саморозвиток", "Дім", "Фінанси", "Сім'я", "Хобі", "Спільнота", "Здоров'я", "Кар'єра", "Екологія", "Стосунки", "Духовність"],
        en: ["Creativity", "Self-Development", "Home", "Finance", "Family", "Hobbies", "Community", "Health", "Career", "Ecology", "Relationships", "Spirituality"]
    };
    // Повні назви для карток
    const FULL_NAMES = {
        ua: [
            "🚀 Творчість або Самовираження",
            "🧑‍🔬 Особистий розвиток або Турбота про себе",
            "🏘 Домашнє життя або Ведення господарства",
            "💴 Фінанси",
            "🤝 Батьківство або Сім'я",
            "📚 Відпочинок і Хобі",
            "🗣️ Спільнота або Соціальні зв'язки",
            "🌳 Фізичне здоров'я",
            "🔎 Кар'єра або Освіта",
            "🌿 Екологія або Благодійність",
            "👥 Особисті стосунки",
            "🧘 Духовність"
        ],
        en: [
            "🚀 Creativity or Self-Expression",
            "🧑‍🔬 Personal Development or Self-Care",
            "🏘 Domestic Life or Household Management",
            "💴 Finance",
            "🤝 Parenting or Family",
            "📚 Recreation and Hobbies",
            "🗣️ Community Involvement or Social Connection",
            "🌳 Physical Health",
            "🔎 Career or Education",
            "🌿 Environmental or Charitable Causes",
            "👥 Personal Relationship",
            "🧘 Spirituality"
        ]
    };
    // Кольори секторів (як в оригіналі)
    const COLORS = ["#ff6ec7", "#7a6eff", "#4affb5", "#ffb347", "#ff6b6b", "#c084fc", "#60a5fa", "#f97316", "#10b981", "#14b8a6", "#f43f5e", "#a855f7"];
    // Фрази для fallback (локальна база)
    const FALLBACK_QUESTIONS = {
        ua: [
            "Якби страх зник, що б ти створила?",
            "Яка звичка виснажує тебе, але ти її тримаєшся?",
            "Який емоційний слід залишив твій дім у твоїй душі?",
            "Якби гроші не мали значення, чим би ти займалась?",
            "Яку роль ти граєш у сім'ї, і чи хочеш її змінити?",
            "Чому ти не дозволяєш собі відпочивати без провини?",
            "Де ти шукаєш прийняття, але не знаходиш?",
            "Як твоє тіло намагається з тобою говорити?",
            "Що ти робиш не через покликання, а через страх?",
            "Як твоя повсякденність впливає на планету?",
            "Які стосунки ти терпиш, хоча вони тебе руйнують?",
            "Де ти втрачаєш себе, намагаючись догодити іншим?"
        ],
        en: [
            "If fear disappeared, what would you create?",
            "Which habit drains you but you keep it?",
            "What emotional trace did your home leave in your soul?",
            "If money didn't matter, what would you do?",
            "What role do you play in your family – do you want to change it?",
            "Why don't you allow yourself to rest without guilt?",
            "Where do you seek acceptance but don't find it?",
            "How is your body trying to speak to you?",
            "What do you do not out of calling but out of fear?",
            "How does your daily life affect the planet?",
            "Which relationships do you tolerate though they harm you?",
            "Where do you lose yourself trying to please others?"
        ]
    };

    // ========== СТАН ==========
    let currentLang = "ua";
    let groqApiKey = localStorage.getItem("groq_api_key") || "";
    let proxyUrl = localStorage.getItem("groq_proxy_url") || "";
    let lastQuestion = "";
    let lastSphereIdx = -1;
    let historyList = [];
    let spinning = false;
    let lastSpinTime = 0;
    const SPIN_COOLDOWN = 3600000; // 1 година

    // Canvas кільця
    const canvas = document.getElementById("ringCanvas");
    const ctx = canvas.getContext("2d");
    let width, height, centerX, centerY;
    let ringRadius = 180, ringWidth = 48;
    let angleOffset = 0;
    let hoverIndex = -1;
    let activeIndex = -1;
    let autoRotate = true;
    let rotSpeed = 0.002;
    let animationId = null;
    // Теми для фону
    const THEMES = [
        { name: "космічна туманність", grad1: "#0a0f2a", grad2: "#010308" },
        { name: "неонова сітка", isNeonGrid: true },
        { name: "місячне сяйво", grad1: "#1a2a3a", grad2: "#02040c" },
        { name: "вогняні хвилі", grad1: "#2a1a0a", grad2: "#010008" },
        { name: "кришталева печера", grad1: "#203040", grad2: "#020b1a" },
        { name: "магічне коло", grad1: "#1e1a3a", grad2: "#030108" }
    ];
    let currentTheme = 0;

    // DOM елементи
    const randomBtn = document.getElementById("randomBtn");
    const moodBtn = document.getElementById("moodBtn");
    const spinBtn = document.getElementById("spinBtn");
    const cardsGrid = document.getElementById("cardsGrid");
    const resultMsgDiv = document.getElementById("resultMsg");
    const historyDiv = document.getElementById("historyLog");
    const timerHint = document.getElementById("timerHint");
    const groqKeyInput = document.getElementById("groqKeyInput");
    const proxyUrlInput = document.getElementById("proxyUrlInput");
    const saveKeyBtn = document.getElementById("saveKeyBtn");
    const modal = document.getElementById("modal");
    const modalSphere = document.getElementById("modalSphere");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const modalSaveBtn = document.getElementById("modalSaveBtn");
    const modalCopyBtn = document.getElementById("modalCopyBtn");

    if (groqApiKey) groqKeyInput.value = groqApiKey;
    if (proxyUrl) proxyUrlInput.value = proxyUrl;

    // ========== ФУНКЦІЇ КІЛЬЦЯ ==========
    function resizeCanvas() {
        const container = canvas.parentElement;
        const maxSize = Math.min(container.clientWidth, 600);
        canvas.width = maxSize;
        canvas.height = maxSize;
        width = maxSize;
        height = maxSize;
        centerX = width/2;
        centerY = height/2;
        ringRadius = width * 0.23;
        ringWidth = ringRadius * 0.28;
        drawWheel();
    }

    function drawSegment(idx, startAng, endAng, isHover, isActive) {
        const color = COLORS[idx % COLORS.length];
        let fillColor;
        if (isActive) fillColor = "#ffdd88";
        else if (isHover) fillColor = "#ffffff";
        else fillColor = color;
        const grad = ctx.createLinearGradient(centerX - ringRadius, centerY - ringRadius, centerX + ringRadius, centerY + ringRadius);
        if (isActive) grad.addColorStop(0, "#ffdd88"), grad.addColorStop(1, "#ffaa33");
        else if (isHover) grad.addColorStop(0, "#ffffff"), grad.addColorStop(1, color);
        else grad.addColorStop(0, color+"dd"), grad.addColorStop(1, color+"88");
        ctx.beginPath();
        ctx.arc(centerX, centerY, ringRadius + ringWidth/2, startAng, endAng);
        ctx.arc(centerX, centerY, ringRadius - ringWidth/2, endAng, startAng, true);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = "rgba(0, 255, 255, 0.7)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        const midAng = startAng + (endAng - startAng)/2;
        const tx = centerX + Math.cos(midAng) * ringRadius;
        const ty = centerY + Math.sin(midAng) * ringRadius;
        ctx.font = `bold ${Math.max(16, ringRadius*0.12)}px "Segoe UI"`;
        ctx.fillStyle = isActive ? "#1a102a" : "#fffef0";
        ctx.shadowBlur = 4;
        ctx.fillText(idx+1, tx-10, ty+8);
        ctx.shadowBlur = 0;
    }

    function drawBackground() {
        const theme = THEMES[currentTheme];
        if (theme.isNeonGrid) {
            ctx.fillStyle = "#02050c";
            ctx.fillRect(0, 0, width, height);
            ctx.beginPath();
            ctx.strokeStyle = "rgba(0, 255, 255, 0.15)";
            ctx.lineWidth = 1;
            for (let i = 0; i < width; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke();
            }
        } else {
            const grad = ctx.createLinearGradient(0, 0, width, height);
            grad.addColorStop(0, theme.grad1);
            grad.addColorStop(1, theme.grad2);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
        }
        // зірки
        ctx.fillStyle = "rgba(255,240,200,0.7)";
        for (let i = 0; i < 150; i++) {
            ctx.beginPath();
            ctx.arc((i*131)%width, (i*257)%height, 1.2, 0, Math.PI*2);
            ctx.fill();
        }
    }

    function drawRing() {
        const step = (Math.PI * 2) / 12;
        for (let i = 0; i < 12; i++) {
            const start = i * step + angleOffset;
            const end = (i+1) * step + angleOffset;
            drawSegment(i, start, end, (hoverIndex === i), (activeIndex === i));
        }
    }

    function drawCenter() {
        ctx.beginPath();
        ctx.arc(centerX, centerY, ringRadius * 0.38, 0, Math.PI*2);
        ctx.fillStyle = "#1f2a44cc";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX, centerY, ringRadius * 0.2, 0, Math.PI*2);
        ctx.fillStyle = "#ffdd88";
        ctx.fill();
        ctx.font = `32px "Segoe UI Symbol"`;
        ctx.fillStyle = "#0a0f1c";
        ctx.fillText("🌀", centerX-18, centerY+12);
    }

    function drawWheel() {
        drawBackground();
        drawRing();
        drawCenter();
    }

    function animate() {
        if (autoRotate && hoverIndex === -1 && activeIndex === -1) {
            angleOffset += rotSpeed;
        }
        drawWheel();
        animationId = requestAnimationFrame(animate);
    }

    function getHoverIndex(mx, my) {
        const dx = mx - centerX;
        const dy = my - centerY;
        const dist = Math.hypot(dx, dy);
        if (dist < ringRadius - ringWidth/1.5 || dist > ringRadius + ringWidth/1.5) return -1;
        let angle = Math.atan2(dy, dx) - angleOffset;
        angle = (angle + 2*Math.PI) % (2*Math.PI);
        return Math.floor(angle / ((2*Math.PI)/12));
    }

    // ========== ВЗАЄМОДІЯ З КІЛЬЦЕМ ==========
    canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        const mx = (e.clientX - rect.left) * scale;
        const my = (e.clientY - rect.top) * scale;
        const idx = getHoverIndex(mx, my);
        if (idx !== hoverIndex) {
            hoverIndex = idx;
            canvas.style.cursor = (hoverIndex !== -1) ? "pointer" : "default";
        }
    });
    canvas.addEventListener("mouseleave", () => { hoverIndex = -1; });
    canvas.addEventListener("click", async (e) => {
        const rect = canvas.getBoundingClientRect();
        const scale = canvas.width / rect.width;
        const mx = (e.clientX - rect.left) * scale;
        const my = (e.clientY - rect.top) * scale;
        const idx = getHoverIndex(mx, my);
        if (idx !== -1 && !spinning && (Date.now() - lastSpinTime >= SPIN_COOLDOWN)) {
            await selectSphereAndGenerate(idx);
        } else if (Date.now() - lastSpinTime < SPIN_COOLDOWN) {
            const left = SPIN_COOLDOWN - (Date.now() - lastSpinTime);
            timerHint.innerText = currentLang === "ua" ? `⏳ зачекайте ${Math.round(left/60000)} хв` : `⏳ wait ${Math.round(left/60000)} min`;
        }
    });

    // ========== AI ГЕНЕРАЦІЯ ==========
    async function generateQuestion(sphereName) {
        const prompt = currentLang === "ua"
            ? `Ти — мудрий оракул. Напиши одне глибоке, провокаційне, ситуативне питання для роздумів (максимум 20 слів) для сфери життя "${sphereName}". Питання має спонукати до саморефлексії. Не використовуй лапки, тільки текст питання.`
            : `You are a wise oracle. Write one deep, provocative, situational question for reflection (max 20 words) for the life sphere "${sphereName}". Encourage self-reflection. No quotes.`;
        if (!groqApiKey) return FALLBACK_QUESTIONS[currentLang][Math.floor(Math.random()*FALLBACK_QUESTIONS[currentLang].length)];
        try {
            let url = "https://api.groq.com/openai/v1/chat/completions";
            let headers = { "Authorization": `Bearer ${groqApiKey}`, "Content-Type": "application/json" };
            let body = JSON.stringify({ model: "llama3-70b-8192", messages: [{ role: "user", content: prompt }], temperature: 0.9, max_tokens: 80 });
            if (proxyUrl && proxyUrl.trim() !== "") {
                url = proxyUrl.trim();
                headers = { "Content-Type": "application/json" };
                body = JSON.stringify({ prompt, apiKey: groqApiKey });
            }
            const resp = await fetch(url, { method: "POST", headers, body });
            if (!resp.ok) throw new Error();
            const data = await resp.json();
            let text = data.choices?.[0]?.message?.content?.trim() || "";
            text = text.replace(/^["']|["']$/g, '');
            return text || FALLBACK_QUESTIONS[currentLang][Math.floor(Math.random()*FALLBACK_QUESTIONS[currentLang].length)];
        } catch {
            return FALLBACK_QUESTIONS[currentLang][Math.floor(Math.random()*FALLBACK_QUESTIONS[currentLang].length)];
        }
    }

    async function selectSphereAndGenerate(idx) {
        if (spinning) return;
        const now = Date.now();
        if (lastSpinTime && (now - lastSpinTime) < SPIN_COOLDOWN) {
            const left = SPIN_COOLDOWN - (now - lastSpinTime);
            timerHint.innerText = currentLang === "ua" ? `⏳ наступний спін через ${Math.round(left/60000)} хв` : `⏳ next spin in ${Math.round(left/60000)} min`;
            return;
        }
        spinning = true;
        spinBtn.disabled = true;
        randomBtn.disabled = true;
        activeIndex = idx;
        const sphereShort = SPHERES_NAMES[currentLang][idx];
        const fullName = FULL_NAMES[currentLang][idx];
        const question = await generateQuestion(sphereShort);
        lastSphereIdx = idx;
        lastQuestion = question;
        modalSphere.innerHTML = fullName;
        modalQuestion.innerHTML = question;
        modal.classList.add("active");
        // підсвітка картки
        document.querySelectorAll(".sphere-card").forEach((card, i) => {
            if (i === idx) card.classList.add("selected");
            else card.classList.remove("selected");
        });
        // зміна фону на колір сектора
        const bgColor = COLORS[idx];
        document.body.style.transition = "background 0.8s ease";
        document.body.style.background = `radial-gradient(circle at 30% 20%, ${bgColor}22, #010308)`;
        setTimeout(() => document.body.style.background = "", 1200);
        setTimeout(() => { if (activeIndex === idx) activeIndex = -1; }, 1500);
        spinning = false;
        lastSpinTime = Date.now();
        spinBtn.disabled = false;
        randomBtn.disabled = false;
        timerHint.innerText = currentLang === "ua" ? "✅ спін виконано! наступний через 1 годину" : "✅ spin done! next in 1 hour";
        setTimeout(() => { if (!spinning) timerHint.innerText = ""; }, 5000);
    }

    async function randomSphere() {
        const rand = Math.floor(Math.random() * 12);
        await selectSphereAndGenerate(rand);
    }

    function changeMood() {
        currentTheme = (currentTheme + 1) % THEMES.length;
        const moodName = THEMES[currentTheme].name;
        resultMsgDiv.innerText = `🎨 настрій: ${moodName}`;
        setTimeout(() => {
            resultMsgDiv.innerText = "🌀 оберіть сферу або натисніть SPIN";
        }, 1500);
    }

    // ========== КАРТКИ ТА ІСТОРІЯ ==========
    function buildCards() {
        cardsGrid.innerHTML = "";
        FULL_NAMES[currentLang].forEach((name, idx) => {
            const card = document.createElement("div");
            card.className = "sphere-card";
            card.innerHTML = `<span class="card-emoji">${name.substring(0,2)}</span><div>${name.substring(2)}</div>`;
            card.onclick = async () => {
                if (!spinning && (Date.now() - lastSpinTime) >= SPIN_COOLDOWN) {
                    await selectSphereAndGenerate(idx);
                } else if (Date.now() - lastSpinTime < SPIN_COOLDOWN) {
                    const left = SPIN_COOLDOWN - (Date.now() - lastSpinTime);
                    timerHint.innerText = currentLang === "ua" ? `⏳ зачекайте ${Math.round(left/60000)} хв` : `⏳ wait ${Math.round(left/60000)} min`;
                }
            };
            cardsGrid.appendChild(card);
        });
    }

    function updateHistory() {
        historyDiv.innerHTML = historyList.map(h => `<div>📜 ${h}</div>`).join('');
    }

    function addToHistory(text) {
        historyList.unshift(text);
        if (historyList.length > 6) historyList.pop();
        updateHistory();
    }

    // ========== МОДАЛКА ==========
    function closeModal() { modal.classList.remove("active"); }
    function saveToHistory() {
        if (lastQuestion && lastSphereIdx !== -1) {
            const sphereName = FULL_NAMES[currentLang][lastSphereIdx];
            addToHistory(`${sphereName} · ${lastQuestion.substring(0, 50)}...`);
            closeModal();
        }
    }
    function copyToClipboard() {
        if (lastQuestion && lastSphereIdx !== -1) {
            const text = `${FULL_NAMES[currentLang][lastSphereIdx]}\n💭 ${lastQuestion}`;
            navigator.clipboard.writeText(text);
            modalCopyBtn.innerText = "✅ скопійовано";
            setTimeout(() => modalCopyBtn.innerText = "📋 Копіювати", 1500);
        }
    }
    modalCloseBtn.onclick = closeModal;
    modalSaveBtn.onclick = saveToHistory;
    modalCopyBtn.onclick = copyToClipboard;
    window.onclick = (e) => { if (e.target === modal) closeModal(); };

    // ========== НАЛАШТУВАННЯ API ==========
    function saveApiSettings() {
        const key = groqKeyInput.value.trim();
        const proxy = proxyUrlInput.value.trim();
        if (key) groqApiKey = key;
        if (proxy) proxyUrl = proxy;
        localStorage.setItem("groq_api_key", groqApiKey);
        localStorage.setItem("groq_proxy_url", proxyUrl);
        resultMsgDiv.innerText = "🔑 налаштування збережено";
        setTimeout(() => resultMsgDiv.innerText = "🌀 оберіть сферу або натисніть SPIN", 1500);
    }
    saveKeyBtn.onclick = saveApiSettings;

    // ========== МОВА ==========
    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll(".lang-btn").forEach(btn => {
            if (btn.dataset.lang === lang) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        buildCards();
        resultMsgDiv.innerText = "🌀 оберіть сферу або натисніть SPIN";
    }
    document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.onclick = () => setLanguage(btn.dataset.lang);
    });

    // ========== ІНІЦІАЛІЗАЦІЯ ==========
    window.addEventListener("resize", () => resizeCanvas());
    resizeCanvas();
    animate();
    randomBtn.onclick = randomSphere;
    moodBtn.onclick = changeMood;
    spinBtn.onclick = randomSphere;
    buildCards();
    setLanguage("ua");
</script>
</body>
</html>
