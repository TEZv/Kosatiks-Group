<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎡 Рулетка Сфер · Колесо Долі</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: radial-gradient(ellipse at 30% 40%, #0a0f1a, #010308);
            font-family: 'Segoe UI', 'Inter', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .roulette-layout {
            max-width: 1400px;
            width: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            padding: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), 0 0 40px rgba(0, 255, 200, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.5);
        }
        .wheel-area {
            flex: 1.2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }
        canvas {
            width: 100%;
            max-width: 500px;
            height: auto;
            background: #1a3a2a;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #b8860b, 0 0 0 12px #d4af37, 0 0 30px cyan, 0 15px 35px black;
        }
        .betting-area {
            flex: 0.9;
            min-width: 300px;
            background: rgba(15, 40, 31, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1rem;
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .lang-switch {
            display: flex;
            gap: 0.5rem;
        }
        .lang-btn {
            background: #2a4a3a;
            border: none;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            color: #f5e6b0;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .lang-btn.active {
            background: #0ff;
            color: #0a1a12;
            box-shadow: 0 0 8px cyan;
        }
        .api-settings {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            background: #0a1f18;
            padding: 0.4rem;
            border-radius: 2rem;
            align-items: center;
            border: 1px solid #0ff;
        }
        .api-settings input {
            background: #1a3a2a;
            border: 1px solid cyan;
            color: #f9e2a1;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            width: 140px;
        }
        .api-settings button {
            background: #0ff;
            border: none;
            padding: 0.1rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.6rem;
            cursor: pointer;
            color: #0a1f18;
            font-weight: bold;
        }
        .betting-title {
            text-align: center;
            font-size: 1.3rem;
            color: #0ff;
            letter-spacing: 2px;
            border-bottom: 1px solid cyan;
            padding-bottom: 0.3rem;
            text-shadow: 0 0 5px cyan;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 0.3rem;
        }
        .sphere-card {
            background: rgba(30, 50, 70, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 0.5rem 0.3rem;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #e9d6a3;
            font-size: 0.7rem;
            font-weight: bold;
            word-break: break-word;
        }
        .sphere-card.selected-card {
            background: radial-gradient(circle, #f5b042, #b45f1b);
            color: #0f1a0e;
            border-color: #ffff80;
            box-shadow: 0 0 15px #ffaa33;
        }
        .sphere-emoji { font-size: 1.3rem; display: block; }
        .sphere-name-full { font-size: 0.65rem; font-weight: normal; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 0.5rem 0;
        }
        button {
            background: radial-gradient(circle at 30% 20%, #f5b042, #b45f1b);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 0.85rem;
            color: #0f1a0e;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 3px 0 #5a2e0a, 0 0 8px rgba(255, 100, 0, 0.8);
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #5a2e0a;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result-area {
            background: #0a1f18;
            border-radius: 1.5rem;
            padding: 0.5rem;
            border: 1px solid cyan;
            text-align: center;
        }
        .result-text {
            color: #f9e2a1;
            font-size: 0.85rem;
        }
        .history {
            margin-top: 0.4rem;
            font-size: 0.65rem;
            color: #c9b27c;
            overflow-x: auto;
            white-space: nowrap;
        }
        .timer-hint {
            font-size: 0.7rem;
            font-weight: bold;
            color: #0ff;
            text-align: center;
            background: #0a1f18;
            padding: 0.2rem;
            border-radius: 2rem;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-card {
            background: #0f281f;
            border-radius: 2rem;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
            border: 2px solid #0ff;
            box-shadow: 0 0 40px cyan;
            text-align: center;
        }
        .modal-card h3 { color: #0ff; margin-bottom: 1rem; }
        .modal-question { font-size: 1.1rem; color: #ffefcf; margin: 1rem 0; line-height: 1.4; }
        .modal-actions { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; }
        .modal-actions button { background: #0ff; color: #0a1f18; box-shadow: none; }
        @media (max-width: 900px) {
            .roulette-layout { flex-direction: column; align-items: center; }
            .betting-area { width: 100%; }
            .cards-grid { max-height: 40vh; }
        }
    </style>
</head>
<body>
<div class="roulette-layout">
    <div class="wheel-area">
        <canvas id="rouletteCanvas" width="600" height="600"></canvas>
        <div class="top-bar" style="width:100%; justify-content:center;">
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="ua">🇺🇦 UA</button>
                <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
            </div>
        </div>
    </div>
    <div class="betting-area">
        <div class="betting-title" id="titleField">✨ поле сфер ✨</div>
        <div class="cards-grid" id="cardsGrid"></div>
        <div class="controls">
            <button id="spinBtn">🎲 SPIN THE BALL</button>
            <button id="copyBtn">📋 COPY</button>
        </div>
        <div class="result-area">
            <div class="result-text" id="resultMessage">🌀 натисніть SPIN</div>
            <div class="history" id="historyLog"></div>
        </div>
        <div class="timer-hint" id="timerHint"></div>
        <div class="api-settings">
            <input type="text" id="groqKeyInput" placeholder="Groq API key (gsk_...)" autocomplete="off">
            <input type="text" id="proxyUrlInput" placeholder="https://your-proxy.vercel.app/api/groq">
            <button id="saveKeyBtn">💾</button>
        </div>
    </div>
</div>
<div id="modal" class="modal">
    <div class="modal-card">
        <h3>🌀 Оракул сфери</h3>
        <div id="modalSphere" style="font-weight:bold; color:#ffaa33;"></div>
        <div class="modal-question" id="modalQuestion"></div>
        <div class="modal-actions">
            <button id="modalCloseBtn">Закрити</button>
            <button id="modalSaveBtn">💾 Зберегти в історію</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const SPHERES = {
            ua: [
                { emoji: "🚀", name: "Творчість або Самовираження", short: "Творчість" },
                { emoji: "🧑‍🔬", name: "Особистий розвиток або Турбота про себе", short: "Саморозвиток" },
                { emoji: "🏘", name: "Домашнє життя або Ведення господарства", short: "Дім" },
                { emoji: "💴", name: "Фінанси", short: "Фінанси" },
                { emoji: "🤝", name: "Батьківство або Сім'я", short: "Сім'я" },
                { emoji: "📚", name: "Відпочинок і Хобі", short: "Хобі" },
                { emoji: "🗣️", name: "Спільнота або Соціальні зв'язки", short: "Спільнота" },
                { emoji: "🌳", name: "Фізичне здоров'я", short: "Здоров'я" },
                { emoji: "🔎", name: "Кар'єра або Освіта", short: "Кар'єра" },
                { emoji: "🌿", name: "Екологія або Благодійність", short: "Екологія" },
                { emoji: "👥", name: "Особисті стосунки", short: "Стосунки" },
                { emoji: "🧘", name: "Духовність", short: "Духовність" }
            ],
            en: [
                { emoji: "🚀", name: "Creativity or Self-Expression", short: "Creativity" },
                { emoji: "🧑‍🔬", name: "Personal Development or Self-Care", short: "Self-Development" },
                { emoji: "🏘", name: "Domestic Life or Household Management", short: "Home" },
                { emoji: "💴", name: "Finance", short: "Finance" },
                { emoji: "🤝", name: "Parenting or Family", short: "Family" },
                { emoji: "📚", name: "Recreation and Hobbies", short: "Hobbies" },
                { emoji: "🗣️", name: "Community Involvement or Social Connection", short: "Community" },
                { emoji: "🌳", name: "Physical Health", short: "Health" },
                { emoji: "🔎", name: "Career or Education", short: "Career" },
                { emoji: "🌿", name: "Environmental or Charitable Causes", short: "Ecology" },
                { emoji: "👥", name: "Personal Relationship", short: "Relationships" },
                { emoji: "🧘", name: "Spirituality", short: "Spirituality" }
            ]
        };

        const FALLBACK_QUESTIONS = {
            ua: [
                "Якби страх зник, що б ти створила?",
                "Яка звичка виснажує тебе, але ти її тримаєшся?",
                "Який емоційний слід залишив твій дім у твоїй душі?",
                "Якби гроші не мали значення, чим би ти займалась?",
                "Яку роль ти граєш у сім'ї, і чи хочеш її змінити?",
                "Чому ти не дозволяєш собі відпочивати без провини?",
                "Де ти шукаєш прийняття, але не знаходиш?",
                "Як твоє тіло намагається з тобою говорити?",
                "Що ти робиш не через покликання, а через страх?",
                "Як твоя повсякденність впливає на планету?",
                "Які стосунки ти терпиш, хоча вони тебе руйнують?",
                "Де ти втрачаєш себе, намагаючись догодити іншим?"
            ],
            en: [
                "If fear disappeared, what would you create?",
                "Which habit drains you but you keep it?",
                "What emotional trace did your home leave in your soul?",
                "If money didn't matter, what would you do?",
                "What role do you play in your family – do you want to change it?",
                "Why don't you allow yourself to rest without guilt?",
                "Where do you seek acceptance but don't find it?",
                "How is your body trying to speak to you?",
                "What do you do not out of calling but out of fear?",
                "How does your daily life affect the planet?",
                "Which relationships do you tolerate though they harm you?",
                "Where do you lose yourself trying to please others?"
            ]
        };

        let currentLang = "ua";
        let currentSpheres = SPHERES.ua;
        let groqApiKey = localStorage.getItem("groq_api_key") || "";
        let proxyUrl = localStorage.getItem("groq_proxy_url") || "";
        let lastMessage = "", lastQuestion = "", history = [];
        let spinning = false, lastSpinTime = 0;
        const SPIN_COOLDOWN = 3600000;

        const canvas = document.getElementById("rouletteCanvas");
        const ctx = canvas.getContext("2d");
        let size = 600, center = 300, radius = 280;
        let wheelAngle = 0, ballAngle = 0;
        let spinStart = 0, spinDuration = 2500;
        let wheelStartAngle = 0, ballStartAngle = 0, wheelDelta = 0, ballDelta = 0;

        const cardsGrid = document.getElementById("cardsGrid");
        const resultDiv = document.getElementById("resultMessage");
        const historyDiv = document.getElementById("historyLog");
        const spinBtn = document.getElementById("spinBtn");
        const copyBtn = document.getElementById("copyBtn");
        const timerHint = document.getElementById("timerHint");
        const groqKeyInput = document.getElementById("groqKeyInput");
        const proxyUrlInput = document.getElementById("proxyUrlInput");
        const saveKeyBtn = document.getElementById("saveKeyBtn");
        const modal = document.getElementById("modal");
        const modalSphere = document.getElementById("modalSphere");
        const modalQuestion = document.getElementById("modalQuestion");
        const modalCloseBtn = document.getElementById("modalCloseBtn");
        const modalSaveBtn = document.getElementById("modalSaveBtn");

        if (groqApiKey) groqKeyInput.value = groqApiKey;
        if (proxyUrl) proxyUrlInput.value = proxyUrl;

        function buildCards() {
            cardsGrid.innerHTML = "";
            currentSpheres.forEach((s, idx) => {
                const card = document.createElement("div");
                card.className = "sphere-card";
                card.dataset.idx = idx;
                card.innerHTML = `<span class="sphere-emoji">${s.emoji}</span><div class="sphere-name-full">${s.name}</div>`;
                cardsGrid.appendChild(card);
            });
        }

        function highlightCard(index) {
            document.querySelectorAll(".sphere-card").forEach((card, i) => {
                if (i === index) card.classList.add("selected-card");
                else card.classList.remove("selected-card");
            });
        }

        function drawWheel() {
            if (!ctx) return;
            ctx.clearRect(0, 0, size, size);
            ctx.fillStyle = "#1e3a2a";
            ctx.fillRect(0, 0, size, size);
            const step = (Math.PI * 2) / 12;
            for (let i = 0; i < 12; i++) {
                const start = i * step + wheelAngle;
                const end = (i+1) * step + wheelAngle;
                const isRed = (i % 2 === 0);
                const grad = ctx.createRadialGradient(center, center, radius*0.2, center, center, radius);
                grad.addColorStop(0, isRed ? "#b22222" : "#2c2c2c");
                grad.addColorStop(1, isRed ? "#8b0000" : "#1a1a1a");
                ctx.beginPath();
                ctx.arc(center, center, radius, start, end);
                ctx.lineTo(center, center);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = "#f7d97a";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                const mid = start + step/2;
                const txtR = radius * 0.7;
                const x = center + Math.cos(mid) * txtR;
                const y = center + Math.sin(mid) * txtR;
                ctx.font = `bold ${Math.max(18, radius*0.08)}px "Segoe UI"`;
                ctx.fillStyle = "#fff8e7";
                ctx.shadowBlur = 3;
                ctx.fillText(i+1, x-11, y+7);
                ctx.shadowBlur = 0;
            }
            ctx.beginPath();
            ctx.arc(center, center, radius*0.18, 0, Math.PI*2);
            ctx.fillStyle = "#d4af37";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(center, center, radius*0.1, 0, Math.PI*2);
            ctx.fillStyle = "#b8860b";
            ctx.fill();
            const ballRad = radius * 0.045;
            const ballX = center + Math.cos(ballAngle) * (radius - ballRad - 5);
            const ballY = center + Math.sin(ballAngle) * (radius - ballRad - 5);
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRad, 0, Math.PI*2);
            ctx.fillStyle = "#f0f0f0";
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(ballX-2, ballY-2, ballRad*0.3, 0, Math.PI*2);
            ctx.fill();
        }

        function getSegmentAtTop() {
            const pointerAngle = -Math.PI/2;
            let raw = pointerAngle - wheelAngle;
            raw = ((raw % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
            return Math.floor(raw / (Math.PI*2/12));
        }

        let cachedQuestions = null;
        async function loadQuestions() {
            if (cachedQuestions) return cachedQuestions;
            try {
                const r = await fetch('questions.json?t=' + Date.now());
                cachedQuestions = await r.json();
                return cachedQuestions;
            } catch { return null; }
        }

        async function generateDeepQuestion(sphereName) {
            const q = await loadQuestions();
            if (q && q[currentLang] && q[currentLang][sphereName]) {
                return q[currentLang][sphereName];
            }
            const fallbackList = FALLBACK_QUESTIONS[currentLang];
            return fallbackList[Math.floor(Math.random() * fallbackList.length)];
        }

        function formatCooldown(ms) {
            const hours = Math.floor(ms / 3600000);
            const minutes = Math.floor((ms % 3600000) / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            if (hours > 0) return `${hours}г ${minutes}хв ${seconds}с`;
            if (minutes > 0) return `${minutes}хв ${seconds}с`;
            return `${seconds}с`;
        }

        async function startSpin() {
            if (spinning) return;
            const now = Date.now();
            const timeLeft = SPIN_COOLDOWN - (now - lastSpinTime);
            if (lastSpinTime && timeLeft > 0) {
                timerHint.innerText = currentLang === "ua" ? `⏳ наступний спін через ${formatCooldown(timeLeft)}` : `⏳ next spin in ${formatCooldown(timeLeft)}`;
                return;
            }
            timerHint.innerText = "";
            const finalTarget = Math.floor(Math.random() * 12);
            spinning = true;
            spinBtn.disabled = true;

            const step = (Math.PI * 2) / 12;
            const targetWheelAngle = -Math.PI / 2 - (finalTarget * step + step / 2);

            let currentWheelNormalized = wheelAngle % (Math.PI * 2);
            if (currentWheelNormalized < 0) currentWheelNormalized += Math.PI * 2;
            let targetWheelNormalized = targetWheelAngle % (Math.PI * 2);
            if (targetWheelNormalized < 0) targetWheelNormalized += Math.PI * 2;

            const wheelExtraTurns = (Math.floor(Math.random() * 5) + 6) * Math.PI * 2;
            wheelDelta = (targetWheelNormalized - currentWheelNormalized) + wheelExtraTurns;
            if (wheelDelta < wheelExtraTurns) wheelDelta += Math.PI * 2;

            wheelStartAngle = wheelAngle;

            const finalBallPos = -Math.PI / 2;
            let currentBallNormalized = ballAngle % (Math.PI * 2);
            if (currentBallNormalized < 0) currentBallNormalized += Math.PI * 2;
            const ballExtraTurns = (Math.floor(Math.random() * 5) + 10) * Math.PI * 2;
            ballDelta = (finalBallPos - currentBallNormalized) + ballExtraTurns;
            if (ballDelta < ballExtraTurns) ballDelta += Math.PI * 2;

            ballStartAngle = ballAngle;
            spinStart = performance.now();
            requestAnimationFrame(animateSpin);

            async function animateSpin(now) {
                const elapsed = now - spinStart;
                let t = Math.min(1, elapsed / spinDuration);
                const ease = 1 - Math.pow(1 - t, 3);
                wheelAngle = wheelStartAngle + wheelDelta * ease;
                if (t < 0.95) {
                    ballAngle = ballStartAngle + ballDelta * ease;
                } else {
                    ballAngle = -Math.PI / 2;
                }
                drawWheel();
                if (t < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    wheelAngle = targetWheelNormalized;
                    ballAngle = -Math.PI / 2;
                    drawWheel();
                    const sphere = currentSpheres[finalTarget];
                    const question = await generateDeepQuestion(sphere.name);
                    lastMessage = `${sphere.emoji} ${sphere.name}`;
                    lastQuestion = question;
                    resultDiv.innerHTML = `✨ ${lastMessage}`;
                    history.unshift(`${sphere.emoji} ${sphere.short}`);
                    if (history.length > 6) history.pop();
                    historyDiv.innerHTML = `📜 ${currentLang === "ua" ? "історія" : "history"}: ${history.join(' · ')}`;
                    highlightCard(finalTarget);
                    modalSphere.innerHTML = lastMessage;
                    modalQuestion.innerHTML = lastQuestion;
                    modal.classList.add("active");
                    spinning = false;
                    spinBtn.disabled = false;
                    lastSpinTime = Date.now();
                    timerHint.innerText = currentLang === "ua" ? "✅ спін виконано! наступний через 1 годину" : "✅ spin done! next in 1 hour";
                    setTimeout(() => { if (!spinning) timerHint.innerText = ""; }, 5000);
                    flashEffect();
                }
            }
        }

        function flashEffect() {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.background = 'radial-gradient(circle, rgba(0,255,255,0.2), transparent)';
            overlay.style.pointerEvents = 'none';
            overlay.style.zIndex = '999';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 400);
        }

        function copyResult() {
            const text = lastQuestion ? `${lastMessage}\n💭 ${lastQuestion}` : lastMessage;
            if (text) {
                navigator.clipboard.writeText(text);
                const original = resultDiv.innerText;
                resultDiv.innerHTML = "✅ copied!";
                setTimeout(() => resultDiv.innerHTML = original, 1200);
            }
        }

        function setLanguage(lang) {
            currentLang = lang;
            currentSpheres = SPHERES[lang];
            document.querySelectorAll(".lang-btn").forEach(btn => {
                if (btn.dataset.lang === lang) btn.classList.add("active");
                else btn.classList.remove("active");
            });
            buildCards();
            resultDiv.innerHTML = lang === "ua" ? "🌀 натисніть SPIN" : "🌀 press SPIN";
        }

        function saveApiSettings() {
            const key = groqKeyInput.value.trim();
            const proxy = proxyUrlInput.value.trim();
            if (key) groqApiKey = key;
            if (proxy) proxyUrl = proxy;
            localStorage.setItem("groq_api_key", groqApiKey);
            localStorage.setItem("groq_proxy_url", proxyUrl);
            resultDiv.innerHTML = currentLang === "ua" ? "🔑 налаштування збережено" : "🔑 settings saved";
            setTimeout(() => {
                resultDiv.innerHTML = lastMessage ? `✨ ${lastMessage}` : (currentLang === "ua" ? "🌀 натисніть SPIN" : "🌀 press SPIN");
            }, 1500);
        }

        function closeModal() { modal.classList.remove("active"); }
        function saveToHistory() {
            if (lastQuestion) {
                history.unshift(`${lastMessage} · ${lastQuestion.substring(0, 40)}...`);
                if (history.length > 8) history.pop();
                historyDiv.innerHTML = `📜 ${currentLang === "ua" ? "історія" : "history"}: ${history.join(' · ')}`;
                modal.classList.remove("active");
            }
        }

        modalCloseBtn.addEventListener("click", closeModal);
        modalSaveBtn.addEventListener("click", saveToHistory);
        window.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

        function init() {
            buildCards();
            drawWheel();
            spinBtn.addEventListener("click", startSpin);
            copyBtn.addEventListener("click", copyResult);
            saveKeyBtn.addEventListener("click", saveApiSettings);
            document.querySelectorAll(".lang-btn").forEach(btn => {
                btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
            });
            window.addEventListener("resize", () => drawWheel());
        }
        init();
    })();
</script>
</body>
</html>
