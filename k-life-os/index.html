<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌀 Космічний Оракул 12 Сфер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #010005;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', 'Space Grotesk', system-ui, sans-serif;
            overflow: hidden;
            touch-action: pan-x pan-y; /* для мобільної взаємодії */
        }

        .universe {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #020108);
            transition: background 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
        }

        /* панель з підказкою та кнопкою */
        .oracle-panel {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
        }

        .whisper {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            padding: 0.7rem 1.5rem;
            display: inline-block;
            max-width: 80vw;
            font-size: 1rem;
            font-weight: 400;
            color: #ffefcf;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
            letter-spacing: 0.3px;
            transition: opacity 0.3s;
            font-family: monospace;
        }

        .controls {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 30;
            display: flex;
            gap: 0.8rem;
            background: rgba(10, 15, 35, 0.6);
            backdrop-filter: blur(12px);
            padding: 0.5rem 1rem;
            border-radius: 3rem;
            border: 1px solid rgba(0, 255, 255, 0.4);
            pointer-events: auto;
        }

        button {
            background: rgba(20, 30, 70, 0.9);
            border: none;
            color: #ccf;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            backdrop-filter: blur(4px);
        }

        button:hover {
            background: #0ff;
            color: #010312;
            box-shadow: 0 0 14px cyan;
            transform: scale(1.02);
        }

        @media (max-width: 700px) {
            .controls { top: 1rem; right: 1rem; }
            .whisper { font-size: 0.8rem; padding: 0.4rem 1rem; }
        }
    </style>
</head>
<body>
<div class="universe" id="universeBg">
    <canvas id="oracleCanvas"></canvas>
    <div class="oracle-panel">
        <div class="whisper" id="whisperText">🌀 торкнись сфери, щоб почути оракула</div>
    </div>
    <div class="controls">
        <button id="randomSphereBtn">✨ випадкова сфера</button>
    </div>
</div>

<script>
    (function() {
        // --------------------------------------------------------------
        // 12 СФЕР ЖИТТЯ (міфічні назви)
        // --------------------------------------------------------------
        const SPHERES = [
            "Творчість", "Саморозвиток", "Дім", "Фінанси",
            "Сім'я", "Хобі", "Спільнота", "Здоров'я",
            "Кар'єра", "Екологія", "Стосунки", "Духовність"
        ];

        // Унікальні кольори фону для кожної сфери (плавна зміна)
        const BG_COLORS = [
            "#2a0845", "#0f2c3f", "#1e3c2c", "#3c2a1e",
            "#4a1a2e", "#2a3f5e", "#2e4a3a", "#5e2a1e",
            "#1e2a5e", "#2a5e4a", "#6a2a3e", "#3a2a5e"
        ];

        // БАЗА НАТХНЕННИХ ФРАЗ (без генерації, просто магія)
        const ORACLE_PHRASES = [
            "🌟 Творчість чекає на твій перший крок",
            "🌙 Ти готова до нової версії себе",
            "🏠 Затишок починається з однієї свічки",
            "💎 Фінансова свобода — це ставлення",
            "💖 Сімейне тепло лікує краще за всі ліки",
            "🎨 Хобі — це твоя внутрішня дитина",
            "🤝 Сила спільноти народжується з маленьких жестів",
            "🌿 Твоє тіло шепоче — прислухайся",
            "🚀 Навіть малий крок у кар'єрі змінює траєкторію",
            "🍃 Маленька екозвичка рятує океан",
            "💞 Справжні стосунки починаються з тебе",
            "🕉️ Тиша — найглибша відповідь",
            "✨ Дозволь собі сяяти без дозволу",
            "🌌 Кожна сфера — дзеркало твоєї душі",
            "🎭 Творчість лікує там, де слова безсилі",
            "🧘 Саморозвиток — це не спринт, а танець",
            "🕯️ Дім стає святилищем, коли ти в ньому справжня",
            "💰 Гроші люблять турботу, а не страх",
            "👨‍👩‍👧 Родина — це не обов'язок, а тиха гавань",
            "⚡ Відпочинок — це не лінь, це перезавантаження",
            "🗣️ Твій голос має силу, навіть коли тремтить",
            "🏃‍♀️ Здоров'я — це дружба з тілом, а не війна",
            "📈 Кар'єра росте там, де є сенс",
            "🌱 Екологія починається з любові до травички під ногами",
            "🤲 Стосунки квітнуть, коли є повага",
            "🧘 Духовність — це повернення додому до себе",
            "🎇 Ти — сузір'я, а не просто точка",
            "💫 Довірся потоку, він знає шлях",
            "🌸 Навіть у найтемніші часи народжуються зірки",
            "🪷 Ти не маєш бути ідеальною, щоб бути магічною"
        ];

        // --------------------------------------------------------------
        // НАЛАШТУВАННЯ КАНВАСУ ТА СЦЕНИ
        // --------------------------------------------------------------
        const canvas = document.getElementById("oracleCanvas");
        const ctx = canvas.getContext("2d");
        let width, height;
        let centerX, centerY;

        // Параметри кільця (3D-перспектива імітується через градієнти та тіні)
        let ringRadius = 200;
        let ringWidth = 55;

        let angleOffset = 0;          // обертання кільця
        let targetAngleOffset = 0;
        let rotationSpeed = 0.003;    // повільне автообертання
        let autoRotate = true;

        let hoverIndex = -1;
        let activeIndex = -1;
        let animationId = null;

        // Частинки
        let particles = [];
        let particleTimer = null;

        // Елементи UI
        const universeDiv = document.getElementById("universeBg");
        const whisperDiv = document.getElementById("whisperText");

        // --------------------------------------------------------------
        // ФУНКЦІЇ ДЛЯ РОБОТИ З РОЗМІРАМИ ТА ГЕОМЕТРІЄЮ
        // --------------------------------------------------------------
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2;
            centerY = height / 2;
            ringRadius = Math.min(width, height) * 0.25;
            ringWidth = ringRadius * 0.28;
        }

        // Отримати індекс сфери під курсором/дотиком
        function getSphereIndex(mx, my) {
            const dx = mx - centerX;
            const dy = my - centerY;
            const dist = Math.hypot(dx, dy);
            if (dist < ringRadius - ringWidth * 0.6 || dist > ringRadius + ringWidth * 0.6) return -1;
            let angle = Math.atan2(dy, dx) - angleOffset;
            angle = (angle + Math.PI * 2) % (Math.PI * 2);
            const step = (Math.PI * 2) / 12;
            return Math.floor(angle / step);
        }

        // --------------------------------------------------------------
        // СТВОРЕННЯ ЧАСТИНОК (зоряний пил + вибух при кліку)
        // --------------------------------------------------------------
        function initBackgroundStars() {
            particles = [];
            for (let i = 0; i < 280; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    rad: Math.random() * 2 + 0.8,
                    alpha: Math.random() * 0.5 + 0.2,
                    vx: (Math.random() - 0.5) * 0.15,
                    vy: (Math.random() - 0.5) * 0.1,
                    life: 1,
                    isExplosion: false
                });
            }
        }

        function addExplosion(centerXpx, centerYpx) {
            for (let i = 0; i < 45; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                particles.push({
                    x: centerXpx,
                    y: centerYpx,
                    rad: Math.random() * 4 + 1.5,
                    alpha: 1,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    isExplosion: true
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length-1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                if (p.isExplosion) {
                    p.life -= 0.02;
                    p.alpha = p.life;
                    if (p.life <= 0 || p.x < -50 || p.x > width+50 || p.y < -50 || p.y > height+50) {
                        particles.splice(i,1);
                        continue;
                    }
                } else {
                    // звичайні зірки
                    if (p.x < -20) p.x = width+20;
                    if (p.x > width+20) p.x = -20;
                    if (p.y < -20) p.y = height+20;
                    if (p.y > height+20) p.y = -20;
                }
            }
            // якщо частинок мало, додаємо звичайні зірки
            if (particles.filter(p => !p.isExplosion).length < 150) {
                for (let i=0;i<30;i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        rad: Math.random() * 2 + 0.8,
                        alpha: Math.random() * 0.5 + 0.2,
                        vx: (Math.random() - 0.5) * 0.15,
                        vy: (Math.random() - 0.5) * 0.1,
                        life: 1,
                        isExplosion: false
                    });
                }
            }
        }

        // --------------------------------------------------------------
        // МАЛЮВАННЯ КІЛЬЦЯ З СТИХІЯМИ
        // --------------------------------------------------------------
        function drawRingSegment(idx, startAng, endAng, isHover, isActive) {
            const baseColor = `hsl(${idx * 30 + (isActive ? 40 : 0)}, 75%, 60%)`;
            const gradient = ctx.createLinearGradient(centerX - ringRadius, centerY - ringRadius, centerX + ringRadius, centerY + ringRadius);
            if (isActive) {
                gradient.addColorStop(0, "#ffdd88");
                gradient.addColorStop(1, "#ffaa33");
            } else if (isHover) {
                gradient.addColorStop(0, "#ffffff");
                gradient.addColorStop(1, baseColor);
            } else {
                gradient.addColorStop(0, baseColor + "cc");
                gradient.addColorStop(1, baseColor + "66");
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius + ringWidth/2, startAng, endAng);
            ctx.arc(centerX, centerY, ringRadius - ringWidth/2, endAng, startAng, true);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = "rgba(0,255,255,0.7)";
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // міфічний символ у центрі сегмента (стихія)
            const midAng = startAng + (endAng - startAng)/2;
            const rSym = ringRadius;
            const symX = centerX + Math.cos(midAng) * rSym;
            const symY = centerY + Math.sin(midAng) * rSym;
            ctx.font = `26px "Segoe UI Symbol"`;
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#0ff";
            ctx.fillStyle = isActive ? "#fff8e0" : "#ffeecc";
            const symbols = ["🎨", "🌱", "🏠", "💰", "👪", "🎯", "🤝", "💪", "💼", "🌿", "💞", "🕉️"];
            ctx.fillText(symbols[idx % symbols.length], symX-14, symY+10);
            ctx.shadowBlur = 0;
        }

        function drawRing() {
            const step = (Math.PI * 2) / 12;
            for (let i = 0; i < 12; i++) {
                const start = i * step + angleOffset;
                const end = (i+1) * step + angleOffset;
                const isHover = (hoverIndex === i);
                const isActive = (activeIndex === i);
                drawRingSegment(i, start, end, isHover, isActive);
            }
        }

        // Анімований фон (градієнт + зірки)
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, width, height);
            grad.addColorStop(0, "rgba(5, 8, 22, 0.95)");
            grad.addColorStop(1, "rgba(1, 0, 8, 0.98)");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            // малюємо частинки
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.rad, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 235, 180, ${p.alpha * 0.7})`;
                ctx.fill();
            }
        }

        // центральне око / ядро
        function drawCore() {
            const gradCore = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, ringRadius*0.45);
            gradCore.addColorStop(0, "#ffebaa");
            gradCore.addColorStop(1, "#7a3f9a");
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius*0.4, 0, Math.PI*2);
            ctx.fillStyle = gradCore;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius*0.2, 0, Math.PI*2);
            ctx.fillStyle = "#ffdd88";
            ctx.fill();
            ctx.font = `bold ${Math.max(18, ringRadius*0.12)}px "Segoe UI"`;
            ctx.fillStyle = "#1a102a";
            ctx.fillText("🌀", centerX-12, centerY+8);
        }

        // --------------------------------------------------------------
        // АНІМАЦІЯ ТА ОБЕРТАННЯ
        // --------------------------------------------------------------
        function animate() {
            if (autoRotate && hoverIndex === -1) {
                targetAngleOffset += rotationSpeed;
                angleOffset = targetAngleOffset;
            } else {
                // плавне пригальмовування
                targetAngleOffset += (0 - (targetAngleOffset - angleOffset)) * 0.1;
                angleOffset = targetAngleOffset;
            }
            updateParticles();
            drawBackground();
            drawRing();
            drawCore();
            requestAnimationFrame(animate);
        }

        // --------------------------------------------------------------
        // ВЗАЄМОДІЯ: ХОВЕР, КЛІК, ВИПАДКОВА СФЕРА
        // --------------------------------------------------------------
        function updateHover(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mx, my;
            if (e.touches) {
                mx = (e.touches[0].clientX - rect.left) * scaleX;
                my = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                mx = (e.clientX - rect.left) * scaleX;
                my = (e.clientY - rect.top) * scaleY;
            }
            const idx = getSphereIndex(mx, my);
            if (idx !== hoverIndex) {
                hoverIndex = idx;
            }
            canvas.style.cursor = (hoverIndex !== -1) ? "pointer" : "default";
        }

        function resetHover() {
            hoverIndex = -1;
        }

        async function onSphereClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mx, my;
            if (e.touches) {
                mx = (e.touches[0].clientX - rect.left) * scaleX;
                my = (e.touches[0].clientY - rect.top) * scaleY;
            } else {
                mx = (e.clientX - rect.left) * scaleX;
                my = (e.clientY - rect.top) * scaleY;
            }
            const idx = getSphereIndex(mx, my);
            if (idx === -1) return;

            activeIndex = idx;
            // візуальний вибух частинок у місці кліку
            addExplosion(mx, my);

            // зміна кольору всесвіту (плавний перехід)
            const newColor = BG_COLORS[idx % BG_COLORS.length];
            universeDiv.style.transition = "background 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1)";
            universeDiv.style.background = `radial-gradient(ellipse at 30% 40%, ${newColor}, #010005)`;

            // випадкова фраза з бази (не генерація, але завжди свіжа)
            const randomPhrase = ORACLE_PHRASES[Math.floor(Math.random() * ORACLE_PHRASES.length)];
            const sphereName = SPHERES[idx];
            whisperDiv.style.opacity = "0";
            setTimeout(() => {
                whisperDiv.innerHTML = `🌀 ${sphereName} · ${randomPhrase}`;
                whisperDiv.style.opacity = "1";
            }, 100);

            // через 2.5 секунди прибираємо підсвітку
            setTimeout(() => {
                if (activeIndex === idx) activeIndex = -1;
            }, 1800);
        }

        function randomSphere() {
            const idx = Math.floor(Math.random() * 12);
            activeIndex = idx;
            const sphereName = SPHERES[idx];
            const phrase = ORACLE_PHRASES[Math.floor(Math.random() * ORACLE_PHRASES.length)];
            whisperDiv.style.opacity = "0";
            setTimeout(() => {
                whisperDiv.innerHTML = `🌀 ${sphereName} · ${phrase}`;
                whisperDiv.style.opacity = "1";
            }, 80);
            // спалах частинок у центрі екрану
            addExplosion(centerX, centerY);
            const newColor = BG_COLORS[idx % BG_COLORS.length];
            universeDiv.style.transition = "background 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1)";
            universeDiv.style.background = `radial-gradient(ellipse at 30% 40%, ${newColor}, #010005)`;
            setTimeout(() => {
                if (activeIndex === idx) activeIndex = -1;
            }, 1600);
        }

        // --------------------------------------------------------------
        // ПОДІЇ МИШІ/ТАЧ
        // --------------------------------------------------------------
        function initEvents() {
            canvas.addEventListener("mousemove", updateHover);
            canvas.addEventListener("mouseleave", resetHover);
            canvas.addEventListener("click", onSphereClick);
            canvas.addEventListener("touchmove", (e) => { e.preventDefault(); updateHover(e); });
            canvas.addEventListener("touchend", resetHover);
            canvas.addEventListener("touchstart", (e) => { e.preventDefault(); onSphereClick(e); });
            document.getElementById("randomSphereBtn").addEventListener("click", randomSphere);
        }

        // --------------------------------------------------------------
        // СТАРТ
        // --------------------------------------------------------------
        function init() {
            resizeCanvas();
            initBackgroundStars();
            initEvents();
            animate();
            window.addEventListener("resize", () => {
                resizeCanvas();
                initBackgroundStars();
            });
            // легкий стартовий поштовх
            setTimeout(() => {
                randomSphere();
            }, 500);
        }

        init();
    })();
</script>
</body>
</html>
