name: Generate Sphere Questions
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate questions via M3 (Groq fallback)
        env:
          LLM_PROVIDER: m3
          M3_API_KEY: ${{ secrets.M3_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-questions.js

      - name: Commit updated questions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k-life-os/questions.json
          git diff --staged --quiet || git commit -m "chore: update generated questions [skip ci]"
          git push
